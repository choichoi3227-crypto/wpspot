<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>사용자 관리 — wpspot 관리자</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="admin-banner">
  관리자 전용 영역
</div>
<div class="app-shell">
  <div class="page-header">
    <div class="page-breadcrumb">
      <a href="/dashboard.html">wpspot</a>
      <span class="page-breadcrumb__sep">›</span>
      <span>관리자</span>
      <span class="page-breadcrumb__sep">›</span>
      <span>사용자 관리</span>
    </div>
  </div>

  <div class="kpi-grid" style="margin-bottom:24px;">
    <div class="kpi-card"><div class="kpi-card__label"><span>전체 사용자</span></div><div class="kpi-card__value" id="totalUsers">0</div></div>
    <div class="kpi-card"><div class="kpi-card__label"><span>활성 구독자</span></div><div class="kpi-card__value" id="activeUsers">0</div></div>
    <div class="kpi-card"><div class="kpi-card__label"><span>오늘 신규가입</span></div><div class="kpi-card__value" id="newToday">0</div></div>
    <div class="kpi-card"><div class="kpi-card__label"><span>이번 달 신규</span></div><div class="kpi-card__value" id="newMonth">0</div></div>
  </div>

  <div class="toolbar">
    <div class="search-bar" style="max-width:320px;">
      <span class="search-bar__icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
      <input type="text" placeholder="이메일 또는 이름 검색" id="userSearch" oninput="filterUsers()" />
    </div>
    <select class="field__select" style="width:auto;" onchange="filterPlan(this.value)">
      <option value="">전체 플랜</option>
      <option value="light">라이트</option>
      <option value="standard">스탠다드</option>
      <option value="smart">스마트</option>
    </select>
    <div class="toolbar__spacer"></div>
    <button class="btn btn--outline btn--sm" onclick="exportUsers()">📥 CSV 내보내기</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>이메일</th>
          <th>이름</th>
          <th>플랜</th>
          <th>호스팅 수</th>
          <th>가입일</th>
          <th>상태</th>
          <th>액션</th>
        </tr>
      </thead>
      <tbody id="userTableBody">
        <tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-secondary);">사용자 데이터를 불러오는 중...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- 페이지네이션 -->
  <div style="display:flex;justify-content:center;gap:8px;margin-top:16px;" id="pagination"></div>
</div>
<script src="/js/app.js"></script>
<script>
  wpspot.requireAdmin();
  wpspot.renderShell('admin-users', '사용자 관리');

  let users = [], filtered = [], page = 1, perPage = 20;

  function filterUsers() {
    const q = document.getElementById('userSearch').value.toLowerCase();
    filtered = users.filter(u => u.email?.toLowerCase().includes(q) || u.name?.toLowerCase().includes(q));
    page = 1; renderTable();
  }

  function filterPlan(plan) {
    filtered = plan ? users.filter(u => u.plan === plan) : [...users];
    page = 1; renderTable();
  }

  function renderTable() {
    const start = (page-1)*perPage, end = start+perPage;
    const rows = filtered.slice(start,end);
    const tbody = document.getElementById('userTableBody');
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-secondary);">사용자가 없습니다.</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(u => `
      <tr>
        <td style="font-family:monospace;font-size:12px;">${u.id||'—'}</td>
        <td>${wpspot.escapeHtml(u.email||'—')}</td>
        <td>${wpspot.escapeHtml(u.name||'—')}</td>
        <td><span class="badge badge--blue">${{light:'라이트',standard:'스탠다드',smart:'스마트'}[u.plan]||'없음'}</span></td>
        <td>${u.hosting_count||0}</td>
        <td style="font-size:12px;">${wpspot.formatDate(u.created_at)}</td>
        <td><span class="badge ${u.active?'badge--green':'badge--grey'}">${u.active?'활성':'비활성'}</span></td>
        <td>
          <button class="btn btn--outline btn--sm" onclick="viewUser('${u.id}')">상세</button>
          <button class="btn ${u.active?'btn--danger':'btn--success'} btn--sm" onclick="suspendUser('${u.id}')">${u.active?'정지':'활성화'}</button>
        </td>
      </tr>
    `).join('');
    renderPagination();
  }

  function renderPagination() {
    const total = Math.ceil(filtered.length/perPage);
    const el = document.getElementById('pagination');
    el.innerHTML = Array.from({length:total},(_, i) => `
      <button class="btn ${i+1===page?'btn--primary':'btn--outline'} btn--sm" onclick="goPage(${i+1})">${i+1}</button>
    `).join('');
  }

  function goPage(p) { page = p; renderTable(); }
  function viewUser(id) { location.href = '/admin/user-detail.html?id='+id; }
  function suspendUser(id) {
    const u = users.find(x => x.id === id);
    const nextActive = u ? !u.active : false;
    if (!confirm(nextActive ? '이 사용자를 다시 활성화하겠습니까?' : '이 사용자를 정지하겠습니까?')) return;
    wpspot.api('/api/admin/users/'+id, { method:'PATCH', body: JSON.stringify({ active: nextActive }) })
      .then(() => {
        wpspot.toast(nextActive ? '활성화했어요.' : '정지했어요.', 'success');
        if (u) u.active = nextActive;
        filterUsers();
      })
      .catch(e => wpspot.toast(e.message, 'error'));
  }
  function exportUsers() { wpspot.toast('CSV 내보내기 준비 중...','info'); }

  wpspot.api('/api/admin/users').then(data => {
    users = data?.users || [];
    filtered = [...users];
    document.getElementById('totalUsers').textContent = users.length;
    document.getElementById('activeUsers').textContent = users.filter(u => u.active).length;
    renderTable();
  }).catch(() => {
    document.getElementById('userTableBody').innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-secondary);">데이터 없음 (관리자 권한 필요)</td></tr>';
  });
</script>
</body>
</html>
