name: wpspot Provision

on:
  workflow_dispatch:
    inputs:
      site_slug:
        description: "사이트 slug"
        required: true
      site_display_name:
        description: "사이트 표시 이름"
        required: false
        default: ""
      custom_domain:
        description: "사용자 개인 도메인 (예: example.com)"
        required: false
        default: ""
      pma_domain:
        description: "PHPLiteAdmin 도메인 (예: pma.example.com)"
        required: false
        default: ""
      workers_dev_url:
        description: "기본 Cloudflare workers.dev URL"
        required: false
        default: ""
      wp_admin_user:
        description: "WordPress 관리자 ID"
        required: false
        default: "wpadmin"
      wp_admin_pass:
        description: "WordPress 관리자 비밀번호"
        required: false
        default: ""
      secret_cf_account_id:
        description: "Cloudflare Account ID"
        required: false
        default: ""
      secret_cf_api_token:
        description: "Cloudflare API Token"
        required: false
        default: ""
      secret_github_token:
        description: "GitHub PAT"
        required: false
        default: ""
      secret_worker_name:
        description: "Cloudflare Worker 이름"
        required: false
        default: ""
      wpspot_callback_url:
        description: "wpspot 콜백 URL"
        required: false
        default: ""
      wpspot_site_id:
        description: "wpspot 사이트 ID"
        required: false
        default: ""
      wpspot_jwt:
        description: "wpspot JWT"
        required: false
        default: ""

jobs:
  provision:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: 민감 정보 마스킹
        run: |
          echo "::add-mask::${{ inputs.wp_admin_pass }}"
          echo "::add-mask::${{ inputs.secret_cf_account_id }}"
          echo "::add-mask::${{ inputs.secret_cf_api_token }}"
          echo "::add-mask::${{ inputs.secret_github_token }}"
          echo "::add-mask::${{ inputs.wpspot_jwt }}"

      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # ── PHP 8.3 설치 (내장 서버 모드 사용 — nginx/FPM 불필요) ───────────
      - name: PHP 8.3 설치
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, sqlite3, pdo_sqlite, gd, zip, curl, xml, intl, opcache
          ini-values: |
            upload_max_filesize=64M
            post_max_size=64M
            memory_limit=256M
            max_execution_time=300
            display_errors=Off
            log_errors=On

      - name: WP-CLI 설치
        run: |
          curl -sSL https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar \
            -o /usr/local/bin/wp
          chmod +x /usr/local/bin/wp
          wp --info --allow-root

      - name: WordPress 최신 버전 다운로드
        run: |
          if [ ! -f wordpress/wp-load.php ]; then
            curl -sSL https://wordpress.org/latest.tar.gz -o /tmp/wp.tar.gz
            tar -xzf /tmp/wp.tar.gz -C .
            rm /tmp/wp.tar.gz
          fi
          php -r "include 'wordpress/wp-includes/version.php'; echo 'WP ' . \$wp_version . PHP_EOL;"

      - name: SQLite 통합 플러그인 설치
        run: |
          mkdir -p wordpress/wp-content/plugins wordpress/wp-content/database
          if [ ! -d "wordpress/wp-content/plugins/sqlite-database-integration" ]; then
            curl -sSL \
              "https://downloads.wordpress.org/plugin/sqlite-database-integration.latest-stable.zip" \
              -o /tmp/sqlite.zip
            unzip -q /tmp/sqlite.zip -d wordpress/wp-content/plugins/
            rm /tmp/sqlite.zip
          fi
          if [ ! -f "wordpress/wp-content/db.php" ]; then
            cp wordpress/wp-content/plugins/sqlite-database-integration/db.copy \
               wordpress/wp-content/db.php
          fi
          echo "SQLite 플러그인 준비 완료"

      # ── PHPLiteAdmin 최신 버전 설치 ─────────────────────────────────────
      - name: PHPLiteAdmin 설치
        run: |
          PLA_DIR="wordpress/wp-content/phpliteadmin"
          mkdir -p "$PLA_DIR"
          if [ ! -f "$PLA_DIR/phpliteadmin.php" ]; then
            PLA_VER=$(curl -sf \
              "https://api.github.com/repos/phpLiteAdmin/phpLiteAdmin/releases/latest" \
              | python3 -c \
                "import sys,json; print(json.load(sys.stdin).get('tag_name','v1.9.9'))" \
              2>/dev/null || echo "v1.9.9")
            echo "PHPLiteAdmin 버전: $PLA_VER"
            curl -sSL \
              "https://github.com/phpLiteAdmin/phpLiteAdmin/archive/refs/tags/${PLA_VER}.zip" \
              -o /tmp/pla.zip 2>/dev/null || \
            curl -sSL \
              "https://github.com/phpLiteAdmin/phpLiteAdmin/archive/refs/heads/master.zip" \
              -o /tmp/pla.zip
            unzip -q /tmp/pla.zip -d /tmp/pla_src/
            PLAFILE=$(find /tmp/pla_src/ -name "phpliteadmin.php" | head -1)
            if [ -n "$PLAFILE" ]; then
              cp "$PLAFILE" "$PLA_DIR/phpliteadmin.php"
            else
              curl -sSL \
                "https://raw.githubusercontent.com/phpLiteAdmin/phpLiteAdmin/master/phpliteadmin.php" \
                -o "$PLA_DIR/phpliteadmin.php"
            fi
            rm -rf /tmp/pla.zip /tmp/pla_src/
          fi

          # PHPLiteAdmin 설정 패치: DB 경로 지정, 비밀번호 비활성화 (CF Worker 레벨에서 인증)
          DB_ABS="$(pwd)/wordpress/wp-content/database"
          python3 - "$PLA_DIR/phpliteadmin.php" "$DB_ABS" << 'PYEOF'
          import sys, re
          fpath, db_dir = sys.argv[1], sys.argv[2]
          with open(fpath, 'r', encoding='utf-8', errors='replace') as f:
              src = f.read()
          src = re.sub(r"\\\$directory\s*=\s*['\"].*?['\"]", f"$directory = '{db_dir}'", src)
          src = re.sub(r"\\\$password\s*=\s*['\"].*?['\"]", "$password = ''", src)
          with open(fpath, 'w', encoding='utf-8') as f:
              f.write(src)
          print("PHPLiteAdmin 설정 패치 완료")
          PYEOF
          ls -lh "$PLA_DIR/phpliteadmin.php"

      # ── wp-config.php 생성 ───────────────────────────────────────────────
      - name: wp-config.php 생성
        run: |
          cd wordpress
          CUSTOM_DOMAIN="${{ inputs.custom_domain }}"
          WORKER_NAME="${{ inputs.secret_worker_name }}"
          [ -z "$WORKER_NAME" ] && WORKER_NAME="wpspot-${{ inputs.site_slug }}"
          WORKERS_DEV_URL="${{ inputs.workers_dev_url }}"
          SITE_URL="${CUSTOM_DOMAIN:+https://${CUSTOM_DOMAIN}}"
          SITE_URL="${SITE_URL:-${WORKERS_DEV_URL}}"
          DISPLAY="${{ inputs.site_display_name }}"
          [ -z "$DISPLAY" ] && DISPLAY="${{ inputs.site_slug }}"

          SALTS=$(curl -sS https://api.wordpress.org/secret-key/1.1/salt/ || true)

          cat > wp-config.php << WPEOF
          <?php
          define('DB_NAME',     'wordpress');
          define('DB_USER',     'root');
          define('DB_PASSWORD', '');
          define('DB_HOST',     'localhost');
          define('DB_CHARSET',  'utf8mb4');
          define('DB_COLLATE',  '');

          define('DB_DIR',  __DIR__ . '/wp-content/database/');
          define('DB_FILE', 'wordpress.db');

          define('WP_HOME',    '${SITE_URL}');
          define('WP_SITEURL', '${SITE_URL}');

          define('WP_CACHE',             true);
          define('WP_DEBUG',             false);
          define('WP_DEBUG_LOG',         false);
          define('CONCATENATE_SCRIPTS',  false);
          define('DISALLOW_FILE_EDIT',   false);
          define('FS_METHOD',            'direct');

          \$table_prefix = 'wp_';
          WPEOF

          if [ -n "$SALTS" ]; then
            echo "$SALTS" >> wp-config.php
          else
            cat >> wp-config.php << 'SALTEOF'
          define('AUTH_KEY',         'wpspot-auth-key-replace-me');
          define('SECURE_AUTH_KEY',  'wpspot-secure-auth-key');
          define('LOGGED_IN_KEY',    'wpspot-logged-in-key');
          define('NONCE_KEY',        'wpspot-nonce-key');
          define('AUTH_SALT',        'wpspot-auth-salt');
          define('SECURE_AUTH_SALT', 'wpspot-secure-auth-salt');
          define('LOGGED_IN_SALT',   'wpspot-logged-in-salt');
          define('NONCE_SALT',       'wpspot-nonce-salt');
          SALTEOF
          fi
          echo "if(!defined('ABSPATH')){define('ABSPATH',__DIR__.'/');}require_once ABSPATH.'wp-settings.php';" \
            >> wp-config.php
          echo "wp-config.php 생성 완료"

      # ── WordPress 설치 (WP-CLI + PHP 내장 서버) ─────────────────────────
      # PHP 내장 서버(-S)로 WordPress를 실행 — nginx/FPM 완전 불필요
      - name: PHP 내장 서버로 WordPress 설치
        run: |
          cd wordpress
          CUSTOM_DOMAIN="${{ inputs.custom_domain }}"
          WORKER_NAME="${{ inputs.secret_worker_name }}"
          [ -z "$WORKER_NAME" ] && WORKER_NAME="wpspot-${{ inputs.site_slug }}"
          WORKERS_DEV_URL="${{ inputs.workers_dev_url }}"
          SITE_URL="${CUSTOM_DOMAIN:+https://${CUSTOM_DOMAIN}}"
          SITE_URL="${SITE_URL:-${WORKERS_DEV_URL}}"
          DISPLAY="${{ inputs.site_display_name }}"
          [ -z "$DISPLAY" ] && DISPLAY="${{ inputs.site_slug }}"
          WP_PASS="${{ inputs.wp_admin_pass }}"
          [ -z "$WP_PASS" ] && WP_PASS=$(openssl rand -base64 16 | tr -dc 'a-zA-Z0-9' | head -c 16)
          WP_USER="${{ inputs.wp_admin_user }}"
          [ -z "$WP_USER" ] && WP_USER="wpadmin"

          if [ ! -f "wp-content/database/wordpress.db" ]; then
            # WP-CLI는 내장 서버 없이도 SQLite 모드에서 직접 DB 생성 가능
            wp core install \
              --url="$SITE_URL" \
              --title="$DISPLAY" \
              --admin_user="$WP_USER" \
              --admin_password="$WP_PASS" \
              --admin_email="admin@wpspot.app" \
              --skip-email \
              --allow-root
            wp option update permalink_structure '/%postname%/' --allow-root
            wp rewrite flush --allow-root
            echo "WordPress 설치 완료"
          else
            echo "이미 설치됨"
          fi
          ls -lh wp-content/database/wordpress.db

      # ── PHP 내장 서버 시작 (서버리스 방식) ──────────────────────────────
      # GitHub Actions runner에서 PHP -S 로 실행 = 서버 데몬 불필요
      - name: "PHP 내장 서버 시작 (WordPress: 포트 8888)"
        run: |
          # PHP 내장 서버: nginx/Apache/FPM 완전 대체
          # WordPress 라우터 스크립트 생성 (퍼머링크 처리)
          cat > /tmp/wp-router.php << 'ROUTEREOF'
          <?php
          $uri = urldecode(parse_url($_SERVER['REQUEST_URI'], PHP_URL_PATH));
          $file = __DIR__ . $uri;
          // 실제 파일이 존재하면 그대로 서빙 (CSS, JS, 이미지 등)
          if ($uri !== '/' && file_exists($file) && !is_dir($file)) {
              return false;
          }
          // WordPress로 라우팅
          if (file_exists(__DIR__ . '/wp-blog-header.php')) {
              require __DIR__ . '/wp-blog-header.php';
          } else {
              http_response_code(503);
              echo 'WordPress not found';
          }
          ROUTEREOF

          # 백그라운드로 PHP 내장 서버 실행
          cd wordpress
          php -S 0.0.0.0:8888 /tmp/wp-router.php \
            -d display_errors=0 \
            -d log_errors=1 \
            >> /tmp/php-wp.log 2>&1 &
          echo $! > /tmp/php-wp.pid
          sleep 3

          # 헬스체크
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 http://127.0.0.1:8888/ || echo "000")
          echo "WordPress PHP 내장 서버 HTTP: $HTTP_CODE"
          [ "$HTTP_CODE" != "000" ] && echo "PHP 내장 서버: OK" || { echo "::warning::PHP 서버 응답 없음"; cat /tmp/php-wp.log | tail -20; }

      - name: "PHP 내장 서버 시작 (PHPLiteAdmin: 포트 8889)"
        run: |
          PLA_DIR="$(pwd)/wordpress/wp-content/phpliteadmin"
          cd "$PLA_DIR"
          php -S 0.0.0.0:8889 \
            -d display_errors=0 \
            -d log_errors=1 \
            >> /tmp/php-pla.log 2>&1 &
          echo $! > /tmp/php-pla.pid
          sleep 2

          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 http://127.0.0.1:8889/ || echo "000")
          echo "PHPLiteAdmin PHP 내장 서버 HTTP: $HTTP_CODE"

      # ── cloudflared Quick Tunnel ─────────────────────────────────────────
      # trycloudflare.com — 계정 불필요, 완전 무료, 서버리스
      - name: cloudflared 설치
        run: |
          curl -sSL \
            "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb" \
            -o /tmp/cloudflared.deb
          dpkg -x /tmp/cloudflared.deb /tmp/cloudflared-pkg
          sudo cp /tmp/cloudflared-pkg/usr/bin/cloudflared /usr/local/bin/cloudflared
          cloudflared --version

      - name: cloudflared Quick Tunnel 시작 (WordPress)
        run: |
          cloudflared tunnel --url http://127.0.0.1:8888 \
            --no-autoupdate \
            --logfile /tmp/cf-wp.log 2>&1 &
          echo $! > /tmp/cf-wp.pid

          # URL 추출 대기 (최대 30초)
          TUNNEL_URL=""
          for i in $(seq 1 30); do
            sleep 1
            TUNNEL_URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' \
              /tmp/cf-wp.log 2>/dev/null | head -1 || true)
            [ -n "$TUNNEL_URL" ] && break
          done
          [ -z "$TUNNEL_URL" ] && { echo "::error::WP 터널 URL 획득 실패"; cat /tmp/cf-wp.log; exit 1; }
          echo "WP 터널: $TUNNEL_URL"
          echo "TUNNEL_WP_URL=$TUNNEL_URL" >> $GITHUB_ENV

      - name: cloudflared Quick Tunnel 시작 (PHPLiteAdmin)
        run: |
          cloudflared tunnel --url http://127.0.0.1:8889 \
            --no-autoupdate \
            --logfile /tmp/cf-pla.log 2>&1 &
          echo $! > /tmp/cf-pla.pid

          TUNNEL_PLA_URL=""
          for i in $(seq 1 30); do
            sleep 1
            TUNNEL_PLA_URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' \
              /tmp/cf-pla.log 2>/dev/null | head -1 || true)
            [ -n "$TUNNEL_PLA_URL" ] && break
          done
          echo "PLA 터널: ${TUNNEL_PLA_URL:-없음}"
          echo "TUNNEL_PLA_URL=${TUNNEL_PLA_URL:-}" >> $GITHUB_ENV

      # ── Cloudflare Worker 배포 ───────────────────────────────────────────
      - name: Cloudflare Worker 배포
        env:
          CLOUDFLARE_API_TOKEN: ${{ inputs.secret_cf_api_token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ inputs.secret_cf_account_id }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Cloudflare API Token과 Account ID가 있어야 Worker를 생성할 수 있습니다."
            exit 1
          fi

          WORKER_NAME="${{ inputs.secret_worker_name }}"
          [ -z "$WORKER_NAME" ] && WORKER_NAME="wpspot-${{ inputs.site_slug }}"
          PMA_WORKER="${WORKER_NAME}-pma"

          npm install -g wrangler --quiet --no-progress 2>/dev/null

          # ── WordPress Worker ─────────────────────────────────────────────
          mkdir -p /tmp/cf-wp
          cat > /tmp/cf-wp/worker.js << 'WORKEREOF'
          export default {
            async fetch(request, env) {
              const origin = env.NGINX_ORIGIN;
              if (!origin) {
                return new Response(offlinePage(), {
                  status: 503,
                  headers: { 'Content-Type': 'text/html; charset=utf-8', 'Retry-After': '30' }
                });
              }
              const url = new URL(request.url);
              const target = new URL(origin);
              target.pathname = url.pathname;
              target.search   = url.search;
              const headers = new Headers(request.headers);
              headers.set('host', new URL(origin).host);
              headers.set('x-forwarded-proto', 'https');
              headers.set('x-real-ip',
                request.headers.get('cf-connecting-ip') || '');
              try {
                const resp = await fetch(target.toString(), {
                  method:   request.method,
                  headers,
                  body: ['GET','HEAD'].includes(request.method)
                    ? undefined : request.body,
                  redirect: 'manual',
                });
                const out = new Headers(resp.headers);
                out.set('x-powered-by', 'wpspot/serverless');
                return new Response(resp.body, {
                  status:  resp.status,
                  headers: out,
                });
              } catch (e) {
                return new Response(offlinePage(e.message), {
                  status: 503,
                  headers: { 'Content-Type': 'text/html; charset=utf-8', 'Retry-After': '60' }
                });
              }
            }
          };
          function offlinePage(msg) {
            return '<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">'
              + '<meta http-equiv="refresh" content="30"><title>준비 중</title>'
              + '<style>*{box-sizing:border-box}body{font-family:system-ui;'
              + 'display:flex;align-items:center;justify-content:center;'
              + 'min-height:100vh;margin:0;background:#f8fafc}'
              + '.c{text-align:center;max-width:420px;padding:2rem}'
              + 'h2{color:#1e293b;margin-bottom:.5rem}'
              + 'p{color:#64748b;line-height:1.6}'
              + '.badge{background:#dbeafe;color:#1d4ed8;padding:3px 10px;'
              + 'border-radius:999px;font-size:12px;font-weight:600}'
              + '</style></head><body><div class="c">'
              + '<div class="badge">서버리스 WordPress</div>'
              + '<h2>⏳ 서버 준비 중이에요</h2>'
              + '<p>GitHub Actions에서 WordPress를 실행 중이에요.<br/>'
              + '잠시 후 자동으로 새로고침됩니다.</p>'
              + (msg ? '<p style="color:#94a3b8;font-size:12px">' + msg + '</p>' : '')
              + '</div></body></html>';
          }
          WORKEREOF

          cat > /tmp/cf-wp/wrangler.toml << TOMLEOF
          name = "${WORKER_NAME}"
          main = "worker.js"
          compatibility_date = "2024-09-23"
          [vars]
          NGINX_ORIGIN = "${TUNNEL_WP_URL}"
          TOMLEOF

          cd /tmp/cf-wp && wrangler deploy --minify
          echo "WordPress Worker 배포 완료: ${WORKER_NAME}"
          echo "WORKER_NAME=${WORKER_NAME}" >> $GITHUB_ENV

          # ── PHPLiteAdmin Worker ──────────────────────────────────────────
          if [ -n "$TUNNEL_PLA_URL" ]; then
            mkdir -p /tmp/cf-pla
            cat > /tmp/cf-pla/worker.js << 'WORKEREOF'
          export default {
            async fetch(request, env) {
              const origin = env.PLA_ORIGIN;
              if (!origin) {
                return new Response('PHPLiteAdmin 준비 중', { status: 503 });
              }
              const url = new URL(request.url);
              const target = new URL(origin);
              target.pathname = url.pathname;
              target.search   = url.search;
              const headers = new Headers(request.headers);
              headers.set('host', new URL(origin).host);
              headers.set('x-forwarded-proto', 'https');
              try {
                const resp = await fetch(target.toString(), {
                  method:   request.method,
                  headers,
                  body: ['GET','HEAD'].includes(request.method)
                    ? undefined : request.body,
                  redirect: 'manual',
                });
                return new Response(resp.body, {
                  status:  resp.status,
                  headers: resp.headers,
                });
              } catch (e) {
                return new Response('PHPLiteAdmin 연결 오류: ' + e.message, { status: 503 });
              }
            }
          };
          WORKEREOF

            cat > /tmp/cf-pla/wrangler.toml << TOMLEOF
          name = "${PMA_WORKER}"
          main = "worker.js"
          compatibility_date = "2024-09-23"
          [vars]
          PLA_ORIGIN = "${TUNNEL_PLA_URL}"
          TOMLEOF

            cd /tmp/cf-pla && wrangler deploy --minify
            echo "PLA Worker 배포 완료: ${PMA_WORKER}"
          else
            echo "::error::PHPLiteAdmin 터널 URL이 없어 PMA Worker를 생성할 수 없습니다."
            exit 1
          fi

      # ── wpspot API 콜백 ──────────────────────────────────────────────────
      - name: wpspot 콜백 (터널 URL 등록)
        run: |
          CALLBACK="${{ inputs.wpspot_callback_url }}"
          SITE_ID="${{ inputs.wpspot_site_id }}"
          JWT="${{ inputs.wpspot_jwt }}"
          [ -z "$CALLBACK" ] || [ -z "$SITE_ID" ] || [ -z "$JWT" ] && { echo "콜백 정보 없음"; exit 0; }

          PAYLOAD=$(python3 -c "
          import json, sys
          print(json.dumps({
            'siteId':       sys.argv[1],
            'tunnelWpUrl':  sys.argv[2],
            'tunnelPlaUrl': sys.argv[3],
            'status':       'active'
          }))" "$SITE_ID" "${TUNNEL_WP_URL:-}" "${TUNNEL_PLA_URL:-}")

          CODE=$(curl -sf -o /tmp/cb.json -w "%{http_code}" \
            -X POST "$CALLBACK" \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "000")
          echo "콜백 응답: $CODE"
          cat /tmp/cb.json 2>/dev/null || true

      # ── GitHub Secrets 등록 ──────────────────────────────────────────────
      - name: GitHub Secrets 등록
        env:
          GH_PAT: ${{ inputs.secret_github_token }}
        run: |
          REPO="${{ github.repository }}"
          [ -z "$GH_PAT" ] && { echo "PAT 없음 — 건너뜀"; exit 0; }

          pip install PyNaCl --quiet 2>/dev/null

          PK=$(curl -sf \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/actions/secrets/public-key" || echo "")
          [ -z "$PK" ] && { echo "Public key 조회 실패"; exit 0; }

          KEY_ID=$(echo "$PK" | python3 -c "import sys,json; print(json.load(sys.stdin)['key_id'])")
          PUB_KEY=$(echo "$PK" | python3 -c "import sys,json; print(json.load(sys.stdin)['key'])")

          python3 > /tmp/enc.py << 'PYEOF'
          import sys, base64
          from nacl import encoding, public
          pub = public.PublicKey(sys.argv[1].encode(), encoding.Base64Encoder)
          enc = public.SealedBox(pub).encrypt(sys.argv[2].encode())
          print(base64.b64encode(enc).decode())
          PYEOF

          set_secret() {
            local name="$1" value="$2"
            [ -z "$value" ] && return
            ENC=$(python3 /tmp/enc.py "$PUB_KEY" "$value" 2>/dev/null)
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
              -X PUT \
              -H "Authorization: Bearer ${GH_PAT}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${REPO}/actions/secrets/${name}" \
              -d "{\"encrypted_value\":\"${ENC}\",\"key_id\":\"${KEY_ID}\"}" || echo "000")
            [ "$CODE" = "201" ] || [ "$CODE" = "204" ] && echo "✓ $name" || echo "✗ $name ($CODE)"
          }

          set_secret "CF_ACCOUNT_ID" "${{ inputs.secret_cf_account_id }}"
          set_secret "CF_API_TOKEN"  "${{ inputs.secret_cf_api_token }}"

      # ── 레포에 설정 저장 (keepalive 재사용) ─────────────────────────────
      - name: 설정 파일 저장 (keepalive용)
        run: |
          mkdir -p deploy
          # 포트/PID 정보 저장
          WORKER_NAME="${{ inputs.secret_worker_name }}"
          [ -z "$WORKER_NAME" ] && WORKER_NAME="wpspot-${{ inputs.site_slug }}"
          cat > deploy/server-config.json << CFGEOF
          {
            "wp_port": 8888,
            "pla_port": 8889,
            "wp_router": "/tmp/wp-router.php",
            "wordpress_dir": "wordpress",
            "pla_dir": "wordpress/wp-content/phpliteadmin",
            "worker_name": "${WORKER_NAME}",
            "pma_worker": "${WORKER_NAME}-pma",
            "site_slug": "${{ inputs.site_slug }}",
            "custom_domain": "${{ inputs.custom_domain }}",
            "pma_domain": "${{ inputs.pma_domain }}"
          }
          CFGEOF
          echo "설정 저장 완료"

      # ── 커밋 ─────────────────────────────────────────────────────────────
      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name  "wpspot-bot"
          git config user.email "bot@wpspot.app"
          git add -A
          git diff --cached --quiet || \
            git commit -m "chore: provision wordpress+phpliteadmin [${{ inputs.site_slug }}]"
          git push

      - name: 완료 요약
        run: |
          echo "============================================"
          echo "  wpspot 프로비저닝 완료 (서버리스)"
          echo "============================================"
          DOMAIN="${{ inputs.custom_domain }}"
          [ -n "$DOMAIN" ] && echo "  사이트:   https://${DOMAIN}"
          echo "  WP 터널:  ${TUNNEL_WP_URL}"
          echo "  PLA 터널: ${TUNNEL_PLA_URL:-없음}"
          echo "  엔진:     PHP 8.3 내장 서버 + Cloudflare Workers"
          echo "  DB:       SQLite (WordPress 내장)"
          echo "============================================"

      # ── 서버 유지 ────────────────────────────────────────────────────────
      # provision job이 살아있는 동안 PHP 서버 + 터널 유지
      # keepalive workflow가 이어받을 때까지 대기
      - name: 서버 유지 (keepalive 인계 전)
        run: |
          echo "PHP 서버 + cloudflared 터널 유지 중..."
          sleep 240
          echo "provision job 종료 — keepalive workflow가 계속 유지합니다."
