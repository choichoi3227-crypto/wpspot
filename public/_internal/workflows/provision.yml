name: wpspot Provision

on:
  workflow_dispatch:
    inputs:
      site_name:
        description: "wpspot 사이트 slug (URL용)"
        required: true
      site_display_name:
        description: "wpspot 사이트 표시 이름"
        required: false
        default: ""

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: PHP 설치 (8.3)
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, sqlite3, pdo_sqlite, gd, zip, curl, xml
          tools: composer

      - name: WP-CLI 설치
        run: |
          curl -sSL https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar -o /usr/local/bin/wp
          chmod +x /usr/local/bin/wp
          wp --info --allow-root

      - name: 워드프레스 원본 다운로드
        run: |
          set -e
          if [ ! -f wordpress/wp-load.php ]; then
            curl -sSL https://wordpress.org/latest.tar.gz -o wp.tar.gz
            tar -xzf wp.tar.gz
            rm wp.tar.gz
          fi

      - name: SQLite 통합 플러그인 설치
        run: |
          set -e
          cd wordpress
          if [ ! -d wp-content/plugins/sqlite-database-integration ]; then
            curl -sSL https://downloads.wordpress.org/plugin/sqlite-database-integration.latest-stable.zip -o sqlite.zip
            unzip -q sqlite.zip -d wp-content/plugins/
            rm sqlite.zip
          fi
          cp wp-content/plugins/sqlite-database-integration/db.copy wp-content/db.php

      - name: wp-config.php 생성
        run: |
          set -e
          cd wordpress
          if [ ! -f wp-config.php ]; then
            cp wp-config-sample.php wp-config.php
            # DB_DIR / DB_FILE (SQLite integration)
            sed -i "s/define( 'DB_NAME'.*/define( 'DB_NAME', 'wordpress' );/" wp-config.php
            sed -i "s/define( 'DB_USER'.*/define( 'DB_USER', 'root' );/" wp-config.php
            sed -i "s/define( 'DB_PASSWORD'.*/define( 'DB_PASSWORD', '' );/" wp-config.php
            sed -i "/define( 'DB_HOST'/a define('DB_DIR', __DIR__ . '/wp-content/database/');\ndefine('DB_FILE', 'wordpress.db');" wp-config.php
            mkdir -p wp-content/database
            # Salt 주입 (실패해도 계속)
            SALT=$(curl -sS https://api.wordpress.org/secret-key/1.1/salt/ || echo "")
            if [ -n "$SALT" ]; then
              # 기존 placeholder 제거 후 삽입
              sed -i "/AUTH_KEY/d;/SECURE_AUTH_KEY/d;/LOGGED_IN_KEY/d;/NONCE_KEY/d;/AUTH_SALT/d;/SECURE_AUTH_SALT/d;/LOGGED_IN_SALT/d;/NONCE_SALT/d" wp-config.php
              echo "$SALT" >> wp-config.php
            fi
          fi

      - name: WordPress 코어 설치 (WP-CLI)
        run: |
          set -e
          cd wordpress
          DISPLAY_NAME="${{ inputs.site_display_name }}"
          if [ -z "$DISPLAY_NAME" ]; then
            DISPLAY_NAME="${{ inputs.site_name }}"
          fi
          if [ ! -f wp-content/database/wordpress.db ]; then
            wp core install \
              --url="https://${{ inputs.site_name }}.wpspot.app" \
              --title="$DISPLAY_NAME" \
              --admin_user="admin" \
              --admin_password="$(openssl rand -base64 16)" \
              --admin_email="admin@${{ inputs.site_name }}.wpspot.app" \
              --skip-email \
              --allow-root
          fi

      - name: nginx 설정 생성
        run: |
          mkdir -p deploy/nginx
          cat > deploy/nginx/wpspot.conf << 'EOF'
          server {
            listen 80 default_server;
            server_name _;
            root /var/www/wordpress;
            index index.php index.html;

            gzip on;
            gzip_types text/css application/javascript application/json text/plain;

            location / {
              try_files $uri $uri/ /index.php?$args;
            }

            location ~ \.php$ {
              fastcgi_pass unix:/run/php/php8.3-fpm.sock;
              fastcgi_index index.php;
              fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
              include fastcgi_params;
            }

            location ~* \.(css|js|jpg|jpeg|png|gif|svg|woff2?)$ {
              expires 30d;
              access_log off;
            }
          }
          EOF

      - name: PHP-FPM OPcache 설정
        run: |
          mkdir -p deploy/php
          cat > deploy/php/opcache.ini << 'EOF'
          opcache.enable=1
          opcache.memory_consumption=128
          opcache.max_accelerated_files=10000
          opcache.validate_timestamps=0
          EOF

      - name: 정적 산출물 패키징 (Cloudflare Pages용)
        run: |
          set -e
          mkdir -p dist
          # wp-content/database는 공개 배포에서 제외
          rsync -a --exclude='wp-content/database/' wordpress/ dist/
          echo "wpspot static bundle for ${{ inputs.site_name }}" > dist/_wpspot.txt

      - name: Cloudflare Pages 프로젝트 생성 및 배포
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -e
          npm install -g wrangler
          # 프로젝트가 없으면 생성
          wrangler pages project create "wpspot-${{ inputs.site_name }}" --production-branch main 2>/dev/null || true
          wrangler pages deploy dist \
            --project-name "wpspot-${{ inputs.site_name }}" \
            --branch main \
            --commit-dirty=true

      - name: 변경사항 커밋
        run: |
          git config user.name "wpspot-bot"
          git config user.email "bot@wpspot.app"
          git add -A
          git diff --cached --quiet || git commit -m "chore: provision wordpress + nginx/php-fpm bundle"
          git push
