<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>대시보드 — wpspot</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .site-card {
      border-bottom: 1px solid var(--border-secondary);
      padding: var(--space-3) var(--space-4);
    }
    .site-card:last-child { border-bottom: none; }
    .site-card__main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      margin-bottom: var(--space-2);
    }
    .site-card__info { flex: 1; min-width: 0; }
    .site-card__name {
      font-size: var(--fs-title-1);
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .site-card__sub {
      font-size: var(--fs-body-3);
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .site-card__actions {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
    }
    .domain-select-row {
      display: flex;
      gap: var(--space-2);
      align-items: center;
    }
    .domain-select-row select {
      flex: 1;
      padding: 9px 12px;
      border: 1.5px solid var(--border-secondary);
      border-radius: var(--radius-m);
      font-size: var(--fs-body-2);
      background: var(--fill-weak);
      color: var(--text-primary);
      outline: none;
      cursor: pointer;
    }
    .domain-select-row select:focus {
      border-color: var(--fill-brand);
      background: var(--color-white);
    }
    .subdomain-row {
      display: none;
      align-items: center;
      gap: 6px;
      margin-top: var(--space-2);
    }
    .subdomain-row.visible { display: flex; }
    .subdomain-row input {
      width: 140px;
      padding: 8px 10px;
      border: 1.5px solid var(--border-secondary);
      border-radius: var(--radius-m);
      font-size: var(--fs-body-2);
      background: var(--fill-weak);
      outline: none;
    }
    .subdomain-row input:focus {
      border-color: var(--fill-brand);
      background: var(--color-white);
    }
    .subdomain-sep { color: var(--text-secondary); font-family: monospace; font-size: var(--fs-body-2); }
    .subdomain-base { font-family: monospace; font-size: var(--fs-body-2); color: var(--text-primary); }
    .domain-preview {
      font-size: var(--fs-body-3);
      color: var(--text-secondary);
      margin-top: 5px;
      font-family: monospace;
    }
    .domain-preview b { color: var(--text-brand); }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="top-bar">
      <span class="top-bar__brand">wpspot</span>
      <div class="row">
        <a href="/domains.html" class="btn btn--ghost btn--s">도메인</a>
        <a href="/account.html" class="btn btn--ghost btn--s">내 계정</a>
        <button class="btn btn--ghost btn--s" id="logoutBtn">로그아웃</button>
      </div>
    </div>

    <div class="screen">
      <h1 class="h1 mt-2">내 사이트</h1>

      <!-- 사이트 생성 -->
      <section class="section">
        <div class="card">
          <div class="title-1">새 사이트 만들기</div>

          <div class="field mt-4">
            <label class="field__label" for="siteName">사이트 이름</label>
            <input class="field__input" type="text" id="siteName" placeholder="내 블로그" maxlength="60" />
            <div class="field__help">어떤 이름이든 괜찮아요.</div>
          </div>

          <div class="field">
            <label class="field__label">도메인 <span style="font-weight:400;color:var(--text-secondary);">(Cloudflare 네임서버 기반)</span></label>
            <div class="domain-select-row">
              <select id="domainSelect" onchange="onDomainChange()">
                <option value="">— 불러오는 중… —</option>
              </select>
              <a href="/domains.html" class="btn btn--secondary btn--s" style="white-space:nowrap;flex-shrink:0;" target="_blank">+ 추가</a>
            </div>
            <!-- 서브도메인 -->
            <div class="subdomain-row" id="subdomainRow">
              <input type="text" id="subdomainInput" placeholder="www (비워두면 루트)" oninput="updatePreview()" />
              <span class="subdomain-sep">.</span>
              <span class="subdomain-base" id="subdomainBase"></span>
            </div>
            <div class="domain-preview" id="domainPreview"></div>
            <div class="field__help">없으면 나중에 호스팅 관리에서 연결할 수 있어요.</div>
          </div>

          <div id="createError" style="color:var(--text-danger);font-size:var(--fs-body-3);margin-bottom:var(--space-3);display:none;"></div>
          <button class="btn btn--primary btn--l" id="createBtn" onclick="createSite()">사이트 추가</button>
        </div>
      </section>

      <!-- 사이트 목록 -->
      <section class="section">
        <div class="section__header">
          <span class="title-1" style="margin:0;">사이트 목록</span>
        </div>
        <div id="siteList" class="card" style="padding:0;">
          <div class="empty" style="padding:var(--space-8);">불러오는 중…</div>
        </div>
      </section>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    let zones = [];

    if (wpspot.requireAuth()) {
      loadZones();
      loadSites();
    }

    document.getElementById("logoutBtn").addEventListener("click", () => {
      wpspot.clearSession();
      location.href = "/login.html";
    });

    // Enter 키로 사이트 추가
    document.getElementById("siteName").addEventListener("keydown", e => {
      if (e.key === "Enter") createSite();
    });

    // ── Zone 목록 ─────────────────────────────────────────────────────────
    async function loadZones() {
      const sel = document.getElementById("domainSelect");
      try {
        const data = await wpspot.api("/api/domains");
        zones = data.zones || [];
        if (!zones.length) {
          sel.innerHTML = '<option value="">— 등록된 도메인 없음 —</option>';
          return;
        }
        sel.innerHTML =
          '<option value="">— 나중에 연결 (선택 안 함) —</option>' +
          zones.map(z =>
            `<option value="${esc(z.id)}" data-name="${esc(z.name)}">`
            + `${esc(z.name)}${z.status === 'active' ? ' ✅' : ' ⏳'}`
            + `</option>`
          ).join("");
      } catch (e) {
        sel.innerHTML = `<option value="">로드 실패: ${esc(e.message)}</option>`;
      }
    }

    function onDomainChange() {
      const sel = document.getElementById("domainSelect");
      const opt = sel.options[sel.selectedIndex];
      const name = opt?.dataset?.name || "";
      const row = document.getElementById("subdomainRow");
      const base = document.getElementById("subdomainBase");
      const preview = document.getElementById("domainPreview");

      if (!sel.value || !name) {
        row.classList.remove("visible");
        preview.innerHTML = "";
        return;
      }
      base.textContent = name;
      row.classList.add("visible");
      updatePreview();
    }

    function updatePreview() {
      const sel = document.getElementById("domainSelect");
      const opt = sel.options[sel.selectedIndex];
      const rootDomain = opt?.dataset?.name || "";
      if (!rootDomain) return;
      const sub = document.getElementById("subdomainInput").value.trim();
      const full = sub ? `${sub}.${rootDomain}` : rootDomain;
      document.getElementById("domainPreview").innerHTML =
        `최종 주소: <b>https://${esc(full)}</b>`;
    }

    // ── 사이트 생성 ───────────────────────────────────────────────────────
    async function createSite() {
      const siteName = document.getElementById("siteName").value.trim();
      const sel = document.getElementById("domainSelect");
      const opt = sel.options[sel.selectedIndex];
      const rootDomain = opt?.dataset?.name || "";
      const zoneId = sel.value;
      const sub = document.getElementById("subdomainInput").value.trim();
      const customDomain = (zoneId && rootDomain)
        ? (sub ? `${sub}.${rootDomain}` : rootDomain)
        : null;

      const errEl = document.getElementById("createError");
      errEl.style.display = "none";

      if (!siteName) {
        errEl.textContent = "사이트 이름을 입력해주세요.";
        errEl.style.display = "";
        return;
      }

      const btn = document.getElementById("createBtn");
      btn.disabled = true;
      btn.textContent = "추가 중…";

      try {
        // 1) 사이트 레코드 생성
        const site = await wpspot.api("/api/sites", {
          method: "POST",
          body: JSON.stringify({ siteName }),
        });

        // 2) 도메인 선택된 경우 → 프로비저닝 자동 실행
        if (customDomain && site.id) {
          btn.textContent = "프로비저닝 중…";
          try {
            await wpspot.api(`/api/sites/${site.id}/provision`, {
              method: "POST",
              body: JSON.stringify({ customDomain, zoneId }),
            });
            wpspot.toast("프로비저닝 시작! GitHub Actions가 WordPress를 설치하고 있어요 (~3~5분)");
          } catch (pe) {
            wpspot.toast(`사이트 추가 완료, 프로비저닝 실패: ${pe.message}`);
          }
        } else {
          wpspot.toast("사이트가 추가됐어요. 호스팅 관리에서 도메인을 연결해주세요.");
        }

        // 폼 초기화
        document.getElementById("siteName").value = "";
        sel.value = "";
        document.getElementById("subdomainInput").value = "";
        document.getElementById("subdomainRow").classList.remove("visible");
        document.getElementById("domainPreview").innerHTML = "";
        loadSites();
      } catch (e) {
        errEl.textContent = e.message;
        errEl.style.display = "";
      } finally {
        btn.disabled = false;
        btn.textContent = "사이트 추가";
      }
    }

    // ── 사이트 목록 + 폴링 ───────────────────────────────────────────────
    let _pollTimer = null;

    async function loadSites() {
      const el = document.getElementById("siteList");
      try {
        const data = await wpspot.api("/api/sites");
        const sites = data.sites || [];
        if (!sites.length) {
          el.innerHTML = `<div class="empty" style="padding:var(--space-8);">아직 사이트가 없어요.<br/>위에서 첫 사이트를 추가해보세요.</div>`;
          stopPolling();
          return;
        }
        el.innerHTML = sites.map(renderSite).join("");

        // 프로비저닝 중인 사이트가 있으면 10초마다 자동 갱신
        if (sites.some(s => s.status === "provisioning")) {
          startPolling();
        } else {
          stopPolling();
        }
      } catch (e) {
        el.innerHTML = `<div class="empty" style="padding:var(--space-8);">${esc(e.message)}</div>`;
        stopPolling();
      }
    }

    function startPolling() {
      if (_pollTimer) return;
      _pollTimer = setInterval(async () => {
        const data = await wpspot.api("/api/sites").catch(() => null);
        if (!data) return;
        const sites = data.sites || [];
        document.getElementById("siteList").innerHTML = sites.length
          ? sites.map(renderSite).join("")
          : `<div class="empty" style="padding:var(--space-8);">아직 사이트가 없어요.<br/>위에서 첫 사이트를 추가해보세요.</div>`;
        if (!sites.some(s => s.status === "provisioning")) stopPolling();
      }, 10000);
    }

    function stopPolling() {
      if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
    }

    function renderSite(site) {
      const domain = site.custom_domain;
      const siteUrl = domain ? `https://${domain}` : site.cf_worker_url;
      const subLabel = domain || site.github_repo || "프로비저닝 전";

      return `
        <div class="site-card">
          <div class="site-card__main">
            <div class="site-card__info">
              <div class="site-card__name">${esc(site.site_name)}</div>
              <div class="site-card__sub">
                ${siteUrl
                  ? `<a href="${esc(siteUrl)}" target="_blank" style="color:var(--text-brand);">${esc(subLabel)}</a>`
                  : esc(subLabel)}
              </div>
            </div>
            ${wpspot.statusBadge(site.status)}
          </div>
          <div class="site-card__actions">
            <a class="btn btn--secondary btn--s" href="/hosting-info.html?site=${esc(site.id)}">호스팅 관리</a>
            ${siteUrl
              ? `<a class="btn btn--secondary btn--s" href="${esc(siteUrl)}/wp-admin" target="_blank">WP 관리자</a>`
              : ""}
            <a class="btn btn--secondary btn--s" href="/file-manager.html?site=${esc(site.id)}">파일 관리자</a>
            <button class="btn btn--danger btn--s"
              onclick="deleteSite('${esc(site.id)}', '${esc(site.site_name)}')">삭제</button>
          </div>
        </div>
      `;
    }

    async function deleteSite(siteId, siteName) {
      if (!confirm(`'${siteName}' 사이트를 삭제할까요?\n연결된 GitHub 레포도 함께 삭제돼요.`)) return;
      try {
        await wpspot.api(`/api/sites/${siteId}`, { method: "DELETE" });
        wpspot.toast("삭제됐어요.");
        loadSites();
      } catch (e) {
        wpspot.toast(e.message, "error");
      }
    }

    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, c =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
      );
    }
  </script>
</body>
</html>
