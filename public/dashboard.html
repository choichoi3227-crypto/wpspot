<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>대시보드 — wpspot</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="app-shell">
  <!-- 호스팅 없음 배너 -->
  <div class="notice-banner" id="noHostingBanner">
    <div>
      <strong class="notice-banner__text">아직 개설된 호스팅이 없어요</strong>
      <div class="notice-banner__text" style="margin-top:4px;font-size:13px;font-weight:400;">1분 만에 생성 가능한 WordPress 호스팅을 시작해보세요.</div>
    </div>
    <a href="/pricing.html" class="notice-banner__action">1분 만에 시작하기</a>
  </div>

  <!-- KPI 그리드 -->
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-card__label">
        <span>이번 달 청구 예정</span>
        <span class="kpi-card__new" onclick="location.href='/billing.html'">새로고침</span>
      </div>
      <div class="kpi-card__value" id="kpiCharge">$0</div>
      <div class="kpi-card__sub">결제 예정일 : 없음 &nbsp;&nbsp; 전월 결제액 : $0</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-card__label">
        <span>미납 요금 안내</span>
        <span class="kpi-card__new" onclick="location.href='/billing.html'">새로고침</span>
      </div>
      <div class="kpi-card__value" id="kpiUnpaid">$0</div>
      <div class="kpi-card__sub">7일이 지날 경우 미납된 서비스는 자동 삭제되며 복구가 불가능합니다.</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-card__label"><span>공지사항</span><a href="/notices.html" class="kpi-card__new">자세히</a></div>
      <div id="noticeList" class="news-list" style="margin-top:8px;">
        <div class="news-item" style="color:var(--text-tertiary);font-size:13px;padding:8px 0;">공지사항이 없습니다.</div>
      </div>
    </div>
  </div>

  <!-- 내 호스팅 -->
  <div class="section-hd">
    <div class="section-hd__title">내 호스팅</div>
    <a href="/hosting.html" class="section-hd__action">전체 보기</a>
  </div>
  <div id="hostingList" style="display:flex;flex-direction:column;gap:12px;margin-bottom:28px;">
    <div class="empty-card">
      <div class="empty-card__icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="6" rx="1.5"/><rect x="3" y="14" width="18" height="6" rx="1.5"/></svg>
      </div>
      <div>
        <div class="empty-card__text">호스팅이 없습니다</div>
        <div class="empty-card__sub">현재 계정에 호스팅이 없습니다.</div>
      </div>
    </div>
  </div>

  <!-- 내 도메인 영역 -->
  <div class="section-hd">
    <div class="section-hd__title">내 도메인 영역</div>
    <a href="/domains.html" class="section-hd__action">전체 보기</a>
  </div>
  <div id="domainList" style="display:flex;flex-direction:column;gap:10px;">
    <div class="empty-card">
      <div class="empty-card__icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 7a1 1 0 0 1 1-1h4l2 2h8a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V7z"/></svg>
      </div>
      <div>
        <div class="empty-card__text">도메인이 없습니다</div>
        <div class="empty-card__sub">현재 계정에 연결된 도메인이 없습니다.</div>
      </div>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  wpspot.requireAuth();
  wpspot.renderShell('dashboard', '대시보드');

  // 공지사항 API에서 로드
  wpspot.api('/api/notices').then(data => {
    const list = data?.notices || [];
    const el = document.getElementById('noticeList');
    if (!list.length) return;
    el.innerHTML = list.map(n => `
      <div class="news-item">
        <span class="news-item__badge">공지</span>
        <span class="news-item__title">${wpspot.escapeHtml(n.title)}</span>
        <span class="news-item__date">${wpspot.formatDate(n.created_at)}</span>
      </div>
    `).join('');
  }).catch(() => {});
</script>
</body>
</html>
