<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>회원가입 — wpspot</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="app-shell">
    <div class="top-bar">
      <span class="top-bar__title">회원가입</span>
      <a href="/" class="btn btn--ghost btn--s">처음으로</a>
    </div>

    <div class="screen">
      <h1 class="h1 mt-6">wpspot 시작을<br/>위한 정보예요</h1>

      <form id="signupForm" class="mt-6">
        <div class="field">
          <label class="field__label" for="displayName">이름 (선택)</label>
          <input class="field__input" type="text" id="displayName" name="displayName" placeholder="홍길동" />
        </div>
        <div class="field">
          <label class="field__label" for="email">이메일</label>
          <input class="field__input" type="email" id="email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label class="field__label" for="password">비밀번호</label>
          <input class="field__input" type="password" id="password" name="password" placeholder="8자 이상" minlength="8" required />
          <div class="field__help">로그인 시 사용할 비밀번호예요. 8자 이상 입력해주세요.</div>
          <div class="field__help is-error hidden" id="errorMsg"></div>
        </div>

        <div class="mt-6">
          <button type="submit" class="btn btn--primary btn--xl" id="submitBtn">가입하고 시작하기</button>
        </div>
      </form>

      <p class="body-2 text-center mt-6">
        이미 계정이 있으신가요? <a href="/login.html">로그인</a>
      </p>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    const form = document.getElementById("signupForm");
    const errorMsg = document.getElementById("errorMsg");
    const submitBtn = document.getElementById("submitBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorMsg.classList.add("hidden");
      submitBtn.disabled = true;
      submitBtn.textContent = "가입 중...";

      const displayName = document.getElementById("displayName").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      try {
        const data = await wpspot.api("/api/auth/signup", {
          method: "POST",
          body: JSON.stringify({ displayName, email, password }),
        });
        wpspot.setSession(data.token, data.user);
        window.location.href = "/account.html";
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.classList.remove("hidden");
        submitBtn.disabled = false;
        submitBtn.textContent = "가입하고 시작하기";
      }
    });
  </script>
</body>
</html>
