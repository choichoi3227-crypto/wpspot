<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>호스팅 관리 — wpspot</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="app-shell">
  <div class="page-header">
    <div class="page-breadcrumb">
      <a href="/dashboard.html">wpspot</a>
      <span class="page-breadcrumb__sep">›</span>
      <span>관리자 콘솔</span>
      <span class="page-breadcrumb__sep">›</span>
      <span>호스팅 관리</span>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-bar" style="max-width:320px;">
      <span class="search-bar__icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <input type="text" placeholder="호스팅 검색" id="hostingSearch" oninput="filterHosting()" />
    </div>
    <div style="font-size:14px;font-weight:600;color:var(--text-secondary);">내 호스팅 (0)</div>
    <div class="toolbar__spacer"></div>
    <a href="/pricing.html" class="btn btn--primary btn--sm">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      호스팅 추가
    </a>
  </div>

  <div id="hostingList" style="display:flex;flex-direction:column;gap:12px;">
    <div class="empty-card">
      <div class="empty-card__icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="6" rx="1.5"/><rect x="3" y="14" width="18" height="6" rx="1.5"/></svg>
      </div>
      <div>
        <div class="empty-card__text">호스팅이 없습니다</div>
        <div class="empty-card__sub">현재 계정에 호스팅이 없습니다.</div>
      </div>
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
  wpspot.requireAuth();
  wpspot.renderShell('hosting', '호스팅 관리');

  function filterHosting() {}
</script>
</body>
</html>
