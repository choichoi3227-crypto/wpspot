<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PHPLiteAdmin — wpspot</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    /* ── 전체 레이아웃 ── */
    * { box-sizing: border-box; }
    body { margin: 0; background: #f1f5f9; font-family: var(--font-family-sans, system-ui, sans-serif); }

    .pla-layout { display: flex; height: 100vh; overflow: hidden; }

    /* ── 사이드바 ── */
    .pla-sidebar {
      width: 220px;
      flex-shrink: 0;
      background: #1e293b;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .pla-sidebar__brand {
      padding: 16px;
      font-size: 15px;
      font-weight: 700;
      color: #f8fafc;
      border-bottom: 1px solid #334155;
      letter-spacing: -0.3px;
    }
    .pla-sidebar__brand span { color: #60a5fa; }
    .pla-sidebar__section { padding: 10px 8px 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #64748b; }
    .pla-sidebar__list { flex: 1; overflow-y: auto; padding: 4px 8px; }
    .pla-sidebar__item {
      display: block; width: 100%; text-align: left;
      padding: 7px 10px; border-radius: 6px;
      cursor: pointer; background: none; border: none;
      font-size: 13px; color: #94a3b8; margin-bottom: 1px;
      font-family: monospace;
      transition: background 120ms, color 120ms;
    }
    .pla-sidebar__item:hover { background: #334155; color: #e2e8f0; }
    .pla-sidebar__item.active { background: #3b82f6; color: #fff; }
    .pla-sidebar__footer {
      padding: 10px 8px;
      border-top: 1px solid #334155;
    }
    .pla-sidebar__footer button {
      display: block; width: 100%;
      padding: 8px; border-radius: 6px;
      background: none; border: 1px solid #475569;
      color: #94a3b8; font-size: 13px; cursor: pointer;
    }
    .pla-sidebar__footer button:hover { background: #334155; color: #e2e8f0; }

    /* ── 메인 영역 ── */
    .pla-main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

    .pla-topbar {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .pla-topbar__title { font-size: 15px; font-weight: 600; color: #0f172a; font-family: monospace; }
    .pla-topbar__count { font-size: 12px; color: #64748b; background: #f1f5f9; padding: 2px 8px; border-radius: 999px; }

    .pla-content { flex: 1; padding: 20px; }

    /* ── 데이터 테이블 ── */
    .data-wrap { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
    .data-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    .data-table th {
      background: #f8fafc; padding: 9px 12px;
      text-align: left; border-bottom: 2px solid #e2e8f0;
      white-space: nowrap; font-weight: 600; color: #475569;
      position: sticky; top: 0;
    }
    .data-table td {
      padding: 8px 12px; border-bottom: 1px solid #f1f5f9;
      max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      vertical-align: middle;
    }
    .data-table tr:hover td { background: #f8fafc; }
    .data-table .null-val { color: #94a3b8; font-style: italic; }
    .data-table .actions { display: flex; gap: 6px; white-space: nowrap; }

    /* ── 툴바 ── */
    .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
    .toolbar input[type="search"] {
      flex: 1; min-width: 160px; max-width: 320px;
      padding: 7px 12px; border: 1px solid #e2e8f0; border-radius: 8px;
      font-size: 13px; background: #fff; outline: none;
    }
    .toolbar input[type="search"]:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }

    /* ── 버튼 ── */
    .btn-sm {
      padding: 5px 12px; border-radius: 6px; border: none;
      font-size: 12px; cursor: pointer; font-weight: 500;
      transition: background 120ms;
    }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-danger  { background: #fee2e2; color: #dc2626; }
    .btn-danger:hover  { background: #fecaca; }
    .btn-ghost   { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
    .btn-ghost:hover   { background: #e2e8f0; }
    .btn-success { background: #d1fae5; color: #065f46; }
    .btn-success:hover { background: #a7f3d0; }

    /* ── 편집 모달 ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.5); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 16px;
      padding: 24px; width: 100%; max-width: 520px;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      margin: 16px;
    }
    .modal h3 { margin: 0 0 16px; font-size: 16px; font-weight: 700; color: #0f172a; }
    .modal label { display: block; font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 4px; margin-top: 12px; }
    .modal input, .modal textarea, .modal select {
      width: 100%; padding: 9px 12px;
      border: 1px solid #e2e8f0; border-radius: 8px;
      font-size: 13px; font-family: monospace;
      outline: none; background: #f8fafc;
    }
    .modal input:focus, .modal textarea:focus { border-color: #3b82f6; background: #fff; box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
    .modal textarea { resize: vertical; min-height: 100px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
    .modal-error { color: #dc2626; font-size: 12px; margin-top: 8px; display: none; }

    /* ── 로그인 화면 ── */
    .pla-login-wrap {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
    }
    .pla-login-box {
      background: #fff; border-radius: 20px; padding: 40px;
      width: 100%; max-width: 420px; box-shadow: 0 24px 64px rgba(0,0,0,.3);
      margin: 16px;
    }
    .pla-login-box h1 { font-size: 22px; font-weight: 800; color: #0f172a; margin: 0 0 4px; }
    .pla-login-box .subtitle { font-size: 13px; color: #64748b; margin-bottom: 24px; }
    .pla-login-box label { display: block; font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 4px; margin-top: 14px; }
    .pla-login-box input {
      width: 100%; padding: 10px 14px; border: 1.5px solid #e2e8f0;
      border-radius: 10px; font-size: 14px; outline: none; background: #f8fafc;
    }
    .pla-login-box input:focus { border-color: #3b82f6; background: #fff; }
    .pla-login-btn {
      width: 100%; margin-top: 20px; padding: 12px;
      background: #3b82f6; color: #fff; border: none;
      border-radius: 10px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 150ms;
    }
    .pla-login-btn:hover { background: #2563eb; }
    .pla-login-btn:disabled { background: #93c5fd; cursor: not-allowed; }
    .pla-login-error { color: #dc2626; font-size: 13px; margin-top: 10px; display: none; text-align: center; }
    .pla-token-chip {
      font-size: 11px; background: #f1f5f9; color: #475569;
      padding: 4px 10px; border-radius: 6px; margin-bottom: 16px;
      font-family: monospace;
    }

    /* ── 빈 상태 ── */
    .pla-empty { text-align: center; padding: 48px 16px; color: #94a3b8; font-size: 14px; }

    /* ── 페이지네이션 ── */
    .pagination { display: flex; gap: 4px; justify-content: center; margin-top: 14px; }
    .pagination button {
      padding: 5px 10px; border-radius: 6px; border: 1px solid #e2e8f0;
      background: #fff; color: #475569; font-size: 12px; cursor: pointer;
    }
    .pagination button.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
    .pagination button:hover:not(.active) { background: #f1f5f9; }

    .hidden { display: none !important; }
    code { background: #f1f5f9; padding: 1px 5px; border-radius: 4px; font-family: monospace; font-size: .9em; }
  </style>
</head>
<body>

<!-- ── 로그인 화면 ── -->
<div id="loginWrap" class="pla-login-wrap">
  <div class="pla-login-box">
    <h1>PHPLiteAdmin</h1>
    <div class="subtitle">wpspot WordPress DB 관리</div>
    <div id="tokenChip" class="pla-token-chip hidden"></div>
    <label for="plaPassword">비밀번호</label>
    <input type="password" id="plaPassword" placeholder="호스팅 상세에서 확인한 비밀번호" autocomplete="current-password" />
    <div id="loginError" class="pla-login-error"></div>
    <button class="pla-login-btn" id="loginBtn" onclick="doLogin()">로그인</button>
    <p style="font-size:11px;color:#94a3b8;text-align:center;margin-top:16px;">
      접속 링크는 매일 자정(KST) 초기화됩니다.<br/>
      호스팅 관리 페이지에서 새 링크를 받을 수 있어요.
    </p>
  </div>
</div>

<!-- ── 메인 화면 ── -->
<div id="mainWrap" class="pla-layout hidden">
  <!-- 사이드바 -->
  <aside class="pla-sidebar">
    <div class="pla-sidebar__brand"><span>PHP</span>LiteAdmin</div>
    <div class="pla-sidebar__section">WordPress 테이블</div>
    <div class="pla-sidebar__list" id="tableList"></div>
    <div class="pla-sidebar__footer">
      <button onclick="doLogout()">로그아웃</button>
    </div>
  </aside>

  <!-- 메인 -->
  <div class="pla-main">
    <div class="pla-topbar">
      <span class="pla-topbar__title" id="topbarTitle">테이블 선택</span>
      <span class="pla-topbar__count hidden" id="topbarCount"></span>
    </div>
    <div class="pla-content">
      <div id="mainContent">
        <div class="pla-empty">👈 왼쪽에서 테이블을 선택해주세요.</div>
      </div>
    </div>
  </div>
</div>

<!-- 행 편집 모달 -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3 id="editModalTitle">행 편집</h3>
    <div id="editFields"></div>
    <div class="modal-error" id="editError"></div>
    <div class="modal-actions">
      <button class="btn-sm btn-ghost" onclick="closeModal('editModal')">취소</button>
      <button class="btn-sm btn-primary" id="editSaveBtn" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<script>
  // ── 상수 ────────────────────────────────────────────────────────────────
  const WP_TABLES = [
    "wp_options","wp_users","wp_usermeta",
    "wp_posts","wp_postmeta",
    "wp_terms","wp_term_taxonomy","wp_term_relationships",
    "wp_comments","wp_commentmeta","wp_links",
  ];

  // PK 컬럼 매핑
  const TABLE_PK = {
    wp_options: "option_id",
    wp_users: "ID",
    wp_usermeta: "umeta_id",
    wp_posts: "ID",
    wp_postmeta: "meta_id",
    wp_terms: "term_id",
    wp_term_taxonomy: "term_taxonomy_id",
    wp_term_relationships: "object_id",
    wp_comments: "comment_ID",
    wp_commentmeta: "meta_id",
    wp_links: "link_id",
  };

  // ── 상태 ────────────────────────────────────────────────────────────────
  const urlParams = new URLSearchParams(location.search);
  const plaToken = urlParams.get("token") || extractTokenFromPath();
  let sessionToken = null;
  let tableCache = null;
  let currentTable = null;
  let currentPage = 1;
  const PAGE_SIZE = 50;
  let searchQuery = "";
  let editingRow = null;

  function extractTokenFromPath() {
    const parts = location.pathname.split("/").filter(Boolean);
    // /pla/{token}/ 형태 지원
    const idx = parts.indexOf("pla");
    return idx >= 0 ? parts[idx + 1] : (parts[0] || null);
  }

  // 토큰 칩 표시
  if (plaToken) {
    const chip = document.getElementById("tokenChip");
    chip.textContent = `토큰: ${plaToken.slice(0, 8)}…${plaToken.slice(-4)} (오늘 자정 만료)`;
    chip.classList.remove("hidden");
  }

  // Enter 키 로그인
  document.getElementById("plaPassword").addEventListener("keydown", e => {
    if (e.key === "Enter") doLogin();
  });

  // ── 로그인 ──────────────────────────────────────────────────────────────
  async function doLogin() {
    if (!plaToken) { showLoginError("접속 토큰이 없어요. 호스팅 상세 페이지에서 링크를 다시 받아주세요."); return; }
    const password = document.getElementById("plaPassword").value;
    if (!password) { showLoginError("비밀번호를 입력해주세요."); return; }

    const btn = document.getElementById("loginBtn");
    btn.disabled = true; btn.textContent = "로그인 중…";

    try {
      const res = await fetch(`/api/pla/${plaToken}/auth`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password }),
      });
      const data = await res.json();
      if (!res.ok) { showLoginError(data.error || "로그인 실패"); return; }

      sessionToken = data.sessionToken;
      document.getElementById("loginWrap").classList.add("hidden");
      document.getElementById("mainWrap").classList.remove("hidden");
      renderSidebar();
      loadTable("wp_options");
    } catch (e) {
      showLoginError(e.message);
    } finally {
      btn.disabled = false; btn.textContent = "로그인";
    }
  }

  function showLoginError(msg) {
    const el = document.getElementById("loginError");
    el.textContent = msg;
    el.style.display = "block";
  }

  function doLogout() {
    sessionToken = null;
    tableCache = null;
    currentTable = null;
    document.getElementById("mainWrap").classList.add("hidden");
    document.getElementById("loginWrap").classList.remove("hidden");
    document.getElementById("plaPassword").value = "";
  }

  // ── 사이드바 ────────────────────────────────────────────────────────────
  function renderSidebar() {
    const list = document.getElementById("tableList");
    list.innerHTML = WP_TABLES.map(t =>
      `<button class="pla-sidebar__item" id="sb_${t}" onclick="loadTable('${t}')">${t.replace("wp_","")}</button>`
    ).join("");
  }

  function setActiveTable(name) {
    WP_TABLES.forEach(t => {
      const el = document.getElementById("sb_" + t);
      if (el) el.classList.toggle("active", t === name);
    });
  }

  // ── 테이블 로드 ─────────────────────────────────────────────────────────
  async function loadTable(tableName) {
    currentTable = tableName;
    currentPage = 1;
    searchQuery = "";
    setActiveTable(tableName);
    document.getElementById("topbarTitle").textContent = tableName;
    document.getElementById("topbarCount").classList.add("hidden");
    document.getElementById("mainContent").innerHTML = `<div class="pla-empty">불러오는 중…</div>`;

    try {
      if (!tableCache) {
        const res = await fetch("/api/pla/tables", {
          headers: { "Authorization": `Bearer ${sessionToken}` },
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "조회 실패");
        tableCache = data.tables;
      }
      renderTable(tableName);
    } catch (e) {
      document.getElementById("mainContent").innerHTML = `<div class="pla-empty" style="color:#dc2626;">${esc(e.message)}</div>`;
    }
  }

  function renderTable(tableName) {
    const allRows = tableCache[tableName] || [];
    const filtered = searchQuery
      ? allRows.filter(row => Object.values(row).some(v => String(v ?? "").toLowerCase().includes(searchQuery)))
      : allRows;

    const total = filtered.length;
    const pageCount = Math.ceil(total / PAGE_SIZE) || 1;
    currentPage = Math.min(currentPage, pageCount);
    const start = (currentPage - 1) * PAGE_SIZE;
    const rows = filtered.slice(start, start + PAGE_SIZE);

    const count = document.getElementById("topbarCount");
    count.textContent = `${total}개 행`;
    count.classList.remove("hidden");

    if (!allRows.length) {
      document.getElementById("mainContent").innerHTML = `
        <div class="toolbar">
          ${addRowBtn(tableName)}
        </div>
        <div class="pla-empty">데이터가 없어요.</div>`;
      return;
    }

    const cols = Object.keys(allRows[0]).filter(c => c !== "site_id");
    const pk = TABLE_PK[tableName] || cols[0];

    const thead = `<tr>
      ${cols.map(c => `<th>${esc(c)}</th>`).join("")}
      <th style="width:90px;">작업</th>
    </tr>`;

    const tbody = rows.map(row => {
      const pkVal = row[pk];
      const cells = cols.map(c => {
        const v = row[c];
        const display = v === null || v === undefined ? '<span class="null-val">NULL</span>' : esc(String(v).slice(0, 100));
        return `<td title="${esc(String(v ?? ''))}">${display}</td>`;
      });
      const rowJson = encodeURIComponent(JSON.stringify(row));
      return `<tr>
        ${cells.join("")}
        <td>
          <div class="actions">
            <button class="btn-sm btn-ghost" onclick="openEdit('${esc(tableName)}', '${esc(pk)}', '${esc(String(pkVal))}', decodeURIComponent('${rowJson}'))">수정</button>
            <button class="btn-sm btn-danger" onclick="deleteRow('${esc(tableName)}', '${esc(pk)}', '${esc(String(pkVal))}')">삭제</button>
          </div>
        </td>
      </tr>`;
    }).join("");

    // 페이지네이션
    let pager = "";
    if (pageCount > 1) {
      const pages = [];
      for (let i = 1; i <= pageCount; i++) {
        if (i === 1 || i === pageCount || Math.abs(i - currentPage) <= 2) {
          pages.push(`<button class="${i === currentPage ? 'active' : ''}" onclick="gotoPage(${i})">${i}</button>`);
        } else if (pages[pages.length - 1] !== "…") {
          pages.push("…");
        }
      }
      pager = `<div class="pagination">${pages.join("")}</div>`;
    }

    document.getElementById("mainContent").innerHTML = `
      <div class="toolbar">
        <input type="search" placeholder="검색…" value="${esc(searchQuery)}" oninput="doSearch(this.value)" />
        <span style="color:#64748b;font-size:12px;">${start + 1}–${Math.min(start + PAGE_SIZE, total)} / ${total}</span>
        ${addRowBtn(tableName)}
        <button class="btn-sm btn-ghost" onclick="refreshTable()">새로고침</button>
      </div>
      <div class="data-wrap" style="overflow-x:auto;">
        <table class="data-table">
          <thead>${thead}</thead>
          <tbody>${tbody}</tbody>
        </table>
      </div>
      ${pager}
    `;
  }

  function addRowBtn(t) {
    return `<button class="btn-sm btn-success" onclick="openAddRow('${esc(t)}')">+ 행 추가</button>`;
  }

  function doSearch(val) {
    searchQuery = val.toLowerCase();
    currentPage = 1;
    renderTable(currentTable);
  }

  function gotoPage(n) {
    currentPage = n;
    renderTable(currentTable);
  }

  function refreshTable() {
    tableCache = null;
    loadTable(currentTable);
  }

  // ── 행 편집 ─────────────────────────────────────────────────────────────
  function openEdit(tableName, pk, pkValue, rowJson) {
    const row = JSON.parse(rowJson);
    const cols = Object.keys(row).filter(c => c !== "site_id");
    editingRow = { tableName, pk, pkValue, mode: "edit" };

    document.getElementById("editModalTitle").textContent = `수정 — ${tableName}`;
    document.getElementById("editError").style.display = "none";

    const fields = cols.map(c => {
      const v = row[c];
      const isLong = String(v ?? "").length > 80 || c.includes("content") || c.includes("value") || c.includes("notes");
      const input = isLong
        ? `<textarea id="ef_${esc(c)}" rows="4">${esc(String(v ?? ""))}</textarea>`
        : `<input type="text" id="ef_${esc(c)}" value="${esc(String(v ?? ""))}" />`;
      return `<div><label>${esc(c)} ${c === pk ? '<code>PK</code>' : ''}</label>${input}</div>`;
    }).join("");

    document.getElementById("editFields").innerHTML = fields;
    document.getElementById("editSaveBtn").onclick = () => saveEdit(cols);
    document.getElementById("editModal").classList.add("open");
  }

  function openAddRow(tableName) {
    const rows = tableCache?.[tableName] || [];
    const cols = rows.length > 0
      ? Object.keys(rows[0]).filter(c => c !== "site_id" && c !== TABLE_PK[tableName])
      : [];

    if (!cols.length) {
      alert("이 테이블의 구조를 알 수 없어요. 먼저 기존 데이터가 있어야 합니다.");
      return;
    }

    editingRow = { tableName, mode: "add" };
    document.getElementById("editModalTitle").textContent = `행 추가 — ${tableName}`;
    document.getElementById("editError").style.display = "none";

    const fields = cols.map(c => {
      const isLong = c.includes("content") || c.includes("value") || c.includes("notes");
      const input = isLong
        ? `<textarea id="ef_${esc(c)}" rows="3" placeholder="${esc(c)}"></textarea>`
        : `<input type="text" id="ef_${esc(c)}" placeholder="${esc(c)}" />`;
      return `<div><label>${esc(c)}</label>${input}</div>`;
    }).join("");

    document.getElementById("editFields").innerHTML = fields;
    document.getElementById("editSaveBtn").onclick = () => saveNewRow(cols);
    document.getElementById("editModal").classList.add("open");
  }

  async function saveEdit(cols) {
    const { tableName, pk, pkValue } = editingRow;
    const errEl = document.getElementById("editError");
    errEl.style.display = "none";

    // 변경된 필드만 저장 (첫 번째 편집 가능 컬럼만 단건으로 업데이트 가능한 API 구조이므로 순차 처리)
    const promises = cols.filter(c => c !== pk).map(async c => {
      const el = document.getElementById("ef_" + c);
      if (!el) return;
      const value = el.value;
      await fetch("/api/pla/update", {
        method: "POST",
        headers: { "Authorization": `Bearer ${sessionToken}`, "Content-Type": "application/json" },
        body: JSON.stringify({ table: tableName, pk, pkValue, field: c, value }),
      });
    });

    try {
      await Promise.all(promises);
      closeModal("editModal");
      tableCache = null;
      loadTable(tableName);
    } catch (e) {
      errEl.textContent = e.message;
      errEl.style.display = "block";
    }
  }

  async function saveNewRow(cols) {
    const { tableName } = editingRow;
    const errEl = document.getElementById("editError");
    errEl.style.display = "none";

    // 새 행 추가는 worker.js에 INSERT 엔드포인트가 필요 — 현재는 안내로 대체
    // (필요 시 /api/pla/insert 엔드포인트 추가 가능)
    errEl.textContent = "행 추가는 현재 WordPress 관리자(wp-admin)에서 진행해주세요. 직접 INSERT가 필요한 경우 서버의 phpliteadmin.php에 접속하세요.";
    errEl.style.display = "block";
  }

  async function deleteRow(tableName, pk, pkValue) {
    if (!confirm(`이 행(${pk}=${pkValue})을 삭제할까요?\n이 작업은 되돌릴 수 없어요.`)) return;
    try {
      const res = await fetch("/api/pla/delete", {
        method: "POST",
        headers: { "Authorization": `Bearer ${sessionToken}`, "Content-Type": "application/json" },
        body: JSON.stringify({ table: tableName, pk, pkValue }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "삭제 실패");
      tableCache = null;
      loadTable(tableName);
    } catch (e) {
      alert(e.message);
    }
  }

  // ── 모달 ────────────────────────────────────────────────────────────────
  function closeModal(id) {
    document.getElementById(id).classList.remove("open");
  }

  document.getElementById("editModal").addEventListener("click", e => {
    if (e.target === document.getElementById("editModal")) closeModal("editModal");
  });

  // ── 유틸 ────────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s ?? "").replace(/[&<>"']/g, c =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
    );
  }
</script>
</body>
</html>
