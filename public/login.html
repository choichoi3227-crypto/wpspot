<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>로그인 — wpspot</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="app-shell">
    <div class="top-bar">
      <span class="top-bar__title">로그인</span>
      <a href="/" class="btn btn--ghost btn--s">처음으로</a>
    </div>

    <div class="screen">
      <h1 class="h1 mt-6">다시 만나서<br/>반가워요</h1>

      <form id="loginForm" class="mt-6">
        <div class="field">
          <label class="field__label" for="email">이메일</label>
          <input class="field__input" type="email" id="email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label class="field__label" for="password">비밀번호</label>
          <input class="field__input" type="password" id="password" name="password" placeholder="비밀번호" required />
          <div class="field__help is-error hidden" id="errorMsg"></div>
        </div>

        <div class="mt-6">
          <button type="submit" class="btn btn--primary btn--xl" id="submitBtn">로그인</button>
        </div>
      </form>

      <p class="body-2 text-center mt-6">
        아직 계정이 없으신가요? <a href="/signup.html">회원가입</a>
      </p>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    const form = document.getElementById("loginForm");
    const errorMsg = document.getElementById("errorMsg");
    const submitBtn = document.getElementById("submitBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorMsg.classList.add("hidden");
      submitBtn.disabled = true;
      submitBtn.textContent = "로그인 중...";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      try {
        const data = await wpspot.api("/api/auth/login", {
          method: "POST",
          body: JSON.stringify({ email, password }),
        });
        wpspot.setSession(data.token, data.user);
        window.location.href = "/dashboard.html";
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.classList.remove("hidden");
        submitBtn.disabled = false;
        submitBtn.textContent = "로그인";
      }
    });
  </script>
</body>
</html>
