<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>호스팅 상세 — wpspot</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="app-shell">
    <div class="top-bar">
      <span class="top-bar__title">호스팅 상세</span>
      <a href="/dashboard.html" class="btn btn--ghost btn--s">대시보드</a>
    </div>

    <div class="screen">
      <h1 class="h1 mt-2" id="siteTitle">호스팅 정보</h1>
      <p class="caption" id="siteSub"></p>

      <div id="content" class="mt-6">
        <div class="empty">불러오는 중...</div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    const siteId = new URLSearchParams(location.search).get("site");
    if (wpspot.requireAuth()) load();

    async function load() {
      const content = document.getElementById("content");
      if (!siteId) {
        content.innerHTML = `<div class="empty">사이트 ID가 없어요.</div>`;
        return;
      }
      try {
        const sites = (await wpspot.api("/api/sites")).sites || [];
        const site = sites.find((s) => s.id === siteId);
        if (site) {
          document.getElementById("siteTitle").textContent = site.site_name;
          document.getElementById("siteSub").textContent = site.github_repo || "프로비저닝 전";
        }

        const data = await wpspot.api(`/api/sites/${siteId}/credentials`);
        if (!data.provisioned) {
          content.innerHTML = `<div class="empty">아직 프로비저닝되지 않았어요.<br/>대시보드에서 프로비저닝을 먼저 진행해주세요.</div>`;
          return;
        }
        content.innerHTML = render(data);
        bindCopyButtons();
      } catch (e) {
        content.innerHTML = `<div class="empty">${wpspot.escapeHtml(e.message)}</div>`;
      }
    }

    function maskedField(label, maskedValue, realValue, copyable) {
      return `
        <div class="field">
          <div class="field__label">${label}</div>
          <div class="row">
            <input class="field__input tabular" type="text" value="${wpspot.escapeHtml(maskedValue ?? "")}" readonly id="field_${label.replace(/\s/g,'_')}" />
            ${copyable ? `<button class="btn btn--secondary btn--s" data-copy="${wpspot.escapeHtml(realValue ?? "")}">복사</button>` : ""}
          </div>
        </div>
      `;
    }

    function field(label, value, copy) {
      return `
        <div class="field">
          <div class="field__label">${label}</div>
          <div class="row">
            <input class="field__input tabular" type="text" value="${wpspot.escapeHtml(value ?? "")}" readonly />
            ${copy ? `<button class="btn btn--secondary btn--s" data-copy="${wpspot.escapeHtml(value ?? "")}">복사</button>` : ""}
          </div>
        </div>
      `;
    }

    function render(data) {
      const pma = data.phpmyadmin;
      const pmaPass = pma.password || "";
      const maskedPass = pmaPass ? "••••••••" : "(프로비저닝 후 표시)";

      return `
        <section class="section">
          <div class="section__header">
            <span class="title-1" style="margin:0;">phpMyAdmin</span>
            ${wpspot.statusBadge("active")}
          </div>
          <div class="card">
            <div class="field">
              <div class="field__label">접속 주소</div>
              <div class="row">
                <input class="field__input tabular" type="text" value="${wpspot.escapeHtml(pma.url)}" readonly />
                <button class="btn btn--secondary btn--s" data-copy="${wpspot.escapeHtml(pma.url)}">복사</button>
                <a class="btn btn--primary btn--s" href="${wpspot.escapeHtml(pma.url)}" target="_blank">열기</a>
              </div>
              <div class="field__help">${wpspot.escapeHtml(pma.note || "")}</div>
            </div>
            ${maskedField("아이디", pma.username, pma.username, true)}
            ${maskedField("비밀번호", maskedPass, pmaPass, !!pmaPass)}
            ${field("DB 경로 (레포 내)", pma.dbPath)}
            <p class="caption mt-2">
              📋 접속 방법: 위 주소로 이동 → 아이디/비밀번호 입력 → 로그인<br/>
              🔒 접속 링크는 매일 자정(KST) 자동으로 초기화돼요. 새 링크는 이 페이지를 새로고침하면 확인할 수 있어요.
            </p>
          </div>
        </section>

        <section class="section">
          <div class="section__header">
            <span class="title-1" style="margin:0;">스토리지 구성</span>
          </div>
          <div class="card">
            <table style="width:100%; border-collapse:collapse; font-size: 0.875rem;">
              <thead>
                <tr style="border-bottom: 1px solid var(--color-border);">
                  <th style="text-align:left; padding: 8px 4px; font-weight:600;">데이터 종류</th>
                  <th style="text-align:left; padding: 8px 4px; font-weight:600;">저장 위치</th>
                </tr>
              </thead>
              <tbody>
                <tr><td style="padding:8px 4px;">글 / 페이지 (콘텐츠)</td><td style="padding:8px 4px;">Blogspot + GitHub 레포</td></tr>
                <tr><td style="padding:8px 4px;">WP 설정 / 사용자 / 카테고리</td><td style="padding:8px 4px;">자체 phpMyAdmin (D1 DB)</td></tr>
                <tr><td style="padding:8px 4px;">미디어 / 파일</td><td style="padding:8px 4px;">사용자 GitHub 레포</td></tr>
                <tr><td style="padding:8px 4px;">테마 / 플러그인</td><td style="padding:8px 4px;">사용자 GitHub 레포</td></tr>
                <tr><td style="padding:8px 4px;">사이트 기본 정보</td><td style="padding:8px 4px;">자체 phpMyAdmin (D1 DB)</td></tr>
              </tbody>
            </table>
          </div>
        </section>

        <section class="section">
          <div class="section__header"><span class="title-1" style="margin:0;">SFTP (GitHub API 대체)</span></div>
          <div class="card">
            ${field("연결 계정", data.sftp.username)}
            ${field("루트 경로", data.sftp.root)}
            ${field("레포지토리", data.sftp.repo)}
            <p class="caption">${wpspot.escapeHtml(data.sftp.note)}</p>
            <a class="btn btn--primary btn--l" href="${data.sftp.url}">파일 관리자 열기</a>
          </div>
        </section>

        <section class="section">
          <div class="section__header">
            <span class="title-1" style="margin:0;">nginx + PHP (ephemeral 컨테이너)</span>
            ${wpspot.statusBadge(data.nginx.status === "ready" ? "active" : "pending")}
          </div>
          <div class="card">
            <p class="body-2">${wpspot.escapeHtml(data.nginx.engine)}</p>
            ${field("프록시 워커 URL", data.nginx.workerUrl || "-", true)}
          </div>
        </section>
      `;
    }

    function bindCopyButtons() {
      document.querySelectorAll("[data-copy]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const val = btn.dataset.copy;
          if (!val || val === "(프로비저닝 후 표시)") { wpspot.toast("복사할 값이 없어요"); return; }
          navigator.clipboard?.writeText(val);
          wpspot.toast("복사했어요");
        });
      });
    }
  </script>
</body>
</html>
