<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>파일 관리자 — wpspot</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="app-shell">
    <div class="top-bar">
      <span class="top-bar__title">파일 관리자</span>
      <a id="backLink" href="/dashboard.html" class="btn btn--ghost btn--s">호스팅</a>
    </div>

    <div class="screen">
      <p class="caption" id="pathLabel">/</p>

      <div id="listView" class="card" style="padding: var(--space-2) var(--space-5);">
        <div class="empty">불러오는 중...</div>
      </div>

      <div id="editView" class="hidden">
        <div class="field">
          <label class="field__label" id="editPathLabel">파일</label>
          <textarea class="field__input" id="editArea" rows="16" style="height:auto; padding: var(--space-3); font-family: monospace; font-size: 13px;"></textarea>
        </div>
        <div class="row">
          <button class="btn btn--primary btn--l" id="saveBtn">저장</button>
          <button class="btn btn--secondary btn--l" id="cancelBtn">취소</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    const siteId = new URLSearchParams(location.search).get("site");
    let currentPath = "";

    if (wpspot.requireAuth()) {
      document.getElementById("backLink").href = `/hosting-info.html?site=${siteId}`;
      loadDir("");
    }

    async function loadDir(path) {
      currentPath = path;
      document.getElementById("pathLabel").textContent = "/" + path;
      document.getElementById("listView").classList.remove("hidden");
      document.getElementById("editView").classList.add("hidden");
      const listView = document.getElementById("listView");
      listView.innerHTML = `<div class="empty">불러오는 중...</div>`;

      try {
        const data = await wpspot.api(`/api/sites/${siteId}/files?path=${encodeURIComponent(path)}`);
        if (data.type !== "dir") {
          return openFile(path);
        }
        let items = data.items.slice().sort((a, b) => {
          if (a.type !== b.type) return a.type === "dir" ? -1 : 1;
          return a.name.localeCompare(b.name);
        });

        let html = "";
        if (path) {
          const parent = path.split("/").slice(0, -1).join("/");
          html += `<div class="list-row" data-nav="${parent}"><div class="list-row__main"><span class="list-row__title">.. (상위 폴더)</span></div></div>`;
        }
        if (!items.length) {
          html += `<div class="empty">빈 폴더예요.</div>`;
        }
        for (const it of items) {
          if (it.type === "dir") {
            html += `<div class="list-row" data-nav="${it.path}"><div class="list-row__main"><span class="list-row__title">${wpspot.escapeHtml(it.name)}/</span></div></div>`;
          } else {
            html += `<div class="list-row" data-open="${it.path}"><div class="list-row__main"><span class="list-row__title">${wpspot.escapeHtml(it.name)}</span><span class="list-row__sub">${it.size} bytes</span></div></div>`;
          }
        }
        listView.innerHTML = html;

        listView.querySelectorAll("[data-nav]").forEach((el) => {
          el.addEventListener("click", () => loadDir(el.dataset.nav));
        });
        listView.querySelectorAll("[data-open]").forEach((el) => {
          el.addEventListener("click", () => openFile(el.dataset.open));
        });
      } catch (e) {
        listView.innerHTML = `<div class="empty">${wpspot.escapeHtml(e.message)}</div>`;
      }
    }

    function base64ToUtf8(b64) {
      const bin = atob(b64.replace(/\n/g, ""));
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return new TextDecoder("utf-8", { fatal: false }).decode(bytes);
    }

    function utf8ToBase64(str) {
      const bytes = new TextEncoder().encode(str);
      let bin = "";
      for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
      return btoa(bin);
    }

    async function openFile(path) {
      try {
        const data = await wpspot.api(`/api/sites/${siteId}/files?path=${encodeURIComponent(path)}`);
        if (data.type === "dir") return loadDir(path);

        const isBinary = data.size > 200000; // 대략적 가드 (대용량/바이너리 편집 방지)
        document.getElementById("listView").classList.add("hidden");
        document.getElementById("editView").classList.remove("hidden");
        document.getElementById("editPathLabel").textContent = path;

        const area = document.getElementById("editArea");
        if (isBinary) {
          area.value = "(바이너리 또는 대용량 파일은 미리보기를 지원하지 않아요)";
          area.disabled = true;
        } else {
          area.value = base64ToUtf8(data.content);
          area.disabled = false;
        }

        document.getElementById("saveBtn").onclick = async () => {
          if (isBinary) return;
          try {
            await wpspot.api(`/api/sites/${siteId}/files`, {
              method: "PUT",
              body: JSON.stringify({ path, content: utf8ToBase64(area.value), message: `chore: edit ${path}` }),
            });
            wpspot.toast("저장됐어요");
          } catch (e) {
            wpspot.toast(e.message);
          }
        };
        document.getElementById("cancelBtn").onclick = () => {
          const parent = path.split("/").slice(0, -1).join("/");
          loadDir(parent);
        };
      } catch (e) {
        wpspot.toast(e.message);
      }
    }
  </script>
</body>
</html>
