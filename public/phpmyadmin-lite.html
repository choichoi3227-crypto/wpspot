<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>phpMyAdmin — wpspot</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .pma-layout { display: flex; height: 100vh; overflow: hidden; }
    .pma-sidebar { width: 220px; flex-shrink: 0; background: var(--color-surface-2); border-right: 1px solid var(--color-border); overflow-y: auto; padding: var(--space-3); }
    .pma-main { flex: 1; overflow-y: auto; padding: var(--space-5); }
    .pma-table-btn { display: block; width: 100%; text-align: left; padding: var(--space-2) var(--space-3); border-radius: var(--radius-s); cursor: pointer; background: none; border: none; font-size: 0.85rem; color: var(--color-text); margin-bottom: 2px; }
    .pma-table-btn:hover, .pma-table-btn.active { background: var(--color-primary-light, #eff6ff); color: var(--color-primary); }
    .pma-login { max-width: 400px; margin: 80px auto; }
    table.data-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    table.data-table th { background: var(--color-surface-2); padding: 6px 10px; text-align: left; border-bottom: 2px solid var(--color-border); white-space: nowrap; }
    table.data-table td { padding: 6px 10px; border-bottom: 1px solid var(--color-border); max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    table.data-table tr:hover td { background: var(--color-surface-2); }
    .pma-token-info { font-size: 0.8rem; color: var(--color-text-secondary); margin-bottom: var(--space-4); }
  </style>
</head>
<body>
  <!-- 로그인 화면 -->
  <div id="loginScreen" class="screen">
    <div class="top-bar">
      <span class="top-bar__brand">phpMyAdmin</span>
      <span class="caption">wpspot powered</span>
    </div>
    <div class="pma-login">
      <div class="card">
        <div class="title-1 mb-4">phpMyAdmin 로그인</div>
        <p class="body-2 mb-4">호스팅 상세 페이지에서 확인한 아이디와 비밀번호를 입력해주세요.</p>
        <div id="pmaTokenInfo" class="pma-token-info"></div>
        <div class="field">
          <label class="field__label" for="pmaUsername">아이디</label>
          <input class="field__input" type="text" id="pmaUsername" autocomplete="off" />
        </div>
        <div class="field">
          <label class="field__label" for="pmaPassword">비밀번호</label>
          <input class="field__input" type="password" id="pmaPassword" />
        </div>
        <div id="loginError" class="field__help is-error hidden mt-2"></div>
        <button class="btn btn--primary btn--l mt-4" onclick="doLogin()">로그인</button>
      </div>
    </div>
  </div>

  <!-- 메인 phpMyAdmin 화면 -->
  <div id="pmaScreen" class="pma-layout" style="display:none;">
    <div class="pma-sidebar">
      <div style="font-weight:700; font-size:0.9rem; margin-bottom: var(--space-3);">WordPress 스키마</div>
      <div id="tableList"></div>
      <hr style="margin: var(--space-3) 0;" />
      <button class="btn btn--ghost btn--s" style="width:100%" onclick="doLogout()">로그아웃</button>
    </div>
    <div class="pma-main">
      <div id="tableContent">
        <div class="empty" style="margin-top: 60px;">왼쪽에서 테이블을 선택해주세요.</div>
      </div>
    </div>
  </div>

  <script>
    const WP_TABLES = [
      "wp_options", "wp_users", "wp_usermeta",
      "wp_posts", "wp_postmeta",
      "wp_terms", "wp_term_taxonomy", "wp_term_relationships",
      "wp_comments", "wp_commentmeta", "wp_links"
    ];

    // URL에서 토큰 추출 (/phpmyadmin-lite.html?token=xxx 또는 경로 기반)
    const urlParams = new URLSearchParams(location.search);
    const pmaToken = urlParams.get("token") || extractTokenFromPath();

    function extractTokenFromPath() {
      // https://phpmyadmin.cloud-press.co.kr/{token}/ 형태 지원
      const parts = location.pathname.split("/").filter(Boolean);
      return parts[0] || null;
    }

    let sessionToken = null;

    if (pmaToken) {
      document.getElementById("pmaTokenInfo").textContent = `접속 토큰: ${pmaToken.slice(0, 8)}...${pmaToken.slice(-4)} (오늘 자정 KST 만료)`;
    } else {
      document.getElementById("pmaTokenInfo").textContent = "URL에 접속 토큰이 없어요. 호스팅 상세 페이지에서 접속 링크를 다시 확인해주세요.";
    }

    async function doLogin() {
      if (!pmaToken) { showError("접속 토큰이 없어요."); return; }
      const username = document.getElementById("pmaUsername").value.trim();
      const password = document.getElementById("pmaPassword").value;
      if (!username || !password) { showError("아이디와 비밀번호를 입력해주세요."); return; }

      try {
        const res = await fetch(`/api/pma/${pmaToken}/auth`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) { showError(data.error || "로그인 실패"); return; }

        sessionToken = data.sessionToken;
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("pmaScreen").style.display = "flex";
        renderSidebar();
        loadTable("wp_options");
      } catch (e) {
        showError(e.message);
      }
    }

    function showError(msg) {
      const el = document.getElementById("loginError");
      el.textContent = msg;
      el.classList.remove("hidden");
    }

    function doLogout() {
      sessionToken = null;
      document.getElementById("pmaScreen").style.display = "none";
      document.getElementById("loginScreen").style.display = "";
    }

    function renderSidebar() {
      const list = document.getElementById("tableList");
      list.innerHTML = WP_TABLES.map(t =>
        `<button class="pma-table-btn" id="btn_${t}" onclick="loadTable('${t}')">${t}</button>`
      ).join("");
    }

    let tableCache = null;

    async function loadTable(tableName) {
      WP_TABLES.forEach(t => {
        const btn = document.getElementById("btn_" + t);
        if (btn) btn.classList.toggle("active", t === tableName);
      });

      const content = document.getElementById("tableContent");
      content.innerHTML = `<div class="empty">불러오는 중...</div>`;

      try {
        if (!tableCache) {
          const res = await fetch("/api/pma/tables", {
            headers: { "Authorization": `Bearer ${sessionToken}` },
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "조회 실패");
          tableCache = data.tables;
        }

        const rows = tableCache[tableName] || [];
        if (rows.length === 0) {
          content.innerHTML = `<h2 class="h2">${tableName}</h2><div class="empty mt-4">데이터가 없어요.</div>`;
          return;
        }

        const cols = Object.keys(rows[0]);
        const thead = `<tr>${cols.map(c => `<th>${esc(c)}</th>`).join("")}</tr>`;
        const tbody = rows.map(row =>
          `<tr>${cols.map(c => `<td title="${esc(String(row[c] ?? ''))}">${esc(String(row[c] ?? '').slice(0, 80))}</td>`).join("")}</tr>`
        ).join("");

        content.innerHTML = `
          <h2 class="h2">${tableName}</h2>
          <p class="caption mb-4">${rows.length}개 행</p>
          <div style="overflow-x:auto;">
            <table class="data-table"><thead>${thead}</thead><tbody>${tbody}</tbody></table>
          </div>
        `;
      } catch (e) {
        content.innerHTML = `<div class="empty">${esc(e.message)}</div>`;
      }
    }

    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    }

    // Enter 키 로그인
    document.addEventListener("keydown", e => {
      if (e.key === "Enter" && document.getElementById("loginScreen").style.display !== "none") doLogin();
    });
  </script>
</body>
</html>
