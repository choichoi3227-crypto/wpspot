name: wpspot Sync

on:
  workflow_dispatch:
    inputs:
      blogger_blog_id:
        description: "연동할 Blogspot Blog ID"
        required: false
  schedule:
    # keep-alive: 매 6시간마다 워커에 핑 전송 (GitHub Actions 최소 주기 준수)
    - cron: "0 */6 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 블로그스팟 템플릿 동기화
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.blogger_blog_id != '' }}
        env:
          GCP_BLOGGER_TOKEN: ${{ secrets.GCP_BLOGGER_TOKEN }}
          BLOG_ID: ${{ inputs.blogger_blog_id }}
          WORKER_URL: ${{ secrets.CF_WORKER_URL }}
        run: node scripts/blogger-sync.js

      - name: 블로그스팟 템플릿 주기적 재동기화 (keep-alive 겸)
        if: ${{ github.event_name == 'schedule' }}
        env:
          GCP_BLOGGER_TOKEN: ${{ secrets.GCP_BLOGGER_TOKEN }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
          WORKER_URL: ${{ secrets.CF_WORKER_URL }}
        run: |
          if [ -n "$BLOG_ID" ] && [ -n "$GCP_BLOGGER_TOKEN" ]; then
            node scripts/blogger-sync.js
          else
            echo "BLOG_ID 또는 GCP_BLOGGER_TOKEN secret이 설정되지 않아 동기화를 건너뜁니다."
          fi

      - name: Keep-alive ping
        if: ${{ github.event_name == 'schedule' }}
        env:
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
        run: |
          if [ -n "$CF_WORKER_URL" ]; then
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" "$CF_WORKER_URL" || echo "000")
            echo "keep-alive ping → $CF_WORKER_URL : HTTP $STATUS"
          else
            echo "CF_WORKER_URL secret이 설정되지 않아 keep-alive를 건너뜁니다."
          fi
