name: wpspot Keep-Alive Ping

on:
  schedule:
    # 매 6시간마다 Worker에 핑 전송 (GitHub Actions 유지)
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Keep-alive ping (CF Worker)
        env:
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
        run: |
          if [ -n "$CF_WORKER_URL" ]; then
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 "$CF_WORKER_URL" || echo "000")
            echo "keep-alive ping → $CF_WORKER_URL : HTTP $STATUS"
            # PMA Worker도 핑
            PMA_URL=$(echo "$CF_WORKER_URL" | sed 's/\.workers\.dev/-pma.workers.dev/')
            PMA_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 "$PMA_URL" || echo "000")
            echo "keep-alive ping (PMA) → $PMA_URL : HTTP $PMA_STATUS"
          else
            echo "CF_WORKER_URL Secret이 설정되지 않아 keep-alive를 건너뜁니다."
          fi
