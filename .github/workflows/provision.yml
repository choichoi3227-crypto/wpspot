name: wpspot Provision

on:
  workflow_dispatch:
    inputs:
      site_slug:
        description: "사이트 slug"
        required: true
      site_display_name:
        description: "사이트 표시 이름"
        required: false
        default: ""
      custom_domain:
        description: "사용자 개인 도메인 (예: example.com)"
        required: false
        default: ""
      pma_domain:
        description: "PHPLiteAdmin 도메인 (예: pma.example.com)"
        required: false
        default: ""
      wp_admin_user:
        description: "WordPress 관리자 ID"
        required: false
        default: "wpadmin"
      wp_admin_pass:
        description: "WordPress 관리자 비밀번호"
        required: false
        default: ""
      secret_cf_account_id:
        description: "Cloudflare Account ID"
        required: false
        default: ""
      secret_cf_api_token:
        description: "Cloudflare API Token (Tunnel:Edit + Worker:Edit)"
        required: false
        default: ""
      secret_github_token:
        description: "GitHub PAT"
        required: false
        default: ""
      secret_worker_name:
        description: "Cloudflare Worker 이름"
        required: false
        default: ""
      wpspot_callback_url:
        description: "wpspot 콜백 URL"
        required: false
        default: ""
      wpspot_site_id:
        description: "wpspot 사이트 ID"
        required: false
        default: ""
      wpspot_jwt:
        description: "wpspot JWT"
        required: false
        default: ""
      upstash_redis_url:
        description: "Upstash Redis REST URL (선택)"
        required: false
        default: ""
      upstash_redis_token:
        description: "Upstash Redis REST Token (선택)"
        required: false
        default: ""

jobs:
  provision:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: 민감 정보 마스킹
        run: |
          echo "::add-mask::${{ inputs.wp_admin_pass }}"
          echo "::add-mask::${{ inputs.secret_cf_account_id }}"
          echo "::add-mask::${{ inputs.secret_cf_api_token }}"
          echo "::add-mask::${{ inputs.secret_github_token }}"
          echo "::add-mask::${{ inputs.wpspot_jwt }}"
          echo "::add-mask::${{ inputs.upstash_redis_url }}"
          echo "::add-mask::${{ inputs.upstash_redis_token }}"

      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: PHP 8.3 설치
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, sqlite3, pdo_sqlite, gd, zip, curl, xml, intl, opcache
          ini-values: |
            upload_max_filesize=64M
            post_max_size=64M
            memory_limit=256M
            max_execution_time=300
            display_errors=Off
            log_errors=On

      - name: WP-CLI 설치
        run: |
          curl -sSL -f https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar \
            -o /usr/local/bin/wp
          chmod +x /usr/local/bin/wp
          wp --info --allow-root

      - name: WordPress 최신 버전 다운로드
        run: |
          if [ ! -f wordpress/wp-load.php ]; then
            curl -sSL -f https://wordpress.org/latest.tar.gz -o /tmp/wp.tar.gz
            tar -xzf /tmp/wp.tar.gz -C .
            rm /tmp/wp.tar.gz
          fi
          php -r "include 'wordpress/wp-includes/version.php'; echo 'WP ' . \$wp_version . PHP_EOL;"

      - name: SQLite 통합 플러그인 설치
        run: |
          mkdir -p wordpress/wp-content/plugins wordpress/wp-content/database
          if [ ! -d "wordpress/wp-content/plugins/sqlite-database-integration" ]; then
            curl -sSL -f \
              "https://downloads.wordpress.org/plugin/sqlite-database-integration.latest-stable.zip" \
              -o /tmp/sqlite.zip
            unzip -q /tmp/sqlite.zip -d wordpress/wp-content/plugins/
            rm /tmp/sqlite.zip
          fi
          if [ ! -f "wordpress/wp-content/db.php" ]; then
            cp wordpress/wp-content/plugins/sqlite-database-integration/db.copy \
               wordpress/wp-content/db.php
          fi

      - name: PHPLiteAdmin 설치
        run: |
          PLA_DIR="wordpress/wp-content/phpliteadmin"
          if [ ! -f "$PLA_DIR/index.php" ]; then
            mkdir -p "$PLA_DIR"
            curl -sSL -f \
              "https://github.com/phpLiteAdmin/pla/archive/refs/heads/master.tar.gz" \
              -o /tmp/pla.tar.gz
            mkdir -p /tmp/pla_src
            tar -xzf /tmp/pla.tar.gz -C /tmp/pla_src --strip-components=1
            cp -r /tmp/pla_src/. "$PLA_DIR/"
            rm -rf /tmp/pla.tar.gz /tmp/pla_src
          fi
          DB_ABS="$(pwd)/wordpress/wp-content/database"
          cat > "$PLA_DIR/phpliteadmin.config.php" << PHPEOF
          <?php
          \$password = '';
          \$directory = false;
          \$databases = array(
            array(
              'path' => '${DB_ABS}/wordpress.db',
              'name' => 'WordPress',
            ),
          );
          PHPEOF

      - name: wp-config.php 생성 (Redis 포함)
        run: |
          cd wordpress
          CUSTOM_DOMAIN="${{ inputs.custom_domain }}"
          SITE_URL="${CUSTOM_DOMAIN:+https://${CUSTOM_DOMAIN}}"
          SITE_URL="${SITE_URL:-https://${{ inputs.site_slug }}.wpspot.app}"
          SALTS=$(curl -sS https://api.wordpress.org/secret-key/1.1/salt/ || true)
          UPSTASH_URL="${{ inputs.upstash_redis_url }}"
          UPSTASH_TOKEN="${{ inputs.upstash_redis_token }}"

          cat > wp-config.php << PHPEOF
          <?php
          define("DB_NAME",     "wordpress");
          define("DB_USER",     "root");
          define("DB_PASSWORD", "");
          define("DB_HOST",     "sqlite");
          define("DB_CHARSET",  "utf8mb4");
          define("DB_COLLATE",  "");
          define("DB_DIR",  __DIR__ . "/wp-content/database/");
          define("DB_FILE", "wordpress.db");
          define("WP_HOME",    "${SITE_URL}");
          define("WP_SITEURL", "${SITE_URL}");
          define("WP_CACHE",            true);
          define("WP_DEBUG",            false);
          define("WP_DEBUG_LOG",        false);
          define("CONCATENATE_SCRIPTS", false);
          define("DISALLOW_FILE_EDIT",  false);
          define("FS_METHOD",           "direct");
          // Upstash Redis (서버리스 Redis 캐시)
          define("WP_REDIS_CLIENT",   "predis");
          define("WP_REDIS_SCHEME",   "https");
          define("WP_REDIS_HOST",     "${UPSTASH_URL}");
          define("WP_REDIS_PASSWORD", "${UPSTASH_TOKEN}");
          define("WP_REDIS_PORT",     443);
          define("WP_REDIS_DATABASE", 0);
          define("WP_REDIS_TIMEOUT",  1);
          define("WP_REDIS_READ_TIMEOUT", 1);
          define("WP_REDIS_DISABLED", ${UPSTASH_URL:+false}${UPSTASH_URL:-true});
          \$table_prefix = "wp_";
          ${SALTS}
          if(!defined("ABSPATH")){define("ABSPATH",__DIR__."/");}
          require_once ABSPATH."wp-settings.php";
          PHPEOF

          if [ ! -s wp-config.php ]; then
            echo "::error::wp-config.php 생성 실패"
            exit 1
          fi

      - name: WordPress 설치 (WP-CLI + SQLite)
        run: |
          cd wordpress
          CUSTOM_DOMAIN="${{ inputs.custom_domain }}"
          SITE_URL="${CUSTOM_DOMAIN:+https://${CUSTOM_DOMAIN}}"
          SITE_URL="${SITE_URL:-https://${{ inputs.site_slug }}.wpspot.app}"
          DISPLAY="${{ inputs.site_display_name }}"
          [ -z "$DISPLAY" ] && DISPLAY="${{ inputs.site_slug }}"
          WP_PASS="${{ inputs.wp_admin_pass }}"
          [ -z "$WP_PASS" ] && WP_PASS=$(openssl rand -base64 16 | tr -dc 'a-zA-Z0-9' | head -c 16)
          WP_USER="${{ inputs.wp_admin_user }}"
          [ -z "$WP_USER" ] && WP_USER="wpadmin"
          echo "WP_ADMIN_PASS=${WP_PASS}" >> $GITHUB_ENV
          echo "WP_ADMIN_USER=${WP_USER}" >> $GITHUB_ENV
          if [ ! -f "wp-content/database/wordpress.db" ]; then
            wp core install \
              --url="$SITE_URL" \
              --title="$DISPLAY" \
              --admin_user="$WP_USER" \
              --admin_password="$WP_PASS" \
              --admin_email="admin@wpspot.app" \
              --skip-email \
              --allow-root
            wp plugin activate sqlite-database-integration --allow-root || true
            wp option update permalink_structure '/%postname%/' --allow-root
            wp rewrite flush --allow-root

            # Redis Object Cache 플러그인 설치 (Upstash 호환)
            UPSTASH_URL="${{ inputs.upstash_redis_url }}"
            if [ -n "$UPSTASH_URL" ]; then
              wp plugin install redis-cache --activate --allow-root || true
              wp redis enable --allow-root || true
              echo "Redis Object Cache 활성화 완료"
            fi
          fi
          ls -lh wp-content/database/wordpress.db

      - name: wp-router.php 생성
        run: |
          cat > /tmp/wp-router.php << 'PHPEOF'
          <?php
          $docroot = ($_SERVER["DOCUMENT_ROOT"] !== "" && $_SERVER["DOCUMENT_ROOT"] !== false)
              ? $_SERVER["DOCUMENT_ROOT"] : getcwd();
          $uri = urldecode(parse_url($_SERVER["REQUEST_URI"], PHP_URL_PATH));
          $file = rtrim($docroot, '/') . '/' . ltrim($uri, '/');
          if ($uri !== "/" && file_exists($file) && !is_dir($file)) { return false; }
          chdir($docroot);
          $hdr = $docroot . "/wp-blog-header.php";
          if (file_exists($hdr)) {
              require $hdr;
          } else {
              http_response_code(503);
              echo "WordPress not found in: " . $docroot;
          }
          PHPEOF

      - name: WordPress PHP 서버 시작 (메인 2개 + 서브 8개 대기)
        run: |
          # 포트 배열: 8888(main1), 8889(main2), 8890~8897(sub1~sub8)
          PORTS=(8888 8889 8890 8891 8892 8893 8894 8895 8896 8897)
          MAIN_PORTS=(8888 8889)

          mkdir -p /tmp/php-servers

          start_php_server() {
            local PORT=$1
            local LABEL=$2
            cd "$(pwd)/wordpress" 2>/dev/null || cd wordpress
            php -S "0.0.0.0:${PORT}" /tmp/wp-router.php \
              -d display_errors=0 -d log_errors=1 \
              -d memory_limit=256M \
              >> "/tmp/php-servers/php-${PORT}.log" 2>&1 &
            echo $! > "/tmp/php-servers/php-${PORT}.pid"
            cd -
            echo "PHP 서버 ${LABEL} 시작 (포트 ${PORT}, PID=$(cat /tmp/php-servers/php-${PORT}.pid))"
          }

          # 메인 서버 2개 즉시 시작
          start_php_server 8888 "main-1"
          start_php_server 8889 "main-2"
          sleep 3

          # 메인 서버 상태 확인
          for PORT in "${MAIN_PORTS[@]}"; do
            HOST_IP=$(hostname -I | awk '{print $1}')
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "http://${HOST_IP}:${PORT}/" 2>/dev/null || \
                   curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "http://0.0.0.0:${PORT}/" 2>/dev/null || echo "000")
            echo "WordPress PHP 서버 포트 ${PORT}: ${CODE}"
            if [ "$CODE" = "000" ]; then
              echo "::warning::PHP 서버 포트 ${PORT} 응답 없음 — 재시작 시도"
              kill "$(cat /tmp/php-servers/php-${PORT}.pid 2>/dev/null)" 2>/dev/null || true
              sleep 1
              start_php_server ${PORT} "main-retry"
              sleep 3
            fi
          done

          # 서브 서버(8890~8897)는 대기 상태로만 저장 (keepalive에서 필요시 활성화)
          for PORT in 8890 8891 8892 8893 8894 8895 8896 8897; do
            echo "SUB_PORT_${PORT}=standby" >> /tmp/php-servers/sub-ports.env
          done

          # 포트 배열을 config에 저장
          echo "MAIN_PORTS=8888,8889" >> $GITHUB_ENV
          echo "ALL_PORTS=8888,8889,8890,8891,8892,8893,8894,8895,8896,8897" >> $GITHUB_ENV
          echo "WP_PORT=8888" >> $GITHUB_ENV

      - name: PHPLiteAdmin PHP 서버 시작 (포트 8999)
        run: |
          PLA_DIR="$(pwd)/wordpress/wp-content/phpliteadmin"
          HOST_IP=$(hostname -I | awk '{print $1}')
          cd "$PLA_DIR"
          php -S "0.0.0.0:8999" -d display_errors=0 -d log_errors=1 \
            >> /tmp/php-pla.log 2>&1 &
          echo $! > /tmp/php-pla.pid
          cd -
          sleep 2
          CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "http://${HOST_IP}:8999/" 2>/dev/null || echo "000")
          echo "PHPLiteAdmin PHP 서버: ${CODE}"
          echo "PLA_PORT=8999" >> $GITHUB_ENV

      - name: cloudflared 설치
        run: |
          curl -sSL -f \
            "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb" \
            -o /tmp/cloudflared.deb
          dpkg -x /tmp/cloudflared.deb /tmp/cloudflared-pkg
          sudo cp /tmp/cloudflared-pkg/usr/bin/cloudflared /usr/local/bin/cloudflared
          cloudflared --version

      - name: Named Cloudflare Tunnel 생성 (WordPress + PLA)
        env:
          CLOUDFLARE_API_TOKEN: ${{ inputs.secret_cf_api_token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ inputs.secret_cf_account_id }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::warning::CF 자격증명 없음 — Named Tunnel 생성 건너뜀"
            echo "CF_CREDS_OK=false" >> $GITHUB_ENV
            exit 0
          fi
          echo "CF_CREDS_OK=true" >> $GITHUB_ENV

          TUNNEL_NAME="wpspot-${{ inputs.site_slug }}-wp"
          PLA_TUNNEL_NAME="wpspot-${{ inputs.site_slug }}-pla"
          mkdir -p deploy

          create_or_get_tunnel() {
            local NAME="$1"
            local RESP ID TOKEN

            RESP=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/cfd_tunnel" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"${NAME}\",\"tunnel_secret\":\"$(openssl rand -base64 32)\"}")
            ID=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result']['id'])" 2>/dev/null || echo "")

            if [ -z "$ID" ]; then
              RESP=$(curl -s \
                "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/cfd_tunnel?name=${NAME}&is_deleted=false" \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
              ID=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'])" 2>/dev/null || echo "")
            fi
            [ -z "$ID" ] && { echo "::error::Tunnel 생성 실패: $NAME"; exit 1; }

            TOKEN=$(curl -s \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/cfd_tunnel/${ID}/token" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['result'])" 2>/dev/null || echo "")
            [ -z "$TOKEN" ] && { echo "::error::Tunnel Token 획득 실패: $NAME"; exit 1; }

            echo "${ID}|${TOKEN}"
          }

          WP_RESULT=$(create_or_get_tunnel "$TUNNEL_NAME")
          WP_TUNNEL_ID="${WP_RESULT%|*}"
          WP_TUNNEL_TOKEN="${WP_RESULT#*|}"

          PLA_RESULT=$(create_or_get_tunnel "$PLA_TUNNEL_NAME")
          PLA_TUNNEL_ID="${PLA_RESULT%|*}"
          PLA_TUNNEL_TOKEN="${PLA_RESULT#*|}"

          WP_TUNNEL_HOST="${WP_TUNNEL_ID}.cfargotunnel.com"
          PLA_TUNNEL_HOST="${PLA_TUNNEL_ID}.cfargotunnel.com"

          WORKER_NAME="${{ inputs.secret_worker_name }}"
          [ -z "$WORKER_NAME" ] && WORKER_NAME="wpspot-${{ inputs.site_slug }}"

          python3 -c "
          import json, sys
          data = {
            'wp_port': 8888, 'wp_port_2': 8889, 'pla_port': 8999,
            'main_ports': [8888, 8889],
            'sub_ports': [8890, 8891, 8892, 8893, 8894, 8895, 8896, 8897],
            'all_ports': [8888, 8889, 8890, 8891, 8892, 8893, 8894, 8895, 8896, 8897],
            'wordpress_dir': 'wordpress',
            'pla_dir': 'wordpress/wp-content/phpliteadmin',
            'worker_name': sys.argv[1],
            'pma_worker': sys.argv[1] + '-pma',
            'site_slug': sys.argv[2],
            'custom_domain': sys.argv[3],
            'pma_domain': sys.argv[4],
            'wp_tunnel_id': sys.argv[5],
            'wp_tunnel_host': sys.argv[6],
            'pla_tunnel_id': sys.argv[7],
            'pla_tunnel_host': sys.argv[8],
          }
          open('deploy/tunnel-config.json','w').write(json.dumps(data, indent=2))
          " "$WORKER_NAME" "${{ inputs.site_slug }}" "${{ inputs.custom_domain }}" "${{ inputs.pma_domain }}" \
            "$WP_TUNNEL_ID" "$WP_TUNNEL_HOST" "$PLA_TUNNEL_ID" "$PLA_TUNNEL_HOST"

          echo "WP_TUNNEL_ID=${WP_TUNNEL_ID}"         >> $GITHUB_ENV
          echo "WP_TUNNEL_TOKEN=${WP_TUNNEL_TOKEN}"    >> $GITHUB_ENV
          echo "WP_TUNNEL_HOST=${WP_TUNNEL_HOST}"      >> $GITHUB_ENV
          echo "PLA_TUNNEL_ID=${PLA_TUNNEL_ID}"        >> $GITHUB_ENV
          echo "PLA_TUNNEL_TOKEN=${PLA_TUNNEL_TOKEN}"  >> $GITHUB_ENV
          echo "PLA_TUNNEL_HOST=${PLA_TUNNEL_HOST}"    >> $GITHUB_ENV
          echo "WORKER_NAME=${WORKER_NAME}"             >> $GITHUB_ENV
          echo "PMA_WORKER=${WORKER_NAME}-pma"          >> $GITHUB_ENV

      - name: Named Tunnel 연결 (WordPress — 메인 포트 자동 페일오버)
        run: |
          [ "${CF_CREDS_OK}" != "true" ] && { echo "건너뜀"; exit 0; }

          HOST_IP=$(hostname -I | awk '{print $1}')

          # 활성 메인 포트 찾기 (8888 → 8889 순)
          ACTIVE_PORT=8888
          for P in 8888 8889; do
            C=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 5 "http://${HOST_IP}:${P}/" 2>/dev/null || echo "000")
            if [ "$C" != "000" ]; then ACTIVE_PORT=$P; break; fi
          done
          echo "터널 연결 대상 포트: ${ACTIVE_PORT}"

          # cloudflared는 내부 IP로 연결 (0.0.0.0 바인딩 → 실제 IP 사용)
          cloudflared tunnel --no-autoupdate run \
            --token "${WP_TUNNEL_TOKEN}" \
            --url "http://${HOST_IP}:${ACTIVE_PORT}" \
            --logfile /tmp/cf-wp-named.log 2>&1 &
          CF_PID=$!
          echo $CF_PID > /tmp/cf-wp.pid
          sleep 5

          CONN=$(grep -c "Registered tunnel connection" /tmp/cf-wp-named.log 2>/dev/null || echo "0")
          echo "WP Named Tunnel 연결: $CONN"
          echo "WP 터널 URL: https://${WP_TUNNEL_HOST}"

          # 연결 실패 시 재시도
          if [ "$CONN" = "0" ]; then
            echo "::warning::터널 연결 실패 — 5초 후 재시도"
            kill $CF_PID 2>/dev/null || true
            sleep 5
            cloudflared tunnel --no-autoupdate run \
              --token "${WP_TUNNEL_TOKEN}" \
              --url "http://${HOST_IP}:${ACTIVE_PORT}" \
              --logfile /tmp/cf-wp-named.log 2>&1 &
            echo $! > /tmp/cf-wp.pid
            sleep 5
            CONN=$(grep -c "Registered tunnel connection" /tmp/cf-wp-named.log 2>/dev/null || echo "0")
            echo "재시도 후 터널 연결: $CONN"
          fi

      - name: Named Tunnel 연결 (PHPLiteAdmin)
        run: |
          [ "${CF_CREDS_OK}" != "true" ] && exit 0
          [ -z "$PLA_TUNNEL_TOKEN" ] && exit 0
          HOST_IP=$(hostname -I | awk '{print $1}')
          cloudflared tunnel --no-autoupdate run \
            --token "${PLA_TUNNEL_TOKEN}" \
            --url "http://${HOST_IP}:8999" \
            --logfile /tmp/cf-pla-named.log 2>&1 &
          echo $! > /tmp/cf-pla.pid
          sleep 3
          CONN=$(grep -c "Registered tunnel connection" /tmp/cf-pla-named.log 2>/dev/null || echo "0")
          echo "PLA Named Tunnel 연결: $CONN"

      - name: Cloudflare Worker 배포 (고정 hostname + Redis 헤더)
        env:
          CLOUDFLARE_API_TOKEN: ${{ inputs.secret_cf_api_token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ inputs.secret_cf_account_id }}
        run: |
          [ "${CF_CREDS_OK}" != "true" ] && { echo "건너뜀"; exit 0; }
          npm install -g wrangler --quiet --no-progress 2>/dev/null

          mkdir -p /tmp/cf-wp
          python3 -c "
          js = '''export default {
            async fetch(request, env) {
              const origin = env.TUNNEL_ORIGIN;
              if (!origin) return new Response(offline(), {status:503,headers:{'Content-Type':'text/html; charset=utf-8','Retry-After':'30'}});
              const url = new URL(request.url);
              const t = new URL(origin);
              t.pathname = url.pathname; t.search = url.search;
              const h = new Headers(request.headers);
              h.set('host', new URL(origin).host);
              h.set('x-forwarded-proto', 'https');
              h.set('x-real-ip', request.headers.get('cf-connecting-ip') || '');
              try {
                const r = await fetch(t.toString(), {method:request.method,headers:h,
                  body:[\"GET\",\"HEAD\"].includes(request.method)?undefined:request.body,redirect:\"manual\"});
                const out = new Headers(r.headers);
                out.set('x-powered-by','wpspot/serverless');
                out.set('x-cache-status', out.get('x-redis-status') || 'miss');
                return new Response(r.body, {status:r.status, headers:out});
              } catch(e) {
                return new Response(offline(e.message), {status:503,headers:{'Content-Type':'text/html; charset=utf-8','Retry-After':'60'}});
              }
            }
          };
          function offline(m){return '<!DOCTYPE html><html lang=\"ko\"><head><meta charset=\"utf-8\"><meta http-equiv=\"refresh\" content=\"30\"><title>준비 중</title>'
            +'<style>body{font-family:system-ui;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#f8fafc}'
            +'.c{text-align:center;max-width:420px;padding:2rem}h2{color:#1e293b}p{color:#64748b;line-height:1.6}</style></head>'
            +'<body><div class=\"c\"><h2>⏳ 서버 준비 중이에요</h2><p>잠시 후 자동으로 새로고침됩니다.</p>'
            +(m?'<p style=\"color:#94a3b8;font-size:12px\">'+m+'</p>':'')+'</div></body></html>';}
          '''
          open('/tmp/cf-wp/worker.js','w').write(js)
          "
          python3 -c "
          import sys
          toml = 'name = \"%s\"\nmain = \"worker.js\"\ncompatibility_date = \"2024-09-23\"\n[vars]\nTUNNEL_ORIGIN = \"https://%s\"\n' % (sys.argv[1], sys.argv[2])
          open('/tmp/cf-wp/wrangler.toml','w').write(toml)
          " "$WORKER_NAME" "$WP_TUNNEL_HOST"
          cd /tmp/cf-wp && wrangler deploy --minify
          echo "WordPress Worker 배포 완료: ${WORKER_NAME}"
          echo "WORKER_URL=https://${WORKER_NAME}.${{ inputs.secret_cf_account_id }}.workers.dev" >> $GITHUB_ENV

          mkdir -p /tmp/cf-pla
          python3 -c "
          js = '''export default {
            async fetch(request, env) {
              const origin = env.TUNNEL_ORIGIN;
              if (!origin) return new Response('PHPLiteAdmin 준비 중', {status:503});
              const url = new URL(request.url);
              const t = new URL(origin);
              t.pathname = url.pathname; t.search = url.search;
              const h = new Headers(request.headers);
              h.set('host', new URL(origin).host);
              h.set('x-forwarded-proto', 'https');
              try {
                const r = await fetch(t.toString(), {method:request.method,headers:h,
                  body:[\"GET\",\"HEAD\"].includes(request.method)?undefined:request.body,redirect:\"manual\"});
                return new Response(r.body, {status:r.status, headers:r.headers});
              } catch(e) { return new Response('PHPLiteAdmin 오류: '+e.message, {status:503}); }
            }
          };
          '''
          open('/tmp/cf-pla/worker.js','w').write(js)
          "
          python3 -c "
          import sys
          toml = 'name = \"%s\"\nmain = \"worker.js\"\ncompatibility_date = \"2024-09-23\"\n[vars]\nTUNNEL_ORIGIN = \"https://%s\"\n' % (sys.argv[1], sys.argv[2])
          open('/tmp/cf-pla/wrangler.toml','w').write(toml)
          " "$PMA_WORKER" "$PLA_TUNNEL_HOST"
          cd /tmp/cf-pla && wrangler deploy --minify
          echo "PLA Worker 배포 완료: ${PMA_WORKER}"

      - name: GitHub Secrets 등록 (Tunnel Token + CF 자격증명 + Redis)
        env:
          GH_PAT: ${{ inputs.secret_github_token }}
        run: |
          REPO="${{ github.repository }}"
          [ -z "$GH_PAT" ] && { echo "PAT 없음 — 건너뜀"; exit 0; }
          [ "${CF_CREDS_OK}" != "true" ] && { echo "CF 자격증명 없음 — 건너뜀"; exit 0; }
          pip install PyNaCl --quiet --break-system-packages 2>/dev/null

          PK=$(curl -sf \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/actions/secrets/public-key" || echo "")
          [ -z "$PK" ] && { echo "Public key 조회 실패"; exit 0; }
          KEY_ID=$(echo "$PK" | python3 -c "import sys,json; print(json.load(sys.stdin)['key_id'])")
          PUB_KEY=$(echo "$PK" | python3 -c "import sys,json; print(json.load(sys.stdin)['key'])")

          set_secret() {
            local NAME="$1" VALUE="$2"
            [ -z "$VALUE" ] && return
            ENC=$(python3 -c "import sys, base64; from nacl import encoding, public; pub = public.PublicKey(sys.argv[1].encode(), encoding.Base64Encoder); enc = public.SealedBox(pub).encrypt(sys.argv[2].encode()); print(base64.b64encode(enc).decode())" "$PUB_KEY" "$VALUE" 2>/dev/null)
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
              -X PUT \
              -H "Authorization: Bearer ${GH_PAT}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${REPO}/actions/secrets/${NAME}" \
              -d "{\"encrypted_value\":\"${ENC}\",\"key_id\":\"${KEY_ID}\"}" || echo "000")
            [ "$CODE" = "201" ] || [ "$CODE" = "204" ] && echo "✓ $NAME" || echo "✗ $NAME ($CODE)"
          }

          set_secret "CF_ACCOUNT_ID"      "${{ inputs.secret_cf_account_id }}"
          set_secret "CF_API_TOKEN"        "${{ inputs.secret_cf_api_token }}"
          set_secret "WP_TUNNEL_TOKEN"     "${WP_TUNNEL_TOKEN}"
          set_secret "PLA_TUNNEL_TOKEN"    "${PLA_TUNNEL_TOKEN}"
          set_secret "UPSTASH_REDIS_URL"   "${{ inputs.upstash_redis_url }}"
          set_secret "UPSTASH_REDIS_TOKEN" "${{ inputs.upstash_redis_token }}"
          echo "Secrets 등록 완료"

      - name: wpspot 콜백
        run: |
          CALLBACK="${{ inputs.wpspot_callback_url }}"
          SITE_ID="${{ inputs.wpspot_site_id }}"
          JWT="${{ inputs.wpspot_jwt }}"
          if [ -z "$CALLBACK" ] || [ -z "$SITE_ID" ] || [ -z "$JWT" ]; then
            echo "콜백 정보 없음 — 건너뜀"
            exit 0
          fi
          python3 -c "
          import json, sys, urllib.request
          payload = json.dumps({
            'siteId': sys.argv[1],
            'tunnelWpUrl': 'https://' + sys.argv[2],
            'tunnelPlaUrl': 'https://' + sys.argv[3],
            'workerUrl': sys.argv[4],
            'status': 'active'
          }).encode()
          req = urllib.request.Request(sys.argv[5], data=payload,
            headers={'Authorization':'Bearer '+sys.argv[6],'Content-Type':'application/json'}, method='POST')
          try:
            r = urllib.request.urlopen(req, timeout=10)
            print('콜백 응답:', r.status)
          except Exception as e:
            print('::warning::콜백 실패:', e)
          " "$SITE_ID" "${WP_TUNNEL_HOST:-}" "${PLA_TUNNEL_HOST:-}" "${WORKER_URL:-}" "$CALLBACK" "$JWT"

      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name  "wpspot-bot"
          git config user.email "bot@wpspot.app"
          git add -A
          git diff --cached --quiet || \
            git commit -m "chore: provision wordpress [${{ inputs.site_slug }}]"
          git push

      - name: 완료 요약
        run: |
          echo "============================================"
          echo "  wpspot 프로비저닝 완료"
          echo "============================================"
          DOMAIN="${{ inputs.custom_domain }}"
          [ -n "$DOMAIN" ] && echo "  사이트:      https://${DOMAIN}"
          echo "  WP 터널:     https://${WP_TUNNEL_HOST:-없음}"
          echo "  PLA 터널:    https://${PLA_TUNNEL_HOST:-없음}"
          echo "  Worker URL:  ${WORKER_URL:-없음}"
          echo "  PHP 서버:    포트 8888(main-1), 8889(main-2)"
          echo "               포트 8890~8897(sub, keepalive에서 활성화)"
          echo "  Redis:       ${{ inputs.upstash_redis_url != '' && 'Upstash 서버리스 Redis 연결됨' || '미사용' }}"
          echo "  터널 방식:   Named Tunnel (영구 hostname)"
          echo "  엔진:        PHP 8.3 내장 서버 × 최대 10개"
          echo "  DB:          SQLite"
          echo "============================================"

      - name: 서버 유지 (keepalive 인계 전 360초 — 다운 절대 금지)
        run: |
          echo "Named Tunnel + PHP 서버 유지 중..."
          HOST_IP=$(hostname -I | awk '{print $1}')

          keep_alive_servers() {
            # 메인 서버 상태 확인 및 자동 복구
            for PORT in 8888 8889; do
              PID_FILE="/tmp/php-servers/php-${PORT}.pid"
              CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 5 "http://${HOST_IP}:${PORT}/" 2>/dev/null || echo "000")
              if [ "$CODE" = "000" ]; then
                echo "[복구] PHP 서버 포트 ${PORT} 재시작"
                kill "$(cat $PID_FILE 2>/dev/null)" 2>/dev/null || true
                sleep 1
                cd wordpress
                php -S "0.0.0.0:${PORT}" /tmp/wp-router.php -d display_errors=0 \
                  >> "/tmp/php-servers/php-${PORT}.log" 2>&1 &
                echo $! > "$PID_FILE"
                cd -
                sleep 2
              fi
            done
            # 터널 상태 확인
            if ! kill -0 "$(cat /tmp/cf-wp.pid 2>/dev/null)" 2>/dev/null; then
              echo "[복구] WP 터널 재시작"
              [ -n "${WP_TUNNEL_TOKEN}" ] && cloudflared tunnel --no-autoupdate run \
                --token "${WP_TUNNEL_TOKEN}" --url "http://${HOST_IP}:8888" \
                --logfile /tmp/cf-wp-named.log 2>&1 & echo $! > /tmp/cf-wp.pid
            fi
          }

          for i in 1 2 3 4 5 6; do
            sleep 60
            keep_alive_servers
            echo "[${i}분] 서버 유지 중..."
          done
