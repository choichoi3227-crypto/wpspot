name: wpspot Provision

on:
  workflow_dispatch:
    inputs:
      site_slug:
        description: "사이트 slug"
        required: true
      site_display_name:
        description: "사이트 표시 이름"
        required: false
        default: ""
      custom_domain:
        description: "사용자 개인 도메인 (예: example.com)"
        required: false
        default: ""
      pma_domain:
        description: "PHPMyAdmin 도메인 (예: pma.example.com)"
        required: false
        default: ""
      wp_admin_user:
        description: "WordPress 관리자 ID"
        required: false
        default: "wpadmin"
      wp_admin_pass:
        description: "WordPress 관리자 비밀번호"
        required: false
        default: ""
      secret_cf_account_id:
        description: "Cloudflare Account ID"
        required: false
        default: ""
      secret_cf_api_token:
        description: "Cloudflare API Token"
        required: false
        default: ""
      secret_github_token:
        description: "GitHub PAT"
        required: false
        default: ""
      secret_worker_name:
        description: "Cloudflare Worker 이름"
        required: false
        default: ""
      wpspot_callback_url:
        description: "wpspot 콜백 URL"
        required: false
        default: ""
      wpspot_site_id:
        description: "wpspot 사이트 ID"
        required: false
        default: ""
      wpspot_jwt:
        description: "wpspot JWT"
        required: false
        default: ""

jobs:
  provision:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: 민감 정보 마스킹
        run: |
          echo "::add-mask::${{ inputs.wp_admin_pass }}"
          echo "::add-mask::${{ inputs.secret_cf_account_id }}"
          echo "::add-mask::${{ inputs.secret_cf_api_token }}"
          echo "::add-mask::${{ inputs.secret_github_token }}"
          echo "::add-mask::${{ inputs.wpspot_jwt }}"

      - name: 코드 체크아웃
        uses: actions/checkout@v4

      # ────────────────────────────────────────────────
      # STEP 1: 서비스 설치 (nginx, PHP-FPM, MariaDB, Redis)
      # ────────────────────────────────────────────────
      - name: 시스템 패키지 설치 (nginx, PHP-FPM 8.3, MariaDB, Redis)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            nginx \
            php8.3-fpm php8.3-mysql php8.3-gd php8.3-curl php8.3-xml \
            php8.3-mbstring php8.3-zip php8.3-intl php8.3-redis \
            php8.3-opcache php8.3-bcmath php8.3-imagick \
            mariadb-server mariadb-client \
            redis-server \
            2>/dev/null
          echo "✓ nginx $(nginx -v 2>&1 | grep -oP '[\d.]+')"
          echo "✓ PHP $(php8.3 -r 'echo PHP_VERSION;')"
          echo "✓ MariaDB $(mysql --version | awk '{print $5}')"
          echo "✓ Redis $(redis-server --version | awk '{print $3}')"

      # ────────────────────────────────────────────────
      # STEP 2: MariaDB 초기화
      # ────────────────────────────────────────────────
      - name: MariaDB 시작 및 DB/사용자 생성
        run: |
          sudo systemctl start mariadb
          sleep 2
          DB_PASS=$(openssl rand -hex 16)
          echo "DB_PASS=${DB_PASS}" >> $GITHUB_ENV

          sudo mysql -u root << SQLEOF
          CREATE DATABASE IF NOT EXISTS wordpress CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
          CREATE USER IF NOT EXISTS 'wpuser'@'127.0.0.1' IDENTIFIED BY '${DB_PASS}';
          GRANT ALL PRIVILEGES ON wordpress.* TO 'wpuser'@'127.0.0.1';
          FLUSH PRIVILEGES;
          SQLEOF
          echo "✓ MariaDB wordpress DB 생성 완료"

          # 기존 DB 덤프 복원 (재프로비저닝 시)
          DUMP_FILE="wordpress/db-backup/latest.sql.gz"
          if [ -f "$DUMP_FILE" ]; then
            echo "기존 DB 덤프 발견 — 복원 중..."
            zcat "$DUMP_FILE" | sudo mysql -u root wordpress
            echo "✓ DB 복원 완료"
          fi

      # ────────────────────────────────────────────────
      # STEP 3: Redis 설정 (로컬, 무료, 진짜 Redis)
      # ────────────────────────────────────────────────
      - name: Redis 설정 및 시작
        run: |
          REDIS_PASS=$(openssl rand -hex 24)
          echo "REDIS_PASS=${REDIS_PASS}" >> $GITHUB_ENV

          sudo tee /etc/redis/redis.conf > /dev/null << REDISEOF
          bind 127.0.0.1
          port 6379
          daemonize yes
          logfile /var/log/redis/redis-server.log
          loglevel notice
          requirepass ${REDIS_PASS}
          maxmemory 128mb
          maxmemory-policy allkeys-lru
          save ""
          appendonly no
          tcp-keepalive 300
          timeout 0
          REDISEOF

          sudo systemctl restart redis-server
          sleep 1
          # 연결 확인
          redis-cli -a "${REDIS_PASS}" ping 2>/dev/null | grep -q PONG \
            && echo "✓ Redis 7 로컬 인스턴스 기동 완료 (포트 6379)" \
            || echo "::warning::Redis ping 실패"

      # ────────────────────────────────────────────────
      # STEP 4: PHP-FPM 설정 (멀티프로세스 풀)
      # ────────────────────────────────────────────────
      - name: PHP-FPM 8.3 설정 (OPcache + 멀티풀)
        run: |
          # OPcache 설정
          sudo tee /etc/php/8.3/fpm/conf.d/10-opcache-wp.ini > /dev/null << 'INIEOF'
          opcache.enable=1
          opcache.memory_consumption=128
          opcache.interned_strings_buffer=16
          opcache.max_accelerated_files=10000
          opcache.revalidate_freq=0
          opcache.validate_timestamps=0
          opcache.fast_shutdown=1
          opcache.enable_cli=0
          INIEOF

          # PHP-FPM 기본 설정
          sudo tee /etc/php/8.3/fpm/conf.d/20-wp-tune.ini > /dev/null << 'INIEOF'
          upload_max_filesize=64M
          post_max_size=64M
          memory_limit=256M
          max_execution_time=300
          display_errors=Off
          log_errors=On
          error_log=/var/log/php8.3-fpm-error.log
          INIEOF

          # WordPress 메인 풀 (www) — 포트 9000
          sudo tee /etc/php/8.3/fpm/pool.d/www.conf > /dev/null << 'POOLEOF'
          [www]
          user = www-data
          group = www-data
          listen = 127.0.0.1:9000
          listen.owner = www-data
          listen.group = www-data
          pm = dynamic
          pm.max_children = 10
          pm.start_servers = 2
          pm.min_spare_servers = 2
          pm.max_spare_servers = 5
          pm.max_requests = 500
          POOLEOF

          # WordPress 서브 풀 (www2) — 포트 9001 (부하 시 자동 활성화)
          sudo tee /etc/php/8.3/fpm/pool.d/www2.conf > /dev/null << 'POOLEOF'
          [www2]
          user = www-data
          group = www-data
          listen = 127.0.0.1:9001
          listen.owner = www-data
          listen.group = www-data
          pm = ondemand
          pm.max_children = 10
          pm.process_idle_timeout = 30s
          pm.max_requests = 500
          POOLEOF

          sudo systemctl restart php8.3-fpm
          sleep 1
          sudo systemctl is-active php8.3-fpm && echo "✓ PHP-FPM 기동 완료" || echo "::error::PHP-FPM 기동 실패"
          php-fpm8.3 -t 2>&1 | tail -3

      # ────────────────────────────────────────────────
      # STEP 5: WordPress 다운로드 및 설치
      # ────────────────────────────────────────────────
      - name: WP-CLI 설치
        run: |
          for attempt in 1 2 3; do
            curl -sSL -f https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar \
              -o /usr/local/bin/wp && break
            sleep 5
          done
          chmod +x /usr/local/bin/wp
          wp --info --allow-root

      - name: WordPress 다운로드
        run: |
          if [ ! -f wordpress/wp-load.php ]; then
            for attempt in 1 2 3; do
              curl -sSL -f https://wordpress.org/latest.tar.gz -o /tmp/wp.tar.gz && break
              sleep 5
            done
            tar -xzf /tmp/wp.tar.gz -C .
            rm /tmp/wp.tar.gz
          fi
          php8.3 -r "include 'wordpress/wp-includes/version.php'; echo 'WP ' . \$wp_version . PHP_EOL;"

      - name: PHPMyAdmin 설치 (PLA 대신)
        run: |
          PMA_DIR="wordpress/wp-content/phpmyadmin"
          if [ ! -f "$PMA_DIR/index.php" ]; then
            PMA_VER="5.2.1"
            for attempt in 1 2 3; do
              curl -sSL -f \
                "https://files.phpmyadmin.net/phpMyAdmin/${PMA_VER}/phpMyAdmin-${PMA_VER}-all-languages.tar.gz" \
                -o /tmp/pma.tar.gz && break
              sleep 5
            done
            mkdir -p "$PMA_DIR"
            tar -xzf /tmp/pma.tar.gz -C /tmp/
            cp -r /tmp/phpMyAdmin-${PMA_VER}-all-languages/. "$PMA_DIR/"
            rm -rf /tmp/pma.tar.gz /tmp/phpMyAdmin-*
            # config
            cp "$PMA_DIR/config.sample.inc.php" "$PMA_DIR/config.inc.php"
            BLOWFISH=$(openssl rand -hex 32)
            sed -i "s/\$cfg\['blowfish_secret'\] = ''/\$cfg['blowfish_secret'] = '${BLOWFISH}'/" \
              "$PMA_DIR/config.inc.php"
          fi
          echo "✓ phpMyAdmin 설치 완료"
          echo "PMA_DIR=wordpress/wp-content/phpmyadmin" >> $GITHUB_ENV

      - name: wp-config.php 생성 (MariaDB + Redis)
        run: |
          CUSTOM_DOMAIN="${{ inputs.custom_domain }}"
          if [ -n "$CUSTOM_DOMAIN" ]; then
            SITE_URL="https://${CUSTOM_DOMAIN}"
          else
            SITE_URL="https://${{ inputs.site_slug }}.wpspot.app"
          fi
          echo "SITE_URL=${SITE_URL}" >> $GITHUB_ENV

          SALTS=$(curl -sS https://api.wordpress.org/secret-key/1.1/salt/ || true)
          WP_DIR="$(pwd)/wordpress"

          cat > wordpress/wp-config.php << PHPEOF
<?php
define('DB_NAME',     'wordpress');
define('DB_USER',     'wpuser');
define('DB_PASSWORD', '${DB_PASS}');
define('DB_HOST',     '127.0.0.1');
define('DB_CHARSET',  'utf8mb4');
define('DB_COLLATE',  'utf8mb4_unicode_ci');
define('WP_HOME',    '${SITE_URL}');
define('WP_SITEURL', '${SITE_URL}');
define('WP_CACHE',            true);
define('WP_DEBUG',            false);
define('WP_DEBUG_LOG',        false);
define('CONCATENATE_SCRIPTS', false);
define('DISALLOW_FILE_EDIT',  false);
define('FS_METHOD',           'direct');
define('WP_CONTENT_DIR',      '${WP_DIR}/wp-content');
define('WP_CONTENT_URL',      '${SITE_URL}/wp-content');
// Redis Object Cache (로컬 Redis 7 — 무료, 진짜 Redis)
define('WP_REDIS_HOST',       '127.0.0.1');
define('WP_REDIS_PORT',       6379);
define('WP_REDIS_PASSWORD',   '${REDIS_PASS}');
define('WP_REDIS_DATABASE',   0);
define('WP_REDIS_TIMEOUT',    1);
define('WP_REDIS_READ_TIMEOUT', 1);
define('WP_REDIS_PREFIX',     'wp_${{ inputs.site_slug }}_');
define('WP_REDIS_MAXTTL',     86400);
${SALTS}
\$table_prefix = 'wp_';
if (!defined('ABSPATH')) { define('ABSPATH', __DIR__ . '/'); }
require_once ABSPATH . 'wp-settings.php';
PHPEOF

          [ -s wordpress/wp-config.php ] \
            && echo "✓ wp-config.php 생성 완료 ($(wc -l < wordpress/wp-config.php) 줄)" \
            || { echo "::error::wp-config.php 생성 실패"; exit 1; }

      - name: WordPress 소유권 및 권한 설정
        run: |
          sudo chown -R www-data:www-data wordpress/
          sudo find wordpress/ -type d -exec chmod 755 {} \;
          sudo find wordpress/ -type f -exec chmod 644 {} \;
          sudo chmod 600 wordpress/wp-config.php
          echo "✓ 권한 설정 완료"

      - name: WordPress 설치 (WP-CLI + MariaDB)
        run: |
          WP_PASS="${{ inputs.wp_admin_pass }}"
          [ -z "$WP_PASS" ] && WP_PASS=$(openssl rand -base64 16 | tr -dc 'a-zA-Z0-9' | head -c 16)
          WP_USER="${{ inputs.wp_admin_user }}"
          [ -z "$WP_USER" ] && WP_USER="wpadmin"
          DISPLAY="${{ inputs.site_display_name }}"
          [ -z "$DISPLAY" ] && DISPLAY="${{ inputs.site_slug }}"
          echo "WP_ADMIN_PASS=${WP_PASS}" >> $GITHUB_ENV
          echo "WP_ADMIN_USER=${WP_USER}" >> $GITHUB_ENV

          # DB가 이미 복원됐으면 재설치 건너뜀
          WP_INSTALLED=$(sudo mysql -u root -e \
            "SELECT COUNT(*) FROM wordpress.wp_options WHERE option_name='siteurl';" \
            2>/dev/null | tail -1 || echo "0")

          if [ "$WP_INSTALLED" = "0" ]; then
            sudo -u www-data wp core install \
              --path=wordpress \
              --url="${SITE_URL}" \
              --title="${DISPLAY}" \
              --admin_user="${WP_USER}" \
              --admin_password="${WP_PASS}" \
              --admin_email="admin@wpspot.app" \
              --skip-email \
              --allow-root
            # Redis Object Cache 플러그인 설치
            sudo -u www-data wp plugin install redis-cache --activate \
              --path=wordpress --allow-root
            sudo -u www-data wp redis enable \
              --path=wordpress --allow-root
            # 퍼머링크
            sudo -u www-data wp option update permalink_structure '/%postname%/' \
              --path=wordpress --allow-root
            sudo -u www-data wp rewrite flush \
              --path=wordpress --allow-root
            echo "✓ WordPress 설치 및 Redis Object Cache 활성화 완료"
          else
            echo "✓ 기존 DB 복원 — WP-CLI 재설치 건너뜀"
            # URL 업데이트 (도메인 변경 시)
            sudo -u www-data wp option update siteurl "${SITE_URL}" \
              --path=wordpress --allow-root || true
            sudo -u www-data wp option update home "${SITE_URL}" \
              --path=wordpress --allow-root || true
          fi

      # ────────────────────────────────────────────────
      # STEP 6: nginx 설정
      # ────────────────────────────────────────────────
      - name: nginx 설정 (WordPress + phpMyAdmin + 로드밸런싱)
        run: |
          WP_ABS="$(pwd)/wordpress"
          PMA_ABS="${WP_ABS}/wp-content/phpmyadmin"
          HOST_IP=$(hostname -I | awk '{print $1}')

          # nginx upstream (PHP-FPM 멀티풀 로드밸런싱)
          sudo tee /etc/nginx/conf.d/upstream-phpfpm.conf > /dev/null << NGXEOF
          upstream php_fpm_pool {
              least_conn;
              server 127.0.0.1:9000 weight=5;
              server 127.0.0.1:9001 weight=3 backup;
              keepalive 16;
          }
          NGXEOF

          # WordPress 사이트 설정 (포트 8080)
          sudo tee /etc/nginx/sites-available/wordpress > /dev/null << NGXEOF
          server {
              listen 8080;
              server_name _;
              root ${WP_ABS};
              index index.php index.html;
              client_max_body_size 64M;
              
              # gzip 압축
              gzip on;
              gzip_types text/plain text/css application/json application/javascript
                         text/xml application/xml application/xml+rss text/javascript
                         image/svg+xml;
              gzip_comp_level 5;
              gzip_min_length 256;
              gzip_proxied any;
              
              # 정적 파일 캐시 (nginx에서 직접 서빙 — PHP 우회)
              location ~* \.(css|js|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg|webp|avif)$ {
                  expires 1y;
                  add_header Cache-Control "public, immutable";
                  add_header Vary Accept-Encoding;
                  try_files \$uri =404;
              }
              
              # WordPress 퍼머링크
              location / {
                  try_files \$uri \$uri/ /index.php?\$args;
              }
              
              # PHP-FPM 연결
              location ~ \.php$ {
                  fastcgi_pass php_fpm_pool;
                  fastcgi_index index.php;
                  fastcgi_param SCRIPT_FILENAME \$document_root\$fastcgi_script_name;
                  fastcgi_param HTTP_HOST \$host;
                  fastcgi_param HTTPS on;
                  fastcgi_param SERVER_PORT 443;
                  include fastcgi_params;
                  fastcgi_read_timeout 300;
                  fastcgi_buffers 16 16k;
                  fastcgi_buffer_size 32k;
                  # FastCGI 캐시 헤더
                  add_header X-PHP-FPM-Cache \$upstream_cache_status;
              }
              
              # wp-admin 보안
              location = /xmlrpc.php { deny all; }
              location ~* /\. { deny all; }
              
              # 업로드 파일 PHP 실행 차단
              location ~* /uploads/.*\.php$ { deny all; }
          }
          NGXEOF

          # phpMyAdmin 사이트 설정 (포트 8081)
          sudo tee /etc/nginx/sites-available/phpmyadmin > /dev/null << NGXEOF
          server {
              listen 8081;
              server_name _;
              root ${PMA_ABS};
              index index.php;
              client_max_body_size 64M;
              
              location / {
                  try_files \$uri \$uri/ /index.php?\$args;
              }
              location ~ \.php$ {
                  fastcgi_pass 127.0.0.1:9000;
                  fastcgi_index index.php;
                  fastcgi_param SCRIPT_FILENAME \$document_root\$fastcgi_script_name;
                  fastcgi_param HTTPS on;
                  include fastcgi_params;
              }
              location ~* /\. { deny all; }
          }
          NGXEOF

          sudo ln -sf /etc/nginx/sites-available/wordpress  /etc/nginx/sites-enabled/
          sudo ln -sf /etc/nginx/sites-available/phpmyadmin /etc/nginx/sites-enabled/
          sudo rm -f /etc/nginx/sites-enabled/default

          sudo nginx -t 2>&1 && echo "✓ nginx 설정 검증 통과"
          sudo systemctl restart nginx
          sleep 1

          # 상태 확인
          for PORT in 8080 8081; do
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 \
                     "http://${HOST_IP}:${PORT}/" 2>/dev/null || echo "000")
            echo "nginx 포트 ${PORT}: HTTP ${CODE}"
          done

          echo "HOST_IP=${HOST_IP}" >> $GITHUB_ENV
          echo "WP_PORT=8080"       >> $GITHUB_ENV
          echo "PMA_PORT=8081"      >> $GITHUB_ENV

      # ────────────────────────────────────────────────
      # STEP 7: deploy/tunnel-config.json 저장
      # ────────────────────────────────────────────────
      - name: 스택 설정 저장
        run: |
          mkdir -p deploy
          WORKER_NAME="${{ inputs.secret_worker_name }}"
          [ -z "$WORKER_NAME" ] && WORKER_NAME="wpspot-${{ inputs.site_slug }}"
          echo "WORKER_NAME=${WORKER_NAME}" >> $GITHUB_ENV
          echo "PMA_WORKER=${WORKER_NAME}-pma" >> $GITHUB_ENV

          python3 - << PYEOF
import json
data = {
  'wp_port':  8080,
  'pma_port': 8081,
  'php_fpm_ports': [9000, 9001],
  'redis_port': 6379,
  'mariadb_port': 3306,
  'wordpress_dir': 'wordpress',
  'pma_dir': 'wordpress/wp-content/phpmyadmin',
  'worker_name': '${WORKER_NAME}',
  'pma_worker':  '${WORKER_NAME}-pma',
  'site_slug':   '${{ inputs.site_slug }}',
  'custom_domain': '${{ inputs.custom_domain }}',
  'stack': 'nginx+php-fpm+mariadb+redis',
  'php_version': '8.3',
  'nginx_version': 'system',
}
open('deploy/tunnel-config.json','w').write(json.dumps(data, indent=2))
print('tunnel-config.json 저장 완료')
PYEOF

      # ────────────────────────────────────────────────
      # STEP 8: cloudflared + Named Tunnel
      # ────────────────────────────────────────────────
      - name: cloudflared 설치
        run: |
          CF_URL="https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb"
          for attempt in 1 2 3; do
            curl -sSL -f "$CF_URL" -o /tmp/cloudflared.deb && break
            echo "::warning::cloudflared 다운로드 실패 (시도 ${attempt}/3)"
            sleep 5
            [ $attempt -eq 3 ] && { echo "::error::cloudflared 설치 실패"; exit 1; }
          done
          dpkg -x /tmp/cloudflared.deb /tmp/cloudflared-pkg
          sudo cp /tmp/cloudflared-pkg/usr/bin/cloudflared /usr/local/bin/cloudflared
          cloudflared --version

      - name: Named Tunnel 생성 (WP + PMA)
        env:
          CLOUDFLARE_API_TOKEN: ${{ inputs.secret_cf_api_token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ inputs.secret_cf_account_id }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::warning::CF 자격증명 없음 — 터널 생성 건너뜀"
            echo "CF_CREDS_OK=false" >> $GITHUB_ENV
            exit 0
          fi
          echo "CF_CREDS_OK=true" >> $GITHUB_ENV

          create_or_get_tunnel() {
            local NAME="$1"
            local RESP ID TOKEN
            RESP=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/cfd_tunnel" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"${NAME}\",\"tunnel_secret\":\"$(openssl rand -base64 32)\"}")
            ID=$(echo "$RESP" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d['result']['id'])" 2>/dev/null || echo "")
            if [ -z "$ID" ]; then
              RESP=$(curl -s \
                "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/cfd_tunnel?name=${NAME}&is_deleted=false" \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
              ID=$(echo "$RESP" | python3 -c \
                "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'])" 2>/dev/null || echo "")
            fi
            [ -z "$ID" ] && { echo "::error::Tunnel 생성 실패: $NAME"; exit 1; }
            TOKEN=$(curl -s \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/cfd_tunnel/${ID}/token" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['result'])" 2>/dev/null)
            [ -z "$TOKEN" ] && { echo "::error::Tunnel Token 실패: $NAME"; exit 1; }
            echo "${ID}|${TOKEN}"
          }

          WP_R=$(create_or_get_tunnel "wpspot-${{ inputs.site_slug }}-wp")
          WP_TUNNEL_ID="${WP_R%|*}"; WP_TUNNEL_TOKEN="${WP_R#*|}"
          PMA_R=$(create_or_get_tunnel "wpspot-${{ inputs.site_slug }}-pma")
          PMA_TUNNEL_ID="${PMA_R%|*}"; PMA_TUNNEL_TOKEN="${PMA_R#*|}"

          echo "WP_TUNNEL_ID=${WP_TUNNEL_ID}"       >> $GITHUB_ENV
          echo "WP_TUNNEL_TOKEN=${WP_TUNNEL_TOKEN}"  >> $GITHUB_ENV
          echo "WP_TUNNEL_HOST=${WP_TUNNEL_ID}.cfargotunnel.com" >> $GITHUB_ENV
          echo "PMA_TUNNEL_ID=${PMA_TUNNEL_ID}"      >> $GITHUB_ENV
          echo "PMA_TUNNEL_TOKEN=${PMA_TUNNEL_TOKEN}" >> $GITHUB_ENV
          echo "PMA_TUNNEL_HOST=${PMA_TUNNEL_ID}.cfargotunnel.com" >> $GITHUB_ENV

          # tunnel-config.json 업데이트
          python3 -c "
import json
cfg = json.load(open('deploy/tunnel-config.json'))
cfg['wp_tunnel_id']   = '${WP_TUNNEL_ID}'
cfg['wp_tunnel_host'] = '${WP_TUNNEL_ID}.cfargotunnel.com'
cfg['pma_tunnel_id']  = '${PMA_TUNNEL_ID}'
cfg['pma_tunnel_host']= '${PMA_TUNNEL_ID}.cfargotunnel.com'
open('deploy/tunnel-config.json','w').write(json.dumps(cfg, indent=2))
"

      - name: Named Tunnel 연결 (WP → nginx:8080)
        run: |
          [ "${CF_CREDS_OK}" != "true" ] && { echo "건너뜀"; exit 0; }
          cloudflared tunnel --no-autoupdate run \
            --token "${WP_TUNNEL_TOKEN}" \
            --url "http://${HOST_IP}:8080" \
            --logfile /tmp/cf-wp.log 2>&1 &
          echo $! > /tmp/cf-wp.pid
          sleep 5
          CONN=$(grep -c "Registered tunnel connection" /tmp/cf-wp.log 2>/dev/null || echo "0")
          echo "WP Named Tunnel: $CONN"
          if [ "$CONN" = "0" ]; then
            kill "$(cat /tmp/cf-wp.pid 2>/dev/null)" 2>/dev/null || true
            sleep 3
            cloudflared tunnel --no-autoupdate run \
              --token "${WP_TUNNEL_TOKEN}" \
              --url "http://${HOST_IP}:8080" \
              --logfile /tmp/cf-wp.log 2>&1 &
            echo $! > /tmp/cf-wp.pid
            sleep 5
          fi

      - name: Named Tunnel 연결 (PMA → nginx:8081)
        run: |
          [ "${CF_CREDS_OK}" != "true" ] && exit 0
          cloudflared tunnel --no-autoupdate run \
            --token "${PMA_TUNNEL_TOKEN}" \
            --url "http://${HOST_IP}:8081" \
            --logfile /tmp/cf-pma.log 2>&1 &
          echo $! > /tmp/cf-pma.pid
          sleep 3
          CONN=$(grep -c "Registered tunnel connection" /tmp/cf-pma.log 2>/dev/null || echo "0")
          echo "PMA Named Tunnel: $CONN"

      # ────────────────────────────────────────────────
      # STEP 9: Cloudflare Worker 배포 + DNS/도메인
      # ────────────────────────────────────────────────
      - name: Cloudflare Worker 배포 + 커스텀 도메인 등록
        env:
          CLOUDFLARE_API_TOKEN: ${{ inputs.secret_cf_api_token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ inputs.secret_cf_account_id }}
        run: |
          [ "${CF_CREDS_OK}" != "true" ] && { echo "건너뜀"; exit 0; }
          npm install -g wrangler --quiet --no-progress 2>/dev/null

          deploy_worker() {
            local NAME="$1" TUNNEL_HOST="$2" WORKDIR="/tmp/cf-${NAME}"
            mkdir -p "$WORKDIR"
            python3 - << PYEOF
js = r"""export default {
  async fetch(request, env) {
    const origin = env.TUNNEL_ORIGIN;
    if (!origin) return new Response(offline(), {status:503,headers:{'Content-Type':'text/html;charset=utf-8','Retry-After':'30'}});
    const url = new URL(request.url);
    const t = new URL(origin);
    t.pathname = url.pathname; t.search = url.search;
    const h = new Headers(request.headers);
    h.set('host', new URL(origin).host);
    h.set('x-forwarded-proto','https');
    h.set('x-real-ip', request.headers.get('cf-connecting-ip') || '');
    try {
      const r = await fetch(t.toString(), {
        method: request.method, headers: h,
        body: ['GET','HEAD'].includes(request.method) ? undefined : request.body,
        redirect: 'manual'
      });
      const out = new Headers(r.headers);
      out.set('x-powered-by','wpspot/nginx+php-fpm');
      return new Response(r.body, {status:r.status, headers:out});
    } catch(e) {
      return new Response(offline(e.message), {status:503,headers:{'Content-Type':'text/html;charset=utf-8','Retry-After':'30'}});
    }
  }
};
function offline(m=''){
  return '<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8"><meta http-equiv="refresh" content="30"><title>잠시 후 이용 가능해요</title>'
    +'<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;'
    +'background:#f8fafc;display:flex;align-items:center;justify-content:center;min-height:100vh}'
    +'.box{background:#fff;border-radius:16px;padding:40px;max-width:400px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.06)}'
    +'h2{color:#0f172a;font-size:1.4rem;margin-bottom:12px}p{color:#64748b;line-height:1.6;font-size:.95rem}'
    +'.dot{display:inline-block;width:8px;height:8px;background:#10b981;border-radius:50%;margin-right:8px;animation:pulse 1.5s infinite}'
    +'@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}</style></head>'
    +'<body><div class="box"><div><span class="dot"></span></div><h2>서버 준비 중이에요</h2>'
    +'<p>30초 후 자동으로 새로고침됩니다.</p>'
    +(m?'<p style="font-size:.75rem;color:#94a3b8;margin-top:12px">'+m+'</p>':'')+'</div></body></html>';
}"""
open('${WORKDIR}/worker.js','w').write(js)
PYEOF
            python3 -c "
name='${NAME}'; host='${TUNNEL_HOST}'
toml='name=\"'+name+'\"\nmain=\"worker.js\"\ncompatibility_date=\"2024-09-23\"\n[vars]\nTUNNEL_ORIGIN=\"https://'+host+'\"\n'
open('${WORKDIR}/wrangler.toml','w').write(toml)
"
            cd "$WORKDIR" && wrangler deploy --minify
            echo "✓ Worker 배포: ${NAME}"
          }

          deploy_worker "$WORKER_NAME"  "$WP_TUNNEL_HOST"
          deploy_worker "$PMA_WORKER"   "$PMA_TUNNEL_HOST"

          WORKER_URL="https://${WORKER_NAME}.${{ inputs.secret_cf_account_id }}.workers.dev"
          FINAL_URL="${{ inputs.custom_domain }}"
          FINAL_URL="${FINAL_URL:+https://${FINAL_URL}}"
          FINAL_URL="${FINAL_URL:-${WORKER_URL}}"
          echo "WORKER_URL=${WORKER_URL}" >> $GITHUB_ENV
          echo "FINAL_SITE_URL=${FINAL_URL}" >> $GITHUB_ENV

          # tunnel-config.json 업데이트
          python3 -c "
import json
cfg = json.load(open('deploy/tunnel-config.json'))
cfg['worker_url']      = '${WORKER_URL}'
cfg['final_site_url']  = '${FINAL_URL}'
cfg['pma_worker_url']  = 'https://${{ inputs.secret_cf_account_id }}.workers.dev/${PMA_WORKER}'
open('deploy/tunnel-config.json','w').write(json.dumps(cfg, indent=2))
"

          # 커스텀 도메인 자동 등록
          register_domain() {
            local DOMAIN="$1" WORKER="$2"
            [ -z "$DOMAIN" ] && return
            ZONE_ID=$(curl -s \
              "https://api.cloudflare.com/client/v4/zones?name=$(echo $DOMAIN | awk -F. '{print $(NF-1)"."$NF}')" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              | python3 -c "import sys,json; r=json.load(sys.stdin)['result']; print(r[0]['id'] if r else '')" 2>/dev/null || echo "")
            [ -z "$ZONE_ID" ] && {
              echo "::warning::Zone 없음 (${DOMAIN}) — 수동 CNAME 필요: ${DOMAIN} → ${WORKER}.${{ inputs.secret_cf_account_id }}.workers.dev"
              return
            }
            # CNAME 등록/업데이트
            DNS=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"type\":\"CNAME\",\"name\":\"${DOMAIN}\",\"content\":\"${WORKER}.${{ inputs.secret_cf_account_id }}.workers.dev\",\"proxied\":true,\"ttl\":1}")
            DNS_OK=$(echo "$DNS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('success',False))" 2>/dev/null)
            if [ "$DNS_OK" != "True" ]; then
              REC_ID=$(curl -s \
                "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?name=${DOMAIN}&type=CNAME" \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                | python3 -c "import sys,json; r=json.load(sys.stdin)['result']; print(r[0]['id'] if r else '')" 2>/dev/null)
              [ -n "$REC_ID" ] && curl -s -X PUT \
                "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records/${REC_ID}" \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"type\":\"CNAME\",\"name\":\"${DOMAIN}\",\"content\":\"${WORKER}.${{ inputs.secret_cf_account_id }}.workers.dev\",\"proxied\":true,\"ttl\":1}" > /dev/null
            fi
            # Worker 도메인 바인딩
            curl -s -X PUT \
              "https://api.cloudflare.com/client/v4/accounts/${{ inputs.secret_cf_account_id }}/workers/scripts/${WORKER}/domains" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"domains\":[{\"zone_id\":\"${ZONE_ID}\",\"hostname\":\"${DOMAIN}\"}]}" > /dev/null
            echo "✓ 도메인 등록: ${DOMAIN} → ${WORKER}"
          }

          register_domain "${{ inputs.custom_domain }}" "$WORKER_NAME"
          register_domain "${{ inputs.pma_domain }}"    "$PMA_WORKER"

      # ────────────────────────────────────────────────
      # STEP 10: GitHub Secrets 등록
      # ────────────────────────────────────────────────
      - name: GitHub Secrets 등록
        env:
          GH_PAT: ${{ inputs.secret_github_token }}
        run: |
          REPO="${{ github.repository }}"
          [ -z "$GH_PAT" ] && { echo "PAT 없음 — 건너뜀"; exit 0; }
          pip install PyNaCl --quiet --break-system-packages 2>/dev/null
          PK=$(curl -sf \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/actions/secrets/public-key" || echo "")
          [ -z "$PK" ] && { echo "Public key 조회 실패"; exit 0; }
          KEY_ID=$(echo "$PK" | python3 -c "import sys,json; print(json.load(sys.stdin)['key_id'])")
          PUB_KEY=$(echo "$PK" | python3 -c "import sys,json; print(json.load(sys.stdin)['key'])")
          set_secret() {
            local N="$1" V="$2"
            [ -z "$V" ] && return
            ENC=$(python3 -c "
import sys,base64
from nacl import encoding,public
pub=public.PublicKey(sys.argv[1].encode(),encoding.Base64Encoder)
enc=public.SealedBox(pub).encrypt(sys.argv[2].encode())
print(base64.b64encode(enc).decode())
" "$PUB_KEY" "$V" 2>/dev/null)
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" -X PUT \
              -H "Authorization: Bearer ${GH_PAT}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${REPO}/actions/secrets/${N}" \
              -d "{\"encrypted_value\":\"${ENC}\",\"key_id\":\"${KEY_ID}\"}" || echo "000")
            [ "$CODE" = "201" ] || [ "$CODE" = "204" ] && echo "✓ $N" || echo "✗ $N ($CODE)"
          }
          set_secret "CF_ACCOUNT_ID"   "${{ inputs.secret_cf_account_id }}"
          set_secret "CF_API_TOKEN"    "${{ inputs.secret_cf_api_token }}"
          set_secret "WP_TUNNEL_TOKEN" "${WP_TUNNEL_TOKEN}"
          set_secret "PMA_TUNNEL_TOKEN" "${PMA_TUNNEL_TOKEN}"
          set_secret "DB_PASS"         "${DB_PASS}"
          set_secret "REDIS_PASS"      "${REDIS_PASS}"

      # ────────────────────────────────────────────────
      # STEP 11: DB 백업 + git push
      # ────────────────────────────────────────────────
      - name: DB 백업 및 커밋
        run: |
          mkdir -p wordpress/db-backup
          mysqldump -u wpuser -p"${DB_PASS}" -h 127.0.0.1 wordpress \
            2>/dev/null | gzip > wordpress/db-backup/latest.sql.gz
          echo "✓ DB 덤프 완료 ($(du -sh wordpress/db-backup/latest.sql.gz | cut -f1))"
          # .gitignore — wp-config.php는 제외 (비밀번호 포함)
          echo "wp-config.php" >> wordpress/.gitignore
          echo ".htaccess"     >> wordpress/.gitignore
          git config user.name  "wpspot-bot"
          git config user.email "bot@wpspot.app"
          git add -A
          git diff --cached --quiet || \
            git commit -m "chore: provision wordpress [${{ inputs.site_slug }}]"
          git push

      # ────────────────────────────────────────────────
      # STEP 12: wpspot 콜백
      # ────────────────────────────────────────────────
      - name: wpspot 콜백
        run: |
          CALLBACK="${{ inputs.wpspot_callback_url }}"
          SITE_ID="${{ inputs.wpspot_site_id }}"
          JWT="${{ inputs.wpspot_jwt }}"
          [ -z "$CALLBACK" ] || [ -z "$SITE_ID" ] || [ -z "$JWT" ] && {
            echo "콜백 정보 없음 — 건너뜀"; exit 0
          }
          python3 - << PYEOF
import json, urllib.request
payload = json.dumps({
  'siteId':       '${SITE_ID}',
  'tunnelWpUrl':  'https://${WP_TUNNEL_HOST:-}',
  'tunnelPmaUrl': 'https://${PMA_TUNNEL_HOST:-}',
  'workerUrl':    '${WORKER_URL:-}',
  'finalSiteUrl': '${FINAL_SITE_URL:-}',
  'stack':        'nginx+php-fpm8.3+mariadb+redis7',
  'status':       'active'
}).encode()
req = urllib.request.Request('${CALLBACK}', data=payload,
  headers={'Authorization':'Bearer ${JWT}','Content-Type':'application/json'}, method='POST')
try:
  r = urllib.request.urlopen(req, timeout=10)
  print('콜백 응답:', r.status)
except Exception as e:
  print('::warning::콜백 실패:', e)
PYEOF

      - name: 완료 요약
        run: |
          echo "================================================"
          echo "  wpspot 프로비저닝 완료"
          echo "  스택: nginx + PHP-FPM 8.3 + MariaDB + Redis 7"
          echo "================================================"
          [ -n "${{ inputs.custom_domain }}" ] && echo "  사이트: https://${{ inputs.custom_domain }}"
          echo "  Worker: ${WORKER_URL:-없음}"
          echo "  WP 터널: https://${WP_TUNNEL_HOST:-없음}"
          echo "  PMA 터널: https://${PMA_TUNNEL_HOST:-없음}"
          echo "  nginx: 8080(WP), 8081(PMA)"
          echo "  PHP-FPM: 9000(main,pm=dynamic,max=10), 9001(sub,ondemand)"
          echo "  MariaDB: 3306"
          echo "  Redis 7: 6379 (로컬, 무료)"
          echo "  OPcache: 128MB"
          echo "================================================"

      # ────────────────────────────────────────────────
      # STEP 13: 서버 유지 (6분 자동복구)
      # ────────────────────────────────────────────────
      - name: 서버/터널 유지 (6분)
        env:
          WP_TUNNEL_TOKEN:  ${{ secrets.WP_TUNNEL_TOKEN }}
          PMA_TUNNEL_TOKEN: ${{ secrets.PMA_TUNNEL_TOKEN }}
        run: |
          recover() {
            # nginx
            sudo systemctl is-active nginx  > /dev/null 2>&1 || sudo systemctl restart nginx
            # PHP-FPM
            sudo systemctl is-active php8.3-fpm > /dev/null 2>&1 || sudo systemctl restart php8.3-fpm
            # MariaDB
            sudo systemctl is-active mariadb > /dev/null 2>&1 || sudo systemctl restart mariadb
            # Redis
            sudo systemctl is-active redis-server > /dev/null 2>&1 || sudo systemctl restart redis-server
            # 터널
            kill -0 "$(cat /tmp/cf-wp.pid 2>/dev/null)" 2>/dev/null || {
              [ -n "$WP_TUNNEL_TOKEN" ] && cloudflared tunnel --no-autoupdate run \
                --token "$WP_TUNNEL_TOKEN" --url "http://${HOST_IP}:8080" \
                --logfile /tmp/cf-wp.log 2>&1 & echo $! > /tmp/cf-wp.pid
            }
            kill -0 "$(cat /tmp/cf-pma.pid 2>/dev/null)" 2>/dev/null || {
              [ -n "$PMA_TUNNEL_TOKEN" ] && cloudflared tunnel --no-autoupdate run \
                --token "$PMA_TUNNEL_TOKEN" --url "http://${HOST_IP}:8081" \
                --logfile /tmp/cf-pma.log 2>&1 & echo $! > /tmp/cf-pma.pid
            }
          }
          for i in $(seq 1 6); do
            sleep 60
            recover
            echo "[${i}분] nginx+fpm+mariadb+redis+tunnel 유지 확인"
          done
