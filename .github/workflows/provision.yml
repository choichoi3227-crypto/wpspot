PYEOF

          python3 -c "
import sys
name = sys.argv[1]; host = sys.argv[2]
toml = 'name = \"' + name + '\"\nmain = \"worker.js\"\ncompatibility_date = \"2024-09-23\"\n[vars]\nTUNNEL_ORIGIN = \"https://' + host + '\"\n'
open('/tmp/cf-pla/wrangler.toml','w').write(toml)
" "$PMA_WORKER" "$PLA_TUNNEL_HOST"
          cd /tmp/cf-pla && wrangler deploy --minify
          echo "PLA Worker 배포 완료: ${PMA_WORKER}"

          # ── 커스텀 도메인 Worker 라우트 + DNS CNAME 자동 등록 ──
          CUSTOM_DOMAIN="${{ inputs.custom_domain }}"
          PMA_DOMAIN="${{ inputs.pma_domain }}"

          register_worker_domain() {
            local DOMAIN="$1"
            local WORKER="$2"
            [ -z "$DOMAIN" ] && return
            echo "커스텀 도메인 등록 시작: ${DOMAIN} → ${WORKER}"

            # 1) Cloudflare Zone ID 조회
            ZONE_ID=$(curl -s \
              "https://api.cloudflare.com/client/v4/zones?name=$(echo $DOMAIN | awk -F. '{print $(NF-1)"."$NF}')" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              | python3 -c "import sys,json; r=json.load(sys.stdin)['result']; print(r[0]['id'] if r else '')" 2>/dev/null || echo "")

            if [ -z "$ZONE_ID" ]; then
              echo "::warning::Zone ID 조회 실패 (${DOMAIN}) — DNS/라우트 자동 등록 건너뜀"
              echo "  수동 설정 필요: CNAME ${DOMAIN} → ${WORKER}.${{ inputs.secret_cf_account_id }}.workers.dev"
              return
            fi
            echo "Zone ID: ${ZONE_ID}"

            # 2) DNS CNAME 등록 (이미 있으면 업데이트)
            DNS_RESP=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"type\":\"CNAME\",\"name\":\"${DOMAIN}\",\"content\":\"${WORKER}.${{ inputs.secret_cf_account_id }}.workers.dev\",\"proxied\":true,\"ttl\":1}")
            DNS_OK=$(echo "$DNS_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('success',False))" 2>/dev/null)

            if [ "$DNS_OK" != "True" ]; then
              # 이미 존재하면 업데이트
              REC_ID=$(curl -s \
                "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?name=${DOMAIN}&type=CNAME" \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                | python3 -c "import sys,json; r=json.load(sys.stdin)['result']; print(r[0]['id'] if r else '')" 2>/dev/null)
              [ -n "$REC_ID" ] && curl -s -X PUT \
                "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records/${REC_ID}" \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"type\":\"CNAME\",\"name\":\"${DOMAIN}\",\"content\":\"${WORKER}.${{ inputs.secret_cf_account_id }}.workers.dev\",\"proxied\":true,\"ttl\":1}" \
                | python3 -c "import sys,json; d=json.load(sys.stdin); print('DNS 업데이트: '+str(d.get('success')))" 2>/dev/null
            else
              echo "DNS CNAME 등록 완료: ${DOMAIN}"
            fi

            # 3) Worker 커스텀 도메인 바인딩
            BIND_RESP=$(curl -s -X PUT \
              "https://api.cloudflare.com/client/v4/accounts/${{ inputs.secret_cf_account_id }}/workers/scripts/${WORKER}/domains" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"domains\":[{\"zone_id\":\"${ZONE_ID}\",\"hostname\":\"${DOMAIN}\"}]}")
            BIND_OK=$(echo "$BIND_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('success',False))" 2>/dev/null)
            echo "Worker 도메인 바인딩 (${DOMAIN}): ${BIND_OK}"
          }

          register_worker_domain "$CUSTOM_DOMAIN" "$WORKER_NAME"
          register_worker_domain "$PMA_DOMAIN" "$PMA_WORKER"

          # ── tunnel-config.json에 worker URL 저장 ──
          FINAL_URL="${CUSTOM_DOMAIN:+https://${CUSTOM_DOMAIN}}"
          FINAL_URL="${FINAL_URL:-${WORKER_URL}}"
          echo "FINAL_SITE_URL=${FINAL_URL}" >> $GITHUB_ENV

          python3 -c "
import json, sys
cfg = json.load(open('deploy/tunnel-config.json'))
cfg['worker_url'] = sys.argv[1]
cfg['final_site_url'] = sys.argv[2]
cfg['pla_worker_url'] = sys.argv[3]
open('deploy/tunnel-config.json','w').write(json.dumps(cfg, indent=2))
print('tunnel-config.json 업데이트 완료')
" "${WORKER_URL}" "${FINAL_URL}" \
  "https://${{ inputs.secret_cf_account_id }}.workers.dev/${PMA_WORKER}"

      - name: GitHub Secrets 등록 (Tunnel Token + CF + Redis)
        env:
          GH_PAT: ${{ inputs.secret_github_token }}
        run: |
          REPO="${{ github.repository }}"
          [ -z "$GH_PAT" ] && { echo "PAT 없음 — 건너뜀"; exit 0; }
          [ "${CF_CREDS_OK}" != "true" ] && { echo "CF 자격증명 없음 — 건너뜀"; exit 0; }
          pip install PyNaCl --quiet --break-system-packages 2>/dev/null

          PK=$(curl -sf \
            -H "Authorization: Bearer ${GH_PAT}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/actions/secrets/public-key" || echo "")
          [ -z "$PK" ] && { echo "Public key 조회 실패"; exit 0; }
          KEY_ID=$(echo "$PK" | python3 -c "import sys,json; print(json.load(sys.stdin)['key_id'])")
          PUB_KEY=$(echo "$PK" | python3 -c "import sys,json; print(json.load(sys.stdin)['key'])")

          set_secret() {
            local NAME="$1" VALUE="$2"
            [ -z "$VALUE" ] && return
            ENC=$(python3 -c "
import sys, base64
from nacl import encoding, public
pub = public.PublicKey(sys.argv[1].encode(), encoding.Base64Encoder)
enc = public.SealedBox(pub).encrypt(sys.argv[2].encode())
print(base64.b64encode(enc).decode())
" "$PUB_KEY" "$VALUE" 2>/dev/null)
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" \
              -X PUT \
              -H "Authorization: Bearer ${GH_PAT}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${REPO}/actions/secrets/${NAME}" \
              -d "{\"encrypted_value\":\"${ENC}\",\"key_id\":\"${KEY_ID}\"}" || echo "000")
            [ "$CODE" = "201" ] || [ "$CODE" = "204" ] && echo "✓ $NAME" || echo "✗ $NAME ($CODE)"
          }

          set_secret "CF_ACCOUNT_ID"      "${{ inputs.secret_cf_account_id }}"
          set_secret "CF_API_TOKEN"        "${{ inputs.secret_cf_api_token }}"
          set_secret "WP_TUNNEL_TOKEN"     "${WP_TUNNEL_TOKEN}"
          set_secret "PLA_TUNNEL_TOKEN"    "${PLA_TUNNEL_TOKEN}"
          set_secret "UPSTASH_REDIS_URL"   "${{ inputs.upstash_redis_url }}"
          set_secret "UPSTASH_REDIS_TOKEN" "${{ inputs.upstash_redis_token }}"
          echo "Secrets 등록 완료"

      - name: wpspot 콜백
        run: |
          CALLBACK="${{ inputs.wpspot_callback_url }}"
          SITE_ID="${{ inputs.wpspot_site_id }}"
          JWT="${{ inputs.wpspot_jwt }}"
          if [ -z "$CALLBACK" ] || [ -z "$SITE_ID" ] || [ -z "$JWT" ]; then
            echo "콜백 정보 없음 — 건너뜀"
            exit 0
          fi
          python3 - << PYEOF
import json, urllib.request
payload = json.dumps({
  'siteId': '${SITE_ID}',
  'tunnelWpUrl': 'https://${WP_TUNNEL_HOST:-}',
  'tunnelPlaUrl': 'https://${PLA_TUNNEL_HOST:-}',
  'workerUrl': '${WORKER_URL:-}',
  'finalSiteUrl': '${FINAL_SITE_URL:-}',
  'status': 'active'
}).encode()
req = urllib.request.Request('${CALLBACK}', data=payload,
  headers={'Authorization':'Bearer ${JWT}','Content-Type':'application/json'}, method='POST')
try:
  r = urllib.request.urlopen(req, timeout=10)
  print('콜백 응답:', r.status)
except Exception as e:
  print('::warning::콜백 실패:', e)
PYEOF

      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name  "wpspot-bot"
          git config user.email "bot@wpspot.app"
          git add -A
          git diff --cached --quiet || \
            git commit -m "chore: provision wordpress [${{ inputs.site_slug }}]"
          git push

      - name: 완료 요약
        run: |
          echo "============================================"
          echo "  wpspot 프로비저닝 완료"
          echo "============================================"
          DOMAIN="${{ inputs.custom_domain }}"
          [ -n "$DOMAIN" ] && echo "  사이트:      https://${DOMAIN}"
          echo "  WP 터널:     https://${WP_TUNNEL_HOST:-없음}"
          echo "  PLA 터널:    https://${PLA_TUNNEL_HOST:-없음}"
          echo "  Worker URL:  ${WORKER_URL:-없음}"
          echo "  PHP 포트:    8888(main-1), 8889(main-2) | 서브: 8890~8897"
          REDIS_STATUS="미사용"
          [ "${REDIS_DISABLED:-true}" = "false" ] && REDIS_STATUS="Upstash 서버리스 Redis 활성"
          echo "  Redis:       ${REDIS_STATUS}"
          echo "  터널:        Named Tunnel (영구 hostname 고정)"
          echo "  엔진:        PHP 8.3 내장 서버 × 최대 10개"
          echo "  DB:          SQLite (sqlite-database-integration)"
          echo "============================================"

      - name: 서버/터널 유지 (6분 — 자동 복구 루프)
        env:
          WP_TUNNEL_TOKEN: ${{ secrets.WP_TUNNEL_TOKEN }}
        run: |
          HOST_IP=$(hostname -I | awk '{print $1}')
          REPO_ROOT="$(pwd)"
          WP_DIR="${REPO_ROOT}/wordpress"

          recover_server() {
            local PORT=$1
            local CODE
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 8 \
                     "http://${HOST_IP}:${PORT}/" 2>/dev/null || echo "000")
            if [ "$CODE" = "000" ]; then
              echo "[복구] PHP 서버 포트 ${PORT} 재시작"
              kill "$(cat /tmp/php-servers/php-${PORT}.pid 2>/dev/null)" 2>/dev/null || true
              sleep 1
              php -S "0.0.0.0:${PORT}" /tmp/wp-router.php \
                -t "${WP_DIR}" \
                -d display_errors=0 \
                >> "/tmp/php-servers/php-${PORT}.log" 2>&1 &
              echo $! > "/tmp/php-servers/php-${PORT}.pid"
              echo "[복구] 포트 ${PORT} 재시작 완료"
            fi
          }

          recover_tunnel() {
            if ! kill -0 "$(cat /tmp/cf-wp.pid 2>/dev/null)" 2>/dev/null; then
              echo "[복구] WP 터널 재시작"
              [ -n "${WP_TUNNEL_TOKEN}" ] && \
                cloudflared tunnel --no-autoupdate run \
                  --token "${WP_TUNNEL_TOKEN}" \
                  --url "http://${HOST_IP}:8888" \
                  --logfile /tmp/cf-wp-named.log 2>&1 &
              echo $! > /tmp/cf-wp.pid
            fi
          }

          for i in $(seq 1 6); do
            sleep 60
            recover_server 8888
            recover_server 8889
            recover_tunnel
            echo "[${i}분] 서버/터널 유지 확인 완료"
          done
