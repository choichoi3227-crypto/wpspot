          PMA_PORT=$([ -f "$CFG" ] && python3 -c "import json; print(json.load(open('$CFG')).get('pma_port',8081))" || echo 8081)
          WP_DIR=$([ -f "$CFG" ] && python3 -c "import json; print(json.load(open('$CFG')).get('wordpress_dir','wordpress'))" || echo wordpress)
          PMA_DIR=$([ -f "$CFG" ] && python3 -c "import json; print(json.load(open('$CFG')).get('pma_dir','wordpress/wp-content/phpmyadmin'))" || echo "wordpress/wp-content/phpmyadmin")
          HOST_IP=$(hostname -I | awk '{print $1}')
          WP_ABS="$(pwd)/${WP_DIR}"; PMA_ABS="$(pwd)/${PMA_DIR}"
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends nginx php8.3-fpm php8.3-mysql php8.3-gd php8.3-curl php8.3-xml php8.3-mbstring php8.3-zip php8.3-intl php8.3-redis php8.3-opcache mariadb-server mariadb-client redis-server 2>/dev/null
          sudo systemctl start mariadb; sleep 2
          sudo mysql -u root -e "CREATE DATABASE IF NOT EXISTS wordpress CHARACTER SET utf8mb4; CREATE USER IF NOT EXISTS 'wpuser'@'127.0.0.1' IDENTIFIED BY '${DB_PASS}'; GRANT ALL ON wordpress.* TO 'wpuser'@'127.0.0.1'; FLUSH PRIVILEGES;" 2>/dev/null
          WP_ROWS=$(mysql -u wpuser -p"${DB_PASS}" -h 127.0.0.1 -e "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='wordpress';" 2>/dev/null | tail -1 || echo "0")
          [ "$WP_ROWS" = "0" ] && [ -f "${WP_DIR}/db-backup/latest.sql.gz" ] && zcat "${WP_DIR}/db-backup/latest.sql.gz" | sudo mysql -u root wordpress
          printf "bind 127.0.0.1\nport 6379\ndaemonize yes\nrequirepass ${REDIS_PASS}\nmaxmemory 128mb\nmaxmemory-policy allkeys-lru\nsave \"\"\n" | sudo tee /etc/redis/redis.conf > /dev/null
          sudo systemctl restart redis-server; sleep 1
          printf "opcache.enable=1\nopcache.memory_consumption=128\nopcache.max_accelerated_files=10000\nopcache.revalidate_freq=0\nopcache.validate_timestamps=0\n" | sudo tee /etc/php/8.3/fpm/conf.d/10-opcache-wp.ini > /dev/null
          printf "[www]\nuser=www-data\ngroup=www-data\nlisten=127.0.0.1:9000\npm=dynamic\npm.max_children=10\npm.start_servers=2\npm.min_spare_servers=2\npm.max_spare_servers=5\npm.max_requests=500\n" | sudo tee /etc/php/8.3/fpm/pool.d/www.conf > /dev/null
          printf "[www2]\nuser=www-data\ngroup=www-data\nlisten=127.0.0.1:9001\npm=ondemand\npm.max_children=10\npm.process_idle_timeout=30s\n" | sudo tee /etc/php/8.3/fpm/pool.d/www2.conf > /dev/null
          sudo systemctl restart php8.3-fpm; sleep 1
          [ -f "${WP_ABS}/wp-config.php" ] && sudo sed -i "s/define('DB_PASSWORD', '[^']*')/define('DB_PASSWORD', '${DB_PASS}')/" "${WP_ABS}/wp-config.php"
          printf "upstream php_fpm_pool { least_conn; server 127.0.0.1:9000 weight=5; server 127.0.0.1:9001 weight=3 backup; keepalive 16; }\n" | sudo tee /etc/nginx/conf.d/upstream-phpfpm.conf > /dev/null
          sudo tee /etc/nginx/sites-available/wordpress > /dev/null << NGXEOF
          server { listen ${WP_PORT}; server_name _; root ${WP_ABS}; index index.php; client_max_body_size 64M; gzip on; gzip_types text/plain text/css application/json application/javascript; location ~* \.(css|js|png|jpg|jpeg|gif|ico|woff|woff2|svg|webp)$ { expires 1y; add_header Cache-Control "public, immutable"; try_files \$uri =404; } location / { try_files \$uri \$uri/ /index.php?\$args; } location ~ \.php$ { fastcgi_pass php_fpm_pool; fastcgi_index index.php; fastcgi_param SCRIPT_FILENAME \$document_root\$fastcgi_script_name; fastcgi_param HTTPS on; fastcgi_param SERVER_PORT 443; include fastcgi_params; fastcgi_buffers 16 16k; fastcgi_buffer_size 32k; } location = /xmlrpc.php { deny all; } location ~* /\. { deny all; } location ~* /uploads/.*\.php$ { deny all; } }
          NGXEOF
          sudo tee /etc/nginx/sites-available/phpmyadmin > /dev/null << NGXEOF
          server { listen ${PMA_PORT}; server_name _; root ${PMA_ABS}; index index.php; location / { try_files \$uri \$uri/ /index.php?\$args; } location ~ \.php$ { fastcgi_pass 127.0.0.1:9000; fastcgi_index index.php; fastcgi_param SCRIPT_FILENAME \$document_root\$fastcgi_script_name; fastcgi_param HTTPS on; include fastcgi_params; } }
          NGXEOF
          sudo ln -sf /etc/nginx/sites-available/wordpress /etc/nginx/sites-enabled/
          sudo ln -sf /etc/nginx/sites-available/phpmyadmin /etc/nginx/sites-enabled/
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo chown -R www-data:www-data "${WP_ABS}/" 2>/dev/null || true
          sudo nginx -t 2>&1 | tail -1 && sudo systemctl restart nginx; sleep 1
          CODE=$(curl -sf -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 "http://${HOST_IP}:${WP_PORT}/" 2>/dev/null || echo "000")
          echo "[keepalive-2] WP: ${CODE}"
          CF_URL="https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb"
          for _t in 1 2 3; do curl -sSL -f "$CF_URL" -o /tmp/cf.deb && break; sleep 5; done
          dpkg -x /tmp/cf.deb /tmp/cf-pkg && sudo cp /tmp/cf-pkg/usr/bin/cloudflared /usr/local/bin/cloudflared
          [ -n "$WP_TUNNEL_TOKEN" ] && cloudflared tunnel --no-autoupdate run --token "$WP_TUNNEL_TOKEN" --url "http://${HOST_IP}:${WP_PORT}" --logfile /tmp/cf-wp.log 2>&1 & echo $! > /tmp/cf-wp.pid
          [ -n "$PMA_TUNNEL_TOKEN" ] && cloudflared tunnel --no-autoupdate run --token "$PMA_TUNNEL_TOKEN" --url "http://${HOST_IP}:${PMA_PORT}" --logfile /tmp/cf-pma.log 2>&1 & echo $! > /tmp/cf-pma.pid
          sleep 4; CONN=$(grep -c "Registered tunnel connection" /tmp/cf-wp.log 2>/dev/null || echo "0"); echo "[keepalive-2] 터널: $CONN"
      - name: 유지
        run: |
          CFG="deploy/tunnel-config.json"
          WP_PORT=$([ -f "$CFG" ] && python3 -c "import json; print(json.load(open('$CFG')).get('wp_port',8080))" || echo 8080)
