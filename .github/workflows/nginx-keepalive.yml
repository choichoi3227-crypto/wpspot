name: wpspot Server Keep-Alive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

# 구조: nginx + PHP-FPM 8.3 + MariaDB + Redis 7 (진짜 Redis, 로컬)
# - 5개 job × 60초 offset → 매 60초 롤링 커버
# - job timeout 8분 > cron 주기 5분 → 항상 overlap 3분
# - 모든 서비스 systemctl 자동복구
# - 매 5분마다 mysqldump → git push (DB 영속화)
# - 0.0.0.0 바인딩, curl/터널은 HOST_IP 사용

jobs:
  keepalive-0:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: 설정 로드
        run: |
          CFG="deploy/tunnel-config.json"
          if [ -f "$CFG" ]; then
            WP_PORT=$(python3 -c "import json; print(json.load(open('$CFG')).get('wp_port',8080))")
            PMA_PORT=$(python3 -c "import json; print(json.load(open('$CFG')).get('pma_port',8081))")
            WP_DIR=$(python3 -c "import json; print(json.load(open('$CFG')).get('wordpress_dir','wordpress'))")
            PMA_DIR=$(python3 -c "import json; print(json.load(open('$CFG')).get('pma_dir','wordpress/wp-content/phpmyadmin'))")
          else
            WP_PORT=8080; PMA_PORT=8081
            WP_DIR=wordpress; PMA_DIR=wordpress/wp-content/phpmyadmin
          fi
          echo "WP_PORT=$WP_PORT"   >> $GITHUB_ENV
          echo "PMA_PORT=$PMA_PORT" >> $GITHUB_ENV
          echo "WP_DIR=$WP_DIR"     >> $GITHUB_ENV
          echo "PMA_DIR=$PMA_DIR"   >> $GITHUB_ENV
          echo "REPO_ROOT=$(pwd)"   >> $GITHUB_ENV
          echo "HOST_IP=$(hostname -I | awk '{print $1}')" >> $GITHUB_ENV

      - name: 패키지 설치 (nginx, PHP-FPM, MariaDB, Redis)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            nginx \
            php8.3-fpm php8.3-mysql php8.3-gd php8.3-curl php8.3-xml \
            php8.3-mbstring php8.3-zip php8.3-intl php8.3-redis \
            php8.3-opcache php8.3-bcmath \
            mariadb-server mariadb-client \
            redis-server \
            2>/dev/null
          echo "✓ 패키지 설치 완료"

      - name: MariaDB 복원 및 시작
        env:
          DB_PASS: ${{ secrets.DB_PASS }}
        run: |
          sudo systemctl start mariadb
          sleep 2

          # DB/사용자 생성 (없으면)
          sudo mysql -u root << SQLEOF
          CREATE DATABASE IF NOT EXISTS wordpress CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
          CREATE USER IF NOT EXISTS 'wpuser'@'127.0.0.1' IDENTIFIED BY '${DB_PASS}';
          GRANT ALL PRIVILEGES ON wordpress.* TO 'wpuser'@'127.0.0.1';
          FLUSH PRIVILEGES;
          SQLEOF

          # DB 내용 확인 — 비어있으면 최신 덤프 복원
          WP_ROWS=$(mysql -u wpuser -p"${DB_PASS}" -h 127.0.0.1 -e \
            "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='wordpress';" \
            2>/dev/null | tail -1 || echo "0")
          if [ "$WP_ROWS" = "0" ] && [ -f "${WP_DIR}/db-backup/latest.sql.gz" ]; then
            echo "DB 복원 중..."
            zcat "${WP_DIR}/db-backup/latest.sql.gz" | sudo mysql -u root wordpress
            echo "✓ DB 복원 완료"
          else
            echo "✓ DB 존재 (테이블 수: ${WP_ROWS})"
          fi

      - name: Redis 시작 (로컬 Redis 7)
        env:
          REDIS_PASS: ${{ secrets.REDIS_PASS }}
        run: |
          sudo tee /etc/redis/redis.conf > /dev/null << REDISEOF
          bind 127.0.0.1
          port 6379
          daemonize yes
          logfile /var/log/redis/redis-server.log
          requirepass ${REDIS_PASS}
          maxmemory 128mb
          maxmemory-policy allkeys-lru
          save ""
          appendonly no
          tcp-keepalive 300
          REDISEOF
          sudo systemctl restart redis-server
          sleep 1
          redis-cli -a "${REDIS_PASS}" ping 2>/dev/null | grep -q PONG \
            && echo "✓ Redis 7 기동 완료" || echo "::warning::Redis ping 실패"

      - name: PHP-FPM 설정 및 시작
        run: |
          # OPcache
          sudo tee /etc/php/8.3/fpm/conf.d/10-opcache-wp.ini > /dev/null << 'INIEOF'
          opcache.enable=1
          opcache.memory_consumption=128
          opcache.interned_strings_buffer=16
          opcache.max_accelerated_files=10000
          opcache.revalidate_freq=0
          opcache.validate_timestamps=0
          opcache.fast_shutdown=1
          INIEOF

          sudo tee /etc/php/8.3/fpm/conf.d/20-wp-tune.ini > /dev/null << 'INIEOF'
          upload_max_filesize=64M
          post_max_size=64M
          memory_limit=256M
          max_execution_time=300
          display_errors=Off
          log_errors=On
          INIEOF

          # 메인 풀 (9000)
          sudo tee /etc/php/8.3/fpm/pool.d/www.conf > /dev/null << 'POOLEOF'
          [www]
          user = www-data
          group = www-data
          listen = 127.0.0.1:9000
          pm = dynamic
          pm.max_children = 10
          pm.start_servers = 2
          pm.min_spare_servers = 2
          pm.max_spare_servers = 5
          pm.max_requests = 500
          POOLEOF

          # 서브 풀 (9001, ondemand)
          sudo tee /etc/php/8.3/fpm/pool.d/www2.conf > /dev/null << 'POOLEOF'
          [www2]
          user = www-data
          group = www-data
          listen = 127.0.0.1:9001
          pm = ondemand
          pm.max_children = 10
          pm.process_idle_timeout = 30s
          pm.max_requests = 500
          POOLEOF

          sudo systemctl restart php8.3-fpm
          sleep 1
          sudo systemctl is-active php8.3-fpm && echo "✓ PHP-FPM 기동" || echo "::warning::PHP-FPM 실패"

      - name: nginx 설정 및 시작
        env:
          DB_PASS: ${{ secrets.DB_PASS }}
          REDIS_PASS: ${{ secrets.REDIS_PASS }}
        run: |
          WP_ABS="${REPO_ROOT}/${WP_DIR}"
          PMA_ABS="${REPO_ROOT}/${PMA_DIR}"

          # wp-config.php 비밀번호 업데이트 (runner마다 새 MariaDB)
          if [ -f "${WP_ABS}/wp-config.php" ]; then
            sudo sed -i "s/define('DB_PASSWORD', '[^']*')/define('DB_PASSWORD', '${DB_PASS}')/" \
              "${WP_ABS}/wp-config.php"
            sudo sed -i "s/define('WP_REDIS_PASSWORD', '[^']*')/define('WP_REDIS_PASSWORD', '${REDIS_PASS}')/" \
              "${WP_ABS}/wp-config.php" 2>/dev/null || true
          fi

          # upstream
          sudo tee /etc/nginx/conf.d/upstream-phpfpm.conf > /dev/null << NGXEOF
          upstream php_fpm_pool {
              least_conn;
              server 127.0.0.1:9000 weight=5;
              server 127.0.0.1:9001 weight=3 backup;
              keepalive 16;
          }
          NGXEOF

          # WordPress
          sudo tee /etc/nginx/sites-available/wordpress > /dev/null << NGXEOF
          server {
              listen ${WP_PORT};
              server_name _;
              root ${WP_ABS};
              index index.php index.html;
              client_max_body_size 64M;
              gzip on;
              gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
              gzip_comp_level 5;
              gzip_min_length 256;
              location ~* \.(css|js|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg|webp|avif)$ {
                  expires 1y;
                  add_header Cache-Control "public, immutable";
                  try_files \$uri =404;
              }
              location / { try_files \$uri \$uri/ /index.php?\$args; }
              location ~ \.php$ {
                  fastcgi_pass php_fpm_pool;
                  fastcgi_index index.php;
                  fastcgi_param SCRIPT_FILENAME \$document_root\$fastcgi_script_name;
                  fastcgi_param HTTPS on;
                  fastcgi_param SERVER_PORT 443;
                  include fastcgi_params;
                  fastcgi_read_timeout 300;
                  fastcgi_buffers 16 16k;
                  fastcgi_buffer_size 32k;
              }
              location = /xmlrpc.php { deny all; }
              location ~* /\. { deny all; }
              location ~* /uploads/.*\.php$ { deny all; }
          }
          NGXEOF

          # phpMyAdmin
          sudo tee /etc/nginx/sites-available/phpmyadmin > /dev/null << NGXEOF
          server {
              listen ${PMA_PORT};
              server_name _;
              root ${PMA_ABS};
              index index.php;
              client_max_body_size 64M;
              location / { try_files \$uri \$uri/ /index.php?\$args; }
              location ~ \.php$ {
                  fastcgi_pass 127.0.0.1:9000;
                  fastcgi_index index.php;
                  fastcgi_param SCRIPT_FILENAME \$document_root\$fastcgi_script_name;
                  fastcgi_param HTTPS on;
                  include fastcgi_params;
              }
          }
          NGXEOF

          sudo ln -sf /etc/nginx/sites-available/wordpress  /etc/nginx/sites-enabled/
          sudo ln -sf /etc/nginx/sites-available/phpmyadmin /etc/nginx/sites-enabled/
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo chown -R www-data:www-data "${WP_ABS}/" 2>/dev/null || true
          sudo nginx -t 2>&1 | tail -2
          sudo systemctl restart nginx
          sleep 1

          for PORT in ${WP_PORT} ${PMA_PORT}; do
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 \
                     "http://${HOST_IP}:${PORT}/" 2>/dev/null || echo "000")
            echo "[keepalive-0] nginx 포트 ${PORT}: ${CODE}"
          done

      - name: cloudflared 설치
        run: |
          CF_URL="https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb"
          for attempt in 1 2 3; do
            curl -sSL -f "$CF_URL" -o /tmp/cf.deb && break
            echo "::warning::cloudflared 다운로드 실패 (시도 ${attempt}/3)"
            sleep 5
            [ $attempt -eq 3 ] && { echo "::warning::cloudflared 설치 실패"; exit 0; }
          done
          dpkg -x /tmp/cf.deb /tmp/cf-pkg
          sudo cp /tmp/cf-pkg/usr/bin/cloudflared /usr/local/bin/cloudflared

      - name: Named Tunnel 연결
        env:
          WP_TUNNEL_TOKEN:  ${{ secrets.WP_TUNNEL_TOKEN }}
          PMA_TUNNEL_TOKEN: ${{ secrets.PMA_TUNNEL_TOKEN }}
        run: |
          connect() {
            local TOKEN="$1" PORT="$2" PID="$3" LOG="$4" LABEL="$5"
            [ -z "$TOKEN" ] && return
            cloudflared tunnel --no-autoupdate run \
              --token "$TOKEN" --url "http://${HOST_IP}:${PORT}" \
              --logfile "$LOG" 2>&1 &
            echo $! > "$PID"
            sleep 4
            CONN=$(grep -c "Registered tunnel connection" "$LOG" 2>/dev/null || echo "0")
            echo "[keepalive-0] ${LABEL} 터널: $CONN"
            if [ "$CONN" = "0" ]; then
              kill "$(cat $PID 2>/dev/null)" 2>/dev/null || true; sleep 3
              cloudflared tunnel --no-autoupdate run \
                --token "$TOKEN" --url "http://${HOST_IP}:${PORT}" \
                --logfile "$LOG" 2>&1 &
              echo $! > "$PID"
              sleep 4
            fi
          }
          connect "$WP_TUNNEL_TOKEN"  "$WP_PORT"  /tmp/cf-wp.pid  /tmp/cf-wp.log  "WP"
          connect "$PMA_TUNNEL_TOKEN" "$PMA_PORT" /tmp/cf-pma.pid /tmp/cf-pma.log "PMA"

      - name: DB 백업 + git push (영속화)
        env:
          DB_PASS: ${{ secrets.DB_PASS }}
        run: |
          mkdir -p "${WP_DIR}/db-backup"
          mysqldump -u wpuser -p"${DB_PASS}" -h 127.0.0.1 wordpress \
            2>/dev/null | gzip > "${WP_DIR}/db-backup/latest.sql.gz" || true
          git config user.name  "wpspot-bot"
          git config user.email "bot@wpspot.app"
          git add "${WP_DIR}/db-backup/latest.sql.gz" 2>/dev/null || true
          git diff --cached --quiet || \
            git commit -m "chore: db backup [keepalive-0]" && git push || true

      - name: 서버 유지 (270초)
        env:
          WP_TUNNEL_TOKEN:  ${{ secrets.WP_TUNNEL_TOKEN }}
          PMA_TUNNEL_TOKEN: ${{ secrets.PMA_TUNNEL_TOKEN }}
          DB_PASS:          ${{ secrets.DB_PASS }}
          REDIS_PASS:       ${{ secrets.REDIS_PASS }}
        run: |
          recover_all() {
            sudo systemctl is-active nginx       > /dev/null 2>&1 || sudo systemctl restart nginx
            sudo systemctl is-active php8.3-fpm  > /dev/null 2>&1 || sudo systemctl restart php8.3-fpm
            sudo systemctl is-active mariadb      > /dev/null 2>&1 || sudo systemctl restart mariadb
            sudo systemctl is-active redis-server > /dev/null 2>&1 || sudo systemctl restart redis-server
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 8 \
                     "http://${HOST_IP}:${WP_PORT}/" 2>/dev/null || echo "000")
            echo "[상태] nginx: ${CODE}"
            kill -0 "$(cat /tmp/cf-wp.pid 2>/dev/null)" 2>/dev/null || {
              [ -n "$WP_TUNNEL_TOKEN" ] && cloudflared tunnel --no-autoupdate run \
                --token "$WP_TUNNEL_TOKEN" --url "http://${HOST_IP}:${WP_PORT}" \
                --logfile /tmp/cf-wp.log 2>&1 & echo $! > /tmp/cf-wp.pid
            }
          }
          sleep 90;  recover_all; echo "[90s] keepalive-0 유지"
          sleep 90;  recover_all; echo "[180s] keepalive-0 유지"
          sleep 90;  echo "keepalive-0 완료"

  # ── keepalive-1 ~ 4: 60s offset, 동일 로직 ──────────────────
  keepalive-1:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Offset 60s
        run: sleep 60
      - uses: actions/checkout@v4
      - name: 전체 스택 기동
        env:
          WP_TUNNEL_TOKEN:  ${{ secrets.WP_TUNNEL_TOKEN }}
          PMA_TUNNEL_TOKEN: ${{ secrets.PMA_TUNNEL_TOKEN }}
          DB_PASS:          ${{ secrets.DB_PASS }}
          REDIS_PASS:       ${{ secrets.REDIS_PASS }}
        run: |
          CFG="deploy/tunnel-config.json"
          WP_PORT=$([ -f "$CFG" ] && python3 -c "import json; print(json.load(open('$CFG')).get('wp_port',8080))" || echo 8080)
          PMA_PORT=$([ -f "$CFG" ] && python3 -c "import json; print(json.load(open('$CFG')).get('pma_port',8081))" || echo 8081)
          WP_DIR=$([ -f "$CFG" ] && python3 -c "import json; print(json.load(open('$CFG')).get('wordpress_dir','wordpress'))" || echo wordpress)
          PMA_DIR=$([ -f "$CFG" ] && python3 -c "import json; print(json.load(open('$CFG')).get('pma_dir','wordpress/wp-content/phpmyadmin'))" || echo "wordpress/wp-content/phpmyadmin")
          HOST_IP=$(hostname -I | awk '{print $1}')
          WP_ABS="$(pwd)/${WP_DIR}"
          PMA_ABS="$(pwd)/${PMA_DIR}"

          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            nginx php8.3-fpm php8.3-mysql php8.3-gd php8.3-curl php8.3-xml \
            php8.3-mbstring php8.3-zip php8.3-intl php8.3-redis php8.3-opcache \
            mariadb-server mariadb-client redis-server 2>/dev/null

          sudo systemctl start mariadb; sleep 2
          sudo mysql -u root << SQLEOF
          CREATE DATABASE IF NOT EXISTS wordpress CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
          CREATE USER IF NOT EXISTS 'wpuser'@'127.0.0.1' IDENTIFIED BY '${DB_PASS}';
          GRANT ALL PRIVILEGES ON wordpress.* TO 'wpuser'@'127.0.0.1';
          FLUSH PRIVILEGES;
          SQLEOF
          WP_ROWS=$(mysql -u wpuser -p"${DB_PASS}" -h 127.0.0.1 -e \
            "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='wordpress';" \
            2>/dev/null | tail -1 || echo "0")
          [ "$WP_ROWS" = "0" ] && [ -f "${WP_DIR}/db-backup/latest.sql.gz" ] && \
            zcat "${WP_DIR}/db-backup/latest.sql.gz" | sudo mysql -u root wordpress

          sudo tee /etc/redis/redis.conf > /dev/null << REDISEOF
          bind 127.0.0.1
          port 6379
          daemonize yes
          logfile /var/log/redis/redis-server.log
          requirepass ${REDIS_PASS}
          maxmemory 128mb
          maxmemory-policy allkeys-lru
          save ""
          appendonly no
          REDISEOF
          sudo systemctl restart redis-server; sleep 1

          sudo tee /etc/php/8.3/fpm/conf.d/10-opcache-wp.ini > /dev/null << 'INIEOF'
          opcache.enable=1
          opcache.memory_consumption=128
          opcache.interned_strings_buffer=16
          opcache.max_accelerated_files=10000
          opcache.revalidate_freq=0
          opcache.validate_timestamps=0
          opcache.fast_shutdown=1
          INIEOF
          sudo tee /etc/php/8.3/fpm/conf.d/20-wp-tune.ini > /dev/null << 'INIEOF'
          upload_max_filesize=64M
          post_max_size=64M
          memory_limit=256M
          max_execution_time=300
          display_errors=Off
          INIEOF
          sudo tee /etc/php/8.3/fpm/pool.d/www.conf > /dev/null << 'POOLEOF'
          [www]
          user = www-data
          group = www-data
          listen = 127.0.0.1:9000
          pm = dynamic
          pm.max_children = 10
          pm.start_servers = 2
          pm.min_spare_servers = 2
          pm.max_spare_servers = 5
          pm.max_requests = 500
          POOLEOF
          sudo tee /etc/php/8.3/fpm/pool.d/www2.conf > /dev/null << 'POOLEOF'
          [www2]
          user = www-data
          group = www-data
          listen = 127.0.0.1:9001
          pm = ondemand
          pm.max_children = 10
          pm.process_idle_timeout = 30s
          pm.max_requests = 500
          POOLEOF
          sudo systemctl restart php8.3-fpm; sleep 1

          # wp-config 비밀번호 패치
          [ -f "${WP_ABS}/wp-config.php" ] && \
            sudo sed -i "s/define('DB_PASSWORD', '[^']*')/define('DB_PASSWORD', '${DB_PASS}')/" \
              "${WP_ABS}/wp-config.php"

          sudo tee /etc/nginx/conf.d/upstream-phpfpm.conf > /dev/null << NGXEOF
          upstream php_fpm_pool {
              least_conn;
              server 127.0.0.1:9000 weight=5;
              server 127.0.0.1:9001 weight=3 backup;
              keepalive 16;
          }
          NGXEOF
          sudo tee /etc/nginx/sites-available/wordpress > /dev/null << NGXEOF
          server {
              listen ${WP_PORT};
              server_name _;
              root ${WP_ABS};
              index index.php index.html;
              client_max_body_size 64M;
              gzip on;
              gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
              gzip_comp_level 5;
              gzip_min_length 256;
              location ~* \.(css|js|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg|webp|avif)$ {
                  expires 1y;
                  add_header Cache-Control "public, immutable";
                  try_files \$uri =404;
              }
              location / { try_files \$uri \$uri/ /index.php?\$args; }
              location ~ \.php$ {
                  fastcgi_pass php_fpm_pool;
                  fastcgi_index index.php;
                  fastcgi_param SCRIPT_FILENAME \$document_root\$fastcgi_script_name;
                  fastcgi_param HTTPS on;
                  fastcgi_param SERVER_PORT 443;
                  include fastcgi_params;
                  fastcgi_read_timeout 300;
                  fastcgi_buffers 16 16k;
                  fastcgi_buffer_size 32k;
              }
              location = /xmlrpc.php { deny all; }
              location ~* /\. { deny all; }
              location ~* /uploads/.*\.php$ { deny all; }
          }
          NGXEOF
          sudo tee /etc/nginx/sites-available/phpmyadmin > /dev/null << NGXEOF
          server {
              listen ${PMA_PORT};
              server_name _;
              root ${PMA_ABS};
              index index.php;
              client_max_body_size 64M;
              location / { try_files \$uri \$uri/ /index.php?\$args; }
              location ~ \.php$ {
                  fastcgi_pass 127.0.0.1:9000;
                  fastcgi_index index.php;
                  fastcgi_param SCRIPT_FILENAME \$document_root\$fastcgi_script_name;
                  fastcgi_param HTTPS on;
                  include fastcgi_params;
              }
          }
          NGXEOF
          sudo ln -sf /etc/nginx/sites-available/wordpress  /etc/nginx/sites-enabled/
          sudo ln -sf /etc/nginx/sites-available/phpmyadmin /etc/nginx/sites-enabled/
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo chown -R www-data:www-data "${WP_ABS}/" 2>/dev/null || true
          sudo nginx -t 2>&1 | tail -1
          sudo systemctl restart nginx; sleep 1

          for PORT in ${WP_PORT} ${PMA_PORT}; do
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 10 \
                     "http://${HOST_IP}:${PORT}/" 2>/dev/null || echo "000")
            echo "[keepalive-1] 포트 ${PORT}: ${CODE}"
          done

          # cloudflared
          CF_URL="https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb"
          for _t in 1 2 3; do curl -sSL -f "$CF_URL" -o /tmp/cf.deb && break; sleep 5; done
          dpkg -x /tmp/cf.deb /tmp/cf-pkg && sudo cp /tmp/cf-pkg/usr/bin/cloudflared /usr/local/bin/cloudflared

          connect() {
            local TOKEN="$1" PORT="$2" PID="$3" LOG="$4"
            [ -z "$TOKEN" ] && return
            cloudflared tunnel --no-autoupdate run \
              --token "$TOKEN" --url "http://${HOST_IP}:${PORT}" --logfile "$LOG" 2>&1 &
            echo $! > "$PID"; sleep 4
            CONN=$(grep -c "Registered tunnel connection" "$LOG" 2>/dev/null || echo "0")
            echo "[keepalive-1] 터널 포트 ${PORT}: $CONN"
            [ "$CONN" = "0" ] && { kill "$(cat $PID 2>/dev/null)" 2>/dev/null || true; sleep 3
              cloudflared tunnel --no-autoupdate run \
                --token "$TOKEN" --url "http://${HOST_IP}:${PORT}" --logfile "$LOG" 2>&1 &
              echo $! > "$PID"; sleep 4; }
          }
          connect "$WP_TUNNEL_TOKEN"  "$WP_PORT"  /tmp/cf-wp.pid  /tmp/cf-wp.log
          connect "$PMA_TUNNEL_TOKEN" "$PMA_PORT" /tmp/cf-pma.pid /tmp/cf-pma.log

      - name: 서버 유지 + DB 백업
        env:
          DB_PASS: ${{ secrets.DB_PASS }}
          WP_TUNNEL_TOKEN: ${{ secrets.WP_TUNNEL_TOKEN }}
        run: |
          CFG="deploy/tunnel-config.json"
          WP_PORT=$([ -f "$CFG" ] && python3 -c "import json; print(json.load(open('$CFG')).get('wp_port',8080))" || echo 8080)
          WP_DIR=$([ -f "$CFG" ] && python3 -c "import json; print(json.load(open('$CFG')).get('wordpress_dir','wordpress'))" || echo wordpress)
          HOST_IP=$(hostname -I | awk '{print $1}')

          recover_all() {
            sudo systemctl is-active nginx       > /dev/null 2>&1 || sudo systemctl restart nginx
            sudo systemctl is-active php8.3-fpm  > /dev/null 2>&1 || sudo systemctl restart php8.3-fpm
            sudo systemctl is-active mariadb      > /dev/null 2>&1 || sudo systemctl restart mariadb
            sudo systemctl is-active redis-server > /dev/null 2>&1 || sudo systemctl restart redis-server
            CODE=$(curl -sf -o /dev/null -w "%{http_code}" --connect-timeout 5 --max-time 8 \
                     "http://${HOST_IP}:${WP_PORT}/" 2>/dev/null || echo "000")
            echo "[상태] ${CODE}"
          }

          sleep 90; recover_all
          # DB 백업
          mkdir -p "${WP_DIR}/db-backup"
          mysqldump -u wpuser -p"${DB_PASS}" -h 127.0.0.1 wordpress 2>/dev/null \
            | gzip > "${WP_DIR}/db-backup/latest.sql.gz" || true
          git config user.name "wpspot-bot"; git config user.email "bot@wpspot.app"
          git add "${WP_DIR}/db-backup/" 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: db backup [keepalive-1]" && git push || true
          echo "[90s] keepalive-1"

          sleep 90; recover_all; echo "[180s] keepalive-1"
          sleep 90; echo "keepalive-1 완료"

