          [ -n "$WP_TUNNEL_TOKEN" ] && cloudflared tunnel --no-autoupdate run \
            --token "$WP_TUNNEL_TOKEN" --url "http://${HOST_IP}:${WP_PORT}" \
            --logfile /tmp/cf-wp.log 2>&1 & echo $! > /tmp/cf-wp.pid
          [ -n "$PLA_TUNNEL_TOKEN" ] && cloudflared tunnel --no-autoupdate run \
            --token "$PLA_TUNNEL_TOKEN" --url "http://${HOST_IP}:${PLA_PORT}" \
            --logfile /tmp/cf-pla.log 2>&1 & echo $! > /tmp/cf-pla.pid
          sleep 5; CONN=$(grep -c "Registered tunnel connection" /tmp/cf-wp.log 2>/dev/null || echo "0")
          echo "keepalive-4 WP 터널: $CONN"

      - name: 서버 유지 (keepalive-4)
