          $uri=urldecode(parse_url($_SERVER['REQUEST_URI'],PHP_URL_PATH));$f=$d.$uri;
          if($uri!=='/'&&file_exists($f)&&!is_dir($f)){return false;}
          chdir($d);require file_exists($d.'/wp-blog-header.php')?$d.'/wp-blog-header.php':$d.'/index.php';
          EOF

          [ -d "$WP_DIR" ] && { cd "$WP_DIR"; php -S 0.0.0.0:${WP_PORT} /tmp/wp-router.php -d display_errors=0 >> /tmp/php-wp.log 2>&1 & cd -; }
