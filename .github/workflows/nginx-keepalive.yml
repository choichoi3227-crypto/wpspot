name: wpspot Server Keep-Alive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

# 구조: 5분마다 5개 job이 60초 간격으로 시작
# 각 job: PHP 내장 서버(-S) + cloudflared Quick Tunnel → CF Worker 업데이트
# nginx/FPM/systemctl 완전 없음 — 순수 서버리스

jobs:
  keepalive-0:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: PHP 설치
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, sqlite3, pdo_sqlite, gd, zip, curl, xml, intl

      - name: 설정 로드
        id: cfg
        run: |
          if [ -f "deploy/server-config.json" ]; then
            WP_PORT=$(python3  -c "import json; d=json.load(open('deploy/server-config.json')); print(d.get('wp_port',8888))")
            PLA_PORT=$(python3 -c "import json; d=json.load(open('deploy/server-config.json')); print(d.get('pla_port',8889))")
            WP_DIR=$(python3   -c "import json; d=json.load(open('deploy/server-config.json')); print(d.get('wordpress_dir','wordpress'))")
            PLA_DIR=$(python3  -c "import json; d=json.load(open('deploy/server-config.json')); print(d.get('pla_dir','wordpress/wp-content/phpliteadmin'))")
            WNAME=$(python3    -c "import json; d=json.load(open('deploy/server-config.json')); print(d.get('worker_name',''))")
            PWNAME=$(python3   -c "import json; d=json.load(open('deploy/server-config.json')); print(d.get('pma_worker',''))")
          else
            WP_PORT=8888; PLA_PORT=8889
            WP_DIR=wordpress
            PLA_DIR=wordpress/wp-content/phpliteadmin
            WNAME=""; PWNAME=""
          fi
          echo "WP_PORT=$WP_PORT"       >> $GITHUB_ENV
          echo "PLA_PORT=$PLA_PORT"     >> $GITHUB_ENV
          echo "WP_DIR=$WP_DIR"         >> $GITHUB_ENV
          echo "PLA_DIR=$PLA_DIR"       >> $GITHUB_ENV
          echo "WORKER_NAME=$WNAME"     >> $GITHUB_ENV
          echo "PMA_WORKER=$PWNAME"     >> $GITHUB_ENV

      - name: WordPress 라우터 생성
        run: |
          cat > /tmp/wp-router.php << 'ROUTEREOF'
          <?php
          $uri = urldecode(parse_url($_SERVER['REQUEST_URI'], PHP_URL_PATH));
          $file = __DIR__ . $uri;
          if ($uri !== '/' && file_exists($file) && !is_dir($file)) {
              return false;
          }
          if (file_exists(__DIR__ . '/wp-blog-header.php')) {
              require __DIR__ . '/wp-blog-header.php';
          } else {
              http_response_code(503);
              echo 'WordPress not found';
          }
          ROUTEREOF

      - name: PHP 내장 서버 시작 (WordPress)
        run: |
          [ ! -d "$WP_DIR" ] && { echo "::warning::wordpress 디렉토리 없음 — 건너뜀"; exit 0; }
          cd "$WP_DIR"
          php -S 0.0.0.0:${WP_PORT} /tmp/wp-router.php \
            -d display_errors=0 \
            -d log_errors=1 \
            >> /tmp/php-wp.log 2>&1 &
          echo $! > /tmp/php-wp.pid
          sleep 3
          CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 8 http://127.0.0.1:${WP_PORT}/ || echo "000")
          echo "WP 서버 상태: $CODE"

      - name: PHP 내장 서버 시작 (PHPLiteAdmin)
        run: |
          [ ! -d "$PLA_DIR" ] && { echo "::warning::PHPLiteAdmin 디렉토리 없음 — 건너뜀"; exit 0; }
          cd "$PLA_DIR"
          php -S 0.0.0.0:${PLA_PORT} \
            -d display_errors=0 \
            -d log_errors=1 \
            >> /tmp/php-pla.log 2>&1 &
          echo $! > /tmp/php-pla.pid
          sleep 2
          CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 8 http://127.0.0.1:${PLA_PORT}/ || echo "000")
          echo "PLA 서버 상태: $CODE"

      - name: cloudflared 설치
        run: |
          curl -sSL \
            "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb" \
            -o /tmp/cf.deb
          dpkg -x /tmp/cf.deb /tmp/cf-pkg
          sudo cp /tmp/cf-pkg/usr/bin/cloudflared /usr/local/bin/cloudflared

      - name: cloudflared Quick Tunnel 시작
        run: |
          cloudflared tunnel --url http://127.0.0.1:${WP_PORT} \
            --no-autoupdate --logfile /tmp/cf-wp.log 2>&1 &
          cloudflared tunnel --url http://127.0.0.1:${PLA_PORT} \
            --no-autoupdate --logfile /tmp/cf-pla.log 2>&1 &

          # URL 추출
          WP_URL=""; PLA_URL=""
          for i in $(seq 1 30); do
            sleep 1
            [ -z "$WP_URL" ] && \
              WP_URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/cf-wp.log 2>/dev/null | head -1 || true)
            [ -z "$PLA_URL" ] && \
              PLA_URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/cf-pla.log 2>/dev/null | head -1 || true)
            [ -n "$WP_URL" ] && [ -n "$PLA_URL" ] && break
          done
          echo "WP 터널:  ${WP_URL:-없음}"
          echo "PLA 터널: ${PLA_URL:-없음}"
          echo "TUNNEL_WP_URL=${WP_URL:-}"   >> $GITHUB_ENV
          echo "TUNNEL_PLA_URL=${PLA_URL:-}" >> $GITHUB_ENV

      - name: CF Worker 터널 URL 업데이트
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ] && \
            { echo "CF 자격증명 없음 — 건너뜀"; exit 0; }
          [ -z "$TUNNEL_WP_URL" ] && { echo "터널 URL 없음 — 건너뜀"; exit 0; }
          [ -z "$WORKER_NAME" ]   && { echo "Worker 이름 없음 — 건너뜀"; exit 0; }

          npm install -g wrangler --quiet --no-progress 2>/dev/null

          # WordPress Worker 업데이트
          mkdir -p /tmp/cf-wp
          cat > /tmp/cf-wp/worker.js << 'WORKEREOF'
          export default {
            async fetch(request, env) {
              const origin = env.NGINX_ORIGIN;
              if (!origin) return new Response(offlinePage(), {
                status: 503,
                headers: { 'Content-Type': 'text/html; charset=utf-8', 'Retry-After': '30' }
              });
              const url = new URL(request.url);
              const target = new URL(origin);
              target.pathname = url.pathname;
              target.search   = url.search;
              const headers = new Headers(request.headers);
              headers.set('host', new URL(origin).host);
              headers.set('x-forwarded-proto', 'https');
              headers.set('x-real-ip', request.headers.get('cf-connecting-ip') || '');
              try {
                const resp = await fetch(target.toString(), {
                  method: request.method, headers,
                  body: ['GET','HEAD'].includes(request.method) ? undefined : request.body,
                  redirect: 'manual',
                });
                const out = new Headers(resp.headers);
                out.set('x-powered-by', 'wpspot/serverless');
                return new Response(resp.body, { status: resp.status, headers: out });
              } catch (e) {
                return new Response(offlinePage(e.message), {
                  status: 503,
                  headers: { 'Content-Type': 'text/html; charset=utf-8', 'Retry-After': '60' }
                });
              }
            }
          };
          function offlinePage(m){return'<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">'
          +'<meta http-equiv="refresh" content="30"><title>준비 중</title>'
          +'<style>body{font-family:system-ui;display:flex;align-items:center;'
          +'justify-content:center;min-height:100vh;margin:0;background:#f8fafc}'
          +'.c{text-align:center;max-width:420px;padding:2rem}'
          +'h2{color:#1e293b}p{color:#64748b;line-height:1.6}</style></head>'
          +'<body><div class="c"><h2>⏳ 서버 재시작 중이에요</h2>'
          +'<p>잠시 후 자동으로 새로고침됩니다.</p>'
          +(m?'<p style="color:#94a3b8;font-size:12px">'+m+'</p>':'')
          +'</div></body></html>';}
          WORKEREOF

          cat > /tmp/cf-wp/wrangler.toml << TOMLEOF
          name = "${WORKER_NAME}"
          main = "worker.js"
          compatibility_date = "2024-09-23"
          [vars]
          NGINX_ORIGIN = "${TUNNEL_WP_URL}"
          TOMLEOF
          cd /tmp/cf-wp && wrangler deploy --minify 2>/dev/null && echo "✓ WP Worker 업데이트" || echo "✗ WP Worker 업데이트 실패"

          # PLA Worker 업데이트
          if [ -n "$TUNNEL_PLA_URL" ] && [ -n "$PMA_WORKER" ]; then
            mkdir -p /tmp/cf-pla
            cat > /tmp/cf-pla/worker.js << 'WORKEREOF'
          export default {
            async fetch(request, env) {
              const origin = env.PLA_ORIGIN;
              if (!origin) return new Response('PHPLiteAdmin 재시작 중', { status: 503 });
              const url = new URL(request.url);
              const t = new URL(origin);
              t.pathname = url.pathname; t.search = url.search;
              const h = new Headers(request.headers);
              h.set('host', new URL(origin).host);
              h.set('x-forwarded-proto', 'https');
              try {
                const r = await fetch(t.toString(), {
                  method: request.method, headers: h,
                  body: ['GET','HEAD'].includes(request.method) ? undefined : request.body,
                  redirect: 'manual',
                });
                return new Response(r.body, { status: r.status, headers: r.headers });
              } catch (e) {
                return new Response('PHPLiteAdmin 오류: ' + e.message, { status: 503 });
              }
            }
          };
          WORKEREOF
            cat > /tmp/cf-pla/wrangler.toml << TOMLEOF
          name = "${PMA_WORKER}"
          main = "worker.js"
          compatibility_date = "2024-09-23"
          [vars]
          PLA_ORIGIN = "${TUNNEL_PLA_URL}"
          TOMLEOF
            cd /tmp/cf-pla && wrangler deploy --minify 2>/dev/null && echo "✓ PLA Worker 업데이트" || echo "✗ PLA Worker 업데이트 실패"
          fi

      - name: 서버 유지 (270초)
        run: |
          echo "[0s] PHP 서버 + 터널 유지 중..."
          sleep 90
          # 헬스체크 + 자동 재시작
          CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:${WP_PORT}/ || echo "000")
          if [ "$CODE" = "000" ]; then
            echo "[90s] WP 서버 응답 없음 — 재시작"
            cd "$WP_DIR" && php -S 0.0.0.0:${WP_PORT} /tmp/wp-router.php \
              -d display_errors=0 >> /tmp/php-wp.log 2>&1 &
          else
            echo "[90s] WP 서버 OK ($CODE)"
          fi
          sleep 90
          CODE=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 5 http://127.0.0.1:${WP_PORT}/ || echo "000")
          echo "[180s] WP 서버: $CODE"
          sleep 90
          echo "[270s] keepalive job 완료"

  # ── offset jobs ──────────────────────────────────────────────────────────
  keepalive-1:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Offset 60s
        run: sleep 60
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, sqlite3, pdo_sqlite, gd, zip, curl, xml
      - name: PHP 서버 + 터널
        run: |
          CFG="deploy/server-config.json"
          WP_PORT=$([ -f "$CFG" ] && python3 -c "import json; print(json.load(open('$CFG')).get('wp_port',8888))" || echo 8888)
          PLA_PORT=$([ -f "$CFG" ] && python3 -c "import json; print(json.load(open('$CFG')).get('pla_port',8889))" || echo 8889)
          WP_DIR=$([ -f "$CFG" ] && python3 -c "import json; print(json.load(open('$CFG')).get('wordpress_dir','wordpress'))" || echo wordpress)
          PLA_DIR=$([ -f "$CFG" ] && python3 -c "import json; print(json.load(open('$CFG')).get('pla_dir','wordpress/wp-content/phpliteadmin'))" || echo "wordpress/wp-content/phpliteadmin")

          cat > /tmp/wp-router.php << 'EOF'
          <?php
          $uri=urldecode(parse_url($_SERVER['REQUEST_URI'],PHP_URL_PATH));
          $f=__DIR__.$uri;
          if($uri!=='/'&&file_exists($f)&&!is_dir($f)){return false;}
          require_once file_exists(__DIR__.'/wp-blog-header.php')?__DIR__.'/wp-blog-header.php':(__DIR__.'/index.php');
          EOF

          [ -d "$WP_DIR" ] && { cd "$WP_DIR"; php -S 0.0.0.0:${WP_PORT} /tmp/wp-router.php -d display_errors=0 >> /tmp/php-wp.log 2>&1 & cd -; }
          [ -d "$PLA_DIR" ] && { cd "$PLA_DIR"; php -S 0.0.0.0:${PLA_PORT} -d display_errors=0 >> /tmp/php-pla.log 2>&1 & cd -; }
          sleep 3

          curl -sSL "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb" -o /tmp/cf.deb
          dpkg -x /tmp/cf.deb /tmp/cf-pkg && sudo cp /tmp/cf-pkg/usr/bin/cloudflared /usr/local/bin/cloudflared

          cloudflared tunnel --url http://127.0.0.1:${WP_PORT} --no-autoupdate >> /tmp/cf-wp.log 2>&1 &
          cloudflared tunnel --url http://127.0.0.1:${PLA_PORT} --no-autoupdate >> /tmp/cf-pla.log 2>&1 &
          sleep 210
          echo "keepalive-1 완료"

  keepalive-2:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Offset 120s
        run: sleep 120
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, sqlite3, pdo_sqlite, gd, zip, curl, xml
      - name: PHP 서버 + 터널
        run: |
          CFG="deploy/server-config.json"
          WP_PORT=$([ -f "$CFG" ] && python3 -c "import json; print(json.load(open('$CFG')).get('wp_port',8888))" || echo 8888)
          PLA_PORT=$([ -f "$CFG" ] && python3 -c "import json; print(json.load(open('$CFG')).get('pla_port',8889))" || echo 8889)
          WP_DIR=$([ -f "$CFG" ] && python3 -c "import json; print(json.load(open('$CFG')).get('wordpress_dir','wordpress'))" || echo wordpress)
          PLA_DIR=$([ -f "$CFG" ] && python3 -c "import json; print(json.load(open('$CFG')).get('pla_dir','wordpress/wp-content/phpliteadmin'))" || echo "wordpress/wp-content/phpliteadmin")

          cat > /tmp/wp-router.php << 'EOF'
          <?php
          $uri=urldecode(parse_url($_SERVER['REQUEST_URI'],PHP_URL_PATH));
          $f=__DIR__.$uri;
          if($uri!=='/'&&file_exists($f)&&!is_dir($f)){return false;}
          require_once file_exists(__DIR__.'/wp-blog-header.php')?__DIR__.'/wp-blog-header.php':(__DIR__.'/index.php');
          EOF

          [ -d "$WP_DIR" ] && { cd "$WP_DIR"; php -S 0.0.0.0:${WP_PORT} /tmp/wp-router.php -d display_errors=0 >> /tmp/php-wp.log 2>&1 & cd -; }
          [ -d "$PLA_DIR" ] && { cd "$PLA_DIR"; php -S 0.0.0.0:${PLA_PORT} -d display_errors=0 >> /tmp/php-pla.log 2>&1 & cd -; }
          sleep 3

          curl -sSL "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb" -o /tmp/cf.deb
          dpkg -x /tmp/cf.deb /tmp/cf-pkg && sudo cp /tmp/cf-pkg/usr/bin/cloudflared /usr/local/bin/cloudflared

          cloudflared tunnel --url http://127.0.0.1:${WP_PORT} --no-autoupdate >> /tmp/cf-wp.log 2>&1 &
          cloudflared tunnel --url http://127.0.0.1:${PLA_PORT} --no-autoupdate >> /tmp/cf-pla.log 2>&1 &
          sleep 150
          echo "keepalive-2 완료"

  keepalive-3:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Offset 180s
        run: sleep 180
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, sqlite3, pdo_sqlite, gd, zip, curl, xml
      - name: PHP 서버 + 터널
        run: |
          CFG="deploy/server-config.json"
          WP_PORT=$([ -f "$CFG" ] && python3 -c "import json; print(json.load(open('$CFG')).get('wp_port',8888))" || echo 8888)
          PLA_PORT=$([ -f "$CFG" ] && python3 -c "import json; print(json.load(open('$CFG')).get('pla_port',8889))" || echo 8889)
          WP_DIR=$([ -f "$CFG" ] && python3 -c "import json; print(json.load(open('$CFG')).get('wordpress_dir','wordpress'))" || echo wordpress)
          PLA_DIR=$([ -f "$CFG" ] && python3 -c "import json; print(json.load(open('$CFG')).get('pla_dir','wordpress/wp-content/phpliteadmin'))" || echo "wordpress/wp-content/phpliteadmin")

          cat > /tmp/wp-router.php << 'EOF'
          <?php
          $uri=urldecode(parse_url($_SERVER['REQUEST_URI'],PHP_URL_PATH));
          $f=__DIR__.$uri;
          if($uri!=='/'&&file_exists($f)&&!is_dir($f)){return false;}
          require_once file_exists(__DIR__.'/wp-blog-header.php')?__DIR__.'/wp-blog-header.php':(__DIR__.'/index.php');
          EOF

          [ -d "$WP_DIR" ] && { cd "$WP_DIR"; php -S 0.0.0.0:${WP_PORT} /tmp/wp-router.php -d display_errors=0 >> /tmp/php-wp.log 2>&1 & cd -; }
          [ -d "$PLA_DIR" ] && { cd "$PLA_DIR"; php -S 0.0.0.0:${PLA_PORT} -d display_errors=0 >> /tmp/php-pla.log 2>&1 & cd -; }
          sleep 3

          curl -sSL "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb" -o /tmp/cf.deb
          dpkg -x /tmp/cf.deb /tmp/cf-pkg && sudo cp /tmp/cf-pkg/usr/bin/cloudflared /usr/local/bin/cloudflared

          cloudflared tunnel --url http://127.0.0.1:${WP_PORT} --no-autoupdate >> /tmp/cf-wp.log 2>&1 &
          cloudflared tunnel --url http://127.0.0.1:${PLA_PORT} --no-autoupdate >> /tmp/cf-pla.log 2>&1 &
          sleep 90
          echo "keepalive-3 완료"

  keepalive-4:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Offset 240s
        run: sleep 240
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, sqlite3, pdo_sqlite, gd, zip, curl, xml
      - name: PHP 서버 + 터널
        run: |
          CFG="deploy/server-config.json"
          WP_PORT=$([ -f "$CFG" ] && python3 -c "import json; print(json.load(open('$CFG')).get('wp_port',8888))" || echo 8888)
          PLA_PORT=$([ -f "$CFG" ] && python3 -c "import json; print(json.load(open('$CFG')).get('pla_port',8889))" || echo 8889)
          WP_DIR=$([ -f "$CFG" ] && python3 -c "import json; print(json.load(open('$CFG')).get('wordpress_dir','wordpress'))" || echo wordpress)
          PLA_DIR=$([ -f "$CFG" ] && python3 -c "import json; print(json.load(open('$CFG')).get('pla_dir','wordpress/wp-content/phpliteadmin'))" || echo "wordpress/wp-content/phpliteadmin")

          cat > /tmp/wp-router.php << 'EOF'
          <?php
          $uri=urldecode(parse_url($_SERVER['REQUEST_URI'],PHP_URL_PATH));
          $f=__DIR__.$uri;
          if($uri!=='/'&&file_exists($f)&&!is_dir($f)){return false;}
          require_once file_exists(__DIR__.'/wp-blog-header.php')?__DIR__.'/wp-blog-header.php':(__DIR__.'/index.php');
          EOF

          [ -d "$WP_DIR" ] && { cd "$WP_DIR"; php -S 0.0.0.0:${WP_PORT} /tmp/wp-router.php -d display_errors=0 >> /tmp/php-wp.log 2>&1 & cd -; }
          [ -d "$PLA_DIR" ] && { cd "$PLA_DIR"; php -S 0.0.0.0:${PLA_PORT} -d display_errors=0 >> /tmp/php-pla.log 2>&1 & cd -; }
          sleep 3

          curl -sSL "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb" -o /tmp/cf.deb
          dpkg -x /tmp/cf.deb /tmp/cf-pkg && sudo cp /tmp/cf-pkg/usr/bin/cloudflared /usr/local/bin/cloudflared

          cloudflared tunnel --url http://127.0.0.1:${WP_PORT} --no-autoupdate >> /tmp/cf-wp.log 2>&1 &
          cloudflared tunnel --url http://127.0.0.1:${PLA_PORT} --no-autoupdate >> /tmp/cf-pla.log 2>&1 &
          sleep 30
          echo "keepalive-4 완료"
