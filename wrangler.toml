name = "wpspot"
main = "src/worker.js"
compatibility_date = "2026-05-16"

# 정적 파일 서빙 (public/)
[assets]
directory = "./public"
binding = "ASSETS"

# Cloudflare D1
[[d1_databases]]
binding = "DB"
database_name = "wpspot-db"
database_id = "0ca2a71d-d98c-4f82-aaea-2d70fd294750"

# Cloudflare KV (세션/캐시용, 향후 확장)
[[kv_namespaces]]
binding = "KV"
id = "13f767b4020e438db9a7ee5ea320801c"

# Secrets — wrangler secret put 으로 등록 (절대 이 파일에 평문 작성 금지)
# wrangler secret put JWT_SECRET       → 랜덤 64자 문자열
# wrangler secret put CRED_ENC_KEY     → base64 인코딩된 32바이트 (openssl rand -base64 32)

[vars]
APP_NAME = "wpspot"
APP_ENV  = "production"

# Worker 자신의 공개 URL (콜백 URL 생성용)
WPSPOT_BASE_URL = "https://cloud-press.co.kr"

# Upstash 서버리스 Redis (선택사항 — 모든 WordPress 사이트에 Redis Object Cache 적용)
# wrangler secret put UPSTASH_REDIS_URL    → https://xxx.upstash.io
# wrangler secret put UPSTASH_REDIS_TOKEN  → 토큰 문자열
# 미설정 시: Redis 미사용 (WordPress 정상 동작은 보장됨)
UPSTASH_REDIS_URL   = ""
UPSTASH_REDIS_TOKEN = ""

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
